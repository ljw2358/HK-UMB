<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - GLOBAL SUPREMACY v7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+KR:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700; --blue: #00F3FF; --pink: #FF00FF; 
            --green: #39FF14; --bg: #000000; --card: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        /* 전역 설정: 손폰 글자 깨짐 방지 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            word-break: keep-all; line-height: 1.6;
        }

        .main-wrapper { width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }

        /* 상단 언어 선택바 (PC 고휘도 칼라 스타일) */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            padding: 15px; border-bottom: 1px solid #222;
            display: flex; justify-content: center;
        }
        #lang-selector {
            background: #111; color: var(--gold); border: 2px solid var(--gold);
            padding: 10px 20px; border-radius: 12px; font-weight: 900; width: 90%;
            font-size: 14px; outline: none; box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }

        /* 헤더 섹션: 네온 디자인 */
        .header { text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .logo { 
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900; 
            color: var(--gold); text-shadow: 0 0 30px rgba(255,215,0,0.7);
            letter-spacing: -1px; margin-bottom: 10px;
        }
        .subtitle { color: var(--blue); font-size: 14px; font-weight: 800; letter-spacing: 6px; }

        /* 자산 메인 보드 */
        .asset-board { padding: 40px 20px; text-align: center; position: relative; }
        .pi-main { font-family: 'Orbitron'; font-size: 65px; font-weight: 900; margin: 20px 0; }
        .pi-main span { color: var(--gold); font-size: 30px; }
        .gcv-tag { 
            display: inline-block; padding: 12px 30px; border-radius: 50px;
            border: 2px solid var(--green); color: var(--green); font-weight: 900;
            font-size: 18px; background: rgba(57, 255, 20, 0.05);
        }

        /* FAQ 섹션: 20개 항목 전체 수록 */
        .content-section { padding: 20px; }
        .section-title { 
            font-size: 24px; font-weight: 900; color: var(--pink); 
            margin: 40px 0 20px; padding-left: 15px; border-left: 5px solid var(--pink);
        }
        
        .faq-box { background: var(--card); border: 1.5px solid #222; border-radius: 25px; overflow: hidden; }
        .faq-item { border-bottom: 1px solid #1a1a1a; }
        .faq-q { 
            padding: 22px; cursor: pointer; font-weight: 900; color: var(--gold); 
            display: flex; justify-content: space-between; align-items: center; font-size: 16px;
        }
        .faq-q:hover { background: #111; }
        .faq-a { 
            display: none; padding: 0 22px 25px; color: #bbb; font-size: 15px; line-height: 1.8;
            background: #080808; border-top: 1px solid #111;
        }

        /* 5대 비전 섹션 */
        .vision-container { margin-top: 40px; }
        .v-card { 
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid #222; border-radius: 25px; padding: 30px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .v-card b { color: var(--blue); font-size: 20px; display: block; margin-bottom: 12px; }
        .v-card p { color: #ccc; margin: 0; font-size: 15px; }

        /* 소셜 링크 */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 40px; }
        .s-link { 
            padding: 20px; border-radius: 18px; text-align: center; font-weight: 900; 
            text-decoration: none; color: #fff; font-size: 18px; transition: 0.3s;
        }
        .yt { background: #f00; }
        .tk { background: #111; border: 1px solid #333; }

        /* 삐니 플로팅 에이전트 */
        .bbini-btn { 
            position: fixed; bottom: 30px; right: 25px; width: 85px; height: 85px;
            background: linear-gradient(135deg, var(--pink), #800080);
            border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center;
            justify-content: center; font-weight: 900; color: #fff; font-size: 20px;
            box-shadow: 0 0 30px var(--pink); z-index: 2000; cursor: pointer; animation: float 3s infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 푸터 */
        .footer { text-align: center; padding: 60px 20px; color: #444; font-size: 12px; font-weight: 900; }
    </style>
</head>

        ["DEX 스왑 수수료 정책?", "발생 수익의 90%를 유동성 공급자와 생태계 기여자에게 즉시 환원합니다."],

        ["장학금 지급 기준은?", "혁신 기술 연구 및 사회 공헌도가 높은 청년 인재를 매달 선정하여 지원합니다."],

        ["다국어 지원 기능은?", "실시간 AI 번역 엔진을 탑재하여 30개국 이상의 언어로 즉시 소통 가능합니다."],
        ["시스템 장애 대응?", "전 세계 분산 노드 시스템으로 99.9% 무중단 운영을 보장합니다."],
        ["설립자 거버넌스 권한?", "설립자(HK)는 최종 의사 결정권 및 신규 프로젝트 런칭 독점권을 가집니다."],
        ["애플리케이션 업데이트?", "사용자 피드백을 반영하여 주 단위로 기능 개선 및 보안 패치가 진행됩니다."],
        ["기부 및 사회 공헌?", "사용자의 기부 내역은 영구 기록되며 재단 내 특별 혜택으로 보상받습니다."],
        ["AGI 비서 '삐니' 역할?", "사용자의 자산 관리, 일정 보조, 기술 교육 등 전 영역을 보조하는 AI입니다."],
        ["HK 그룹의 최종 목표?", "인류를 모든 노동과 질병에서 해방시키고 무한한 부를 공유하는 것입니다."]
    ];

    // 5대 비전 데이터
    const visions = [
        ["🏫 HK 글로벌 AI 학교", "전 세계 누구나 무상으로 최고 수준의 AI 교육을 받을 수 있는 인프라 구축."],
        ["🏥 나노 메디컬 센터", "암과 노화를 정복하는 최첨단 의료 기술을 전 인류에게 무상 보급."],
        ["🏠 에너지 자립 스마트홈", "핵융합 기반 청정 에너지로 주거 및 에너지 비용 제로 시대 실현."],
        ["🤖 1가정 1로봇 무상 보급", "휴머노이드를 통해 인류를 육체적 노동에서 영구적으로 해방."],
        ["🌌 우주 자원 통합 관리", "행성 간 자원 채굴 및 유통 인프라를 통해 인류 자산의 무한 확장."]
    ];

    // FAQ 렌더링
    const faqList = document.getElementById('faq-list');
    faqs.forEach((faq, i) => {
        const item = document.createElement('div');
        item.className = 'faq-item';
        item.innerHTML = `
            <div class="faq-q" onclick="toggleFaq(${i})">${i + 1}. ${faq[0]} <span>▼</span></div>
            <div class="faq-a" id="ans-${i}">${faq[1]}</div>
        `;
        faqList.appendChild(item);
    });

    // 비전 렌더링
    const visList = document.getElementById('vision-list');
    visions.forEach(v => {
        const card = document.createElement('div');
        card.className = 'v-card';
        card.innerHTML = `<b>${v[0]}</b><p>${v[1]}</p>`;
        visList.appendChild(card);
    });

    function toggleFaq(i) {
        const ans = document.getElementById('ans-' + i);
        const isShow = ans.style.display === 'block';
        ans.style.display = isShow ? 'none' : 'block';
    }

    // 실시간 파이 카운터
    let piVal = 400.0212;
    setInterval(() => {
        piVal += Math.random() * 0.0001;
        document.getElementById('pi-count').innerHTML = piVal.toFixed(4) + " <span>Pi</span>";
    }, 1000);
</script>
