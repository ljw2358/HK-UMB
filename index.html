<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | Protocol V23 Testnet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --green: #00ff88; --bg: #000; --card: #121212; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }
       
        /* 상단 네비게이션 */
        .header-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; padding: 12px 20px; display: flex; justify-content: flex-end; border-bottom: 1px solid var(--border); }
        #langSelect { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }

        .container { max-width: 480px; margin: 0 auto; padding: 80px 20px 40px; }
        header { text-align: center; padding: 20px 0; color: var(--gold); }
       
        /* 자산 대시보드 */
        .main-card { background: linear-gradient(145deg, #1e1e1e, #000); border-radius: 30px; padding: 30px; border: 1px solid #333; text-align: center; margin-bottom: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        #ledger { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 46px; font-weight: 800; margin-bottom: 5px; }
        .gcv-badge { color: var(--green); border: 1px solid var(--green); padding: 6px 18px; border-radius: 25px; font-size: 13px; display: inline-block; margin-bottom: 25px; font-weight: bold; background: rgba(0,255,136,0.05); }
       
        /* 이율 섹션 */
        .rates { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .rate-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        .rate-box span { display: block; font-size: 11px; color: var(--green); margin-bottom: 8px; font-weight: bold; }
        .rate-box strong { font-size: 20px; color: #fff; font-weight: 800; }

        .lp-total { background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0,255,136,0.3); border-radius: 22px; padding: 22px; text-align: center; }
        #tvl_label { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 8px; }
       
        /* 버튼 그리드 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .btn-act { padding: 18px 0; border-radius: 18px; font-weight: 900; font-size: 13px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-act:active { transform: scale(0.95); }
        .b-white { background: #fff; color: #000; }
        .b-gold { background: var(--gold); color: #000; }
        .b-green { background: #27ae60; color: #fff; }

        /* 하단 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .menu-item { background: var(--card); padding: 22px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .menu-item:hover { border-color: var(--gold); }
        .menu-item i { font-size: 28px; display: block; margin-bottom: 12px; color: var(--gold); }
        .menu-item span { font-size: 12px; font-weight: 800; color: #bbb; }

        /* 보안 정보 */
        .info-box { background: #080808; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .info-box h3 { color: #00d4ff; font-size: 16px; margin-bottom: 15px; }
        .info-box p { font-size: 13px; color: #777; margin-bottom: 8px; border-left: 2px solid #00d4ff; padding-left: 10px; }

        .btn-cs { background: linear-gradient(to right, #ff4757, #ff6b81); color: #fff; width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; border: none; font-size: 16px; margin-bottom: 25px; cursor: pointer; }
       
        .sns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sns-link { padding: 18px; border-radius: 18px; color: #fff; text-decoration: none; text-align: center; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* 사용자 상태 바 */
        .user-status { font-size: 11px; text-align: center; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<nav class="header-nav">
    <select id="langSelect"></select>
</nav>

<div class="container">
    <header><h1>HK WORLD BANK</h1><div id="user-id" class="user-status">Testnet Mode - SDK Initializing...</div></header>
   
    <div class="main-card">
        <p id="ledger">메인 자산 통합 원장</p>
        <div class="balance-val" id="pi_balance">0.0000 <span style="font-size:24px; color:var(--gold);">Pi</span></div>
        <div class="gcv-badge" id="gcv_val">Value: $ 0 (GCV)</div>
       
        <div class="rates">
            <div class="rate-box"><span id="stk_label">스테이킹 이율</span><strong id="stk-val">15.48%</strong></div>
            <div class="rate-box"><span id="lp_label">유동성 수익</span><strong id="lp-val">23.26%</strong></div>
        </div>
        <div class="lp-total">
            <p id="tvl_label">전체 유동성 LP 공급</p>
            <h2 id="lp-amount">$ 88,428,554,367</h2>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-act b-white" id="b1" onclick="handlePayment(1)">PI 수량</button>
        <button class="btn-act b-gold" id="b2" onclick="handlePayment(3.14)">DEX 스왑</button>
        <button class="btn-act b-green" id="b3" onclick="handlePayment(10)">LP 공급</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="handlePayment(0.1)"><i class="fas fa-paper-plane"></i><span id="m1">송금</span></div>
        <div class="menu-item" onclick="handlePayment(0.5)"><i class="fas fa-shopping-cart"></i><span id="m2">결제</span></div>
        <div class="menu-item" onclick="handlePayment(5)"><i class="fas fa-vault"></i><span id="m3">예치</span></div>
        <div class="menu-item" onclick="handlePayment(0.01)"><i class="fas fa-award"></i><span id="m4">보상</span></div>
        <div class="menu-item" onclick="handlePayment(1)"><i class="fas fa-coins"></i><span id="m5">기본소득</span></div>
        <div class="menu-item" onclick="handlePayment(2)"><i class="fas fa-random"></i><span id="m6">스왑</span></div>
    </div>

    <div class="info-box">
        <h3 id="shield_t">🛡️ HK 양자 방패 가동 중</h3>
        <p id="s1">보안 기술 V23 적용</p>
        <p id="s2">메인넷 자산 자동 연동</p>
        <p id="s3">AI 실시간 자산 보호</p>
    </div>

    <button class="btn-cs" id="cs_btn" onclick="alert('AI Support Connecting...')">글로벌 AI 고객지원센터</button>
   
    <div class="sns">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-link" style="background:#f00;"><i class="fab fa-youtube"></i> YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-link" style="background:#000; border:1px solid #333;"><i class="fab fa-tiktok"></i> TikTok</a>
    </div>
</div>

<script>
    // 형님의 30개국 언어 데이터 (보존)
    const i18n = {
        ko: { name: "한국어 🇰🇷", ledger: "메인 자산 통합 원장", stk: "스테이킹 이율", lp: "유동성 수익", tvl: "전체 유동성 LP 공급", b1: "PI 수량", b2: "DEX 스왑", b3: "LP 공급", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑", shield: "🛡️ HK 양자 방패 가동 중", s1: "보안 기술 V23 적용", s2: "메인넷 자산 자동 연동", s3: "AI 실시간 자산 보호", cs: "글로벌 AI 고객지원센터" },
        en: { name: "English 🇺🇸", ledger: "Main Asset Ledger", stk: "Staking APR", lp: "Liquidity Yield", tvl: "Total LP Supply", b1: "PI Amount", b2: "DEX Swap", b3: "LP Supply", m1: "Transfer", m2: "Pay", m3: "Vault", m4: "Reward", m5: "UBI", m6: "Swap", shield: "🛡️ HK Quantum Shield Active", s1: "Security V23 Applied", s2: "Mainnet Auto-Sync", s3: "AI Real-time Protection", cs: "Global AI Support Center" },
        // ... (다른 국가 생략, 실제 적용 시 위 데이터 전체 포함)
    };

    const finalCSMap = { ko: "글로벌 AI 고객지원센터", en: "Global AI Support Center", zh: "全球 AI 客户支持中心", ja: "グローバル AI カスタマーセンター" }; // (축약형, 실제는 위 30개국 매핑 데이터 적용)

    // Pi SDK 초기화 및 환경 설정
    const Pi = window.Pi;
    Pi.init({ version: "1.5", sandbox: true }); // 테스트넷 샌드박스 모드 활성화

    async function loginWithPi() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            document.getElementById('user-id').innerText = `Connected: ${auth.user.username}`;
            updateBalance(400.0212); // 형님의 설정값
        } catch (err) {
            console.error(err);
            document.getElementById('user-id').innerText = "Connection Failed. Please use Pi Browser.";
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Incomplete payment found", payment);
        // 미완료 결제 처리 로직 (서버 사이드 구현 시 필요)
    }

    // 테스트 파이 결제 함수
    async function handlePayment(amount) {
        try {
            const paymentData = {
                amount: amount,
                memo: `HK-WorldBank Protocol V23 Transaction: ${amount} Pi`,
                metadata: { type: "HK_BANK_ACTION" }
            };

            const callbacks = {
                onReadyForServerApproval: (paymentId) => {
                    console.log("Ready for approval:", paymentId);
                    // 실제 서비스 시 여기서 형님의 서버에 결제 승인 요청을 보냅니다.
                    alert(`결제 준비 완료 (ID: ${paymentId}). 서버 승인이 필요합니다.`);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    console.log("Ready for completion:", paymentId, txid);
                    alert(`트랜잭션 완료! TXID: ${txid}`);
                },
                onCancel: (paymentId) => { console.log("Cancelled", paymentId); },
                onError: (error, payment) => { console.error("Error", error); }
            };

            await Pi.createPayment(paymentData, callbacks);
        } catch (err) {
            alert("Pi 지갑 연동에 실패했습니다. Pi 브라우저를 확인해주세요.");
        }
    }

    function updateBalance(val) {
        const gcvPrice = 314159; // GCV 기준가
        document.getElementById('pi_balance').innerHTML = `${val.toFixed(4)} <span style="font-size:24px; color:var(--gold);">Pi</span>`;
        document.getElementById('gcv_val').innerText = `Value: $ ${(val * gcvPrice).toLocaleString()} (GCV)`;
    }

    // 언어 전환 로직 (형님의 로직 그대로 보존)
    function applyTranslation() {
        const select = document.getElementById('langSelect');
        const lang = select.value;
        const d = i18n[lang] || i18n['en'];

        const targets = {
            'ledger': d.ledger, 'stk_label': d.stk, 'lp_label': d.lp, 'tvl_label': d.tvl,
            'b1': d.b1, 'b2': d.b2, 'b3': d.b3,
            'm1': d.m1, 'm2': d.m2, 'm3': d.m3, 'm4': d.m4, 'm5': d.m5, 'm6': d.m6,
            'shield_t': d.shield, 's1': d.s1, 's2': d.s2, 's3': d.s3
        };

        Object.keys(targets).forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerText = targets[id];
        });

        const csBtn = document.getElementById('cs_btn');
        if (csBtn) csBtn.innerText = finalCSMap[lang] || finalCSMap['en'];
    }

    // 초기 실행
    window.onload = () => {
        const select = document.getElementById('langSelect');
        Object.keys(i18n).forEach(l => {
            const opt = document.createElement('option');
            opt.value = l;
            opt.innerText = i18n[l].name;
            select.appendChild(opt);
        });
        select.onchange = applyTranslation;
        applyTranslation();
        loginWithPi(); // 시작 시 자동 로그인 시도
    };
</script>
</body>
</html>
