<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - THE AWAKENING</title>
    <style>
        :root { 
            --bg: #050505; 
            --yellow: #FFFF00; 
            --green: #39FF14; 
            --blue: #00FFFF; 
            --pink: #FF1493; 
            --purple: #BC13FE;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 100px; 
            overflow-x: hidden;
            background: radial-gradient(circle at top, #111 0%, #050505 100%);
        }

        /* 헤더 애니메이션 */
        header { text-align: center; margin: 40px 0; width: 100%; animation: fadeInDown 1s ease; }
        .logo { font-size: 3.5rem; color: var(--yellow); font-weight: 900; text-shadow: 0 0 30px var(--yellow); margin: 0; letter-spacing: -2px; }
        .sub-logo { color: var(--blue); font-weight: bold; font-size: 1.2rem; margin-top: 10px; letter-spacing: 5px; opacity: 0.8; }

        /* 자산 정보 카드형 레이아웃 */
        .card { width: 90%; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 20px; box-sizing: border-box; text-align: center; }
        
        .pi-display { font-size: 4.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .pi-unit { font-size: 2rem; color: var(--yellow); margin-left: 10px; }
        .gcv-val { color: var(--green); font-size: 1.8rem; font-weight: 900; margin-top: 15px; display: block; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; margin-bottom: 20px; }
        .data-item { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        .data-label { font-size: 0.9rem; color: #888; margin-bottom: 8px; }
        .data-val { font-size: 1.5rem; font-weight: 900; color: var(--blue); }

        /* 서비스 버튼 - 입체감 강조 */
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 92%; margin-bottom: 30px; }
        .s-btn { 
            aspect-ratio: 1/1; border-radius: 22px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }
        .s-btn:active { transform: translateY(4px); box-shadow: none; }
        .bg-white { background: #fff; color: #000; }
        .bg-yellow { background: var(--yellow); color: #000; }
        .bg-green { background: var(--green); color: #000; }
        .bg-dark { background: #151515; color: #fff; border: 1px solid #333; }

        /* 메인 비전 배너 - 유리 광택 효과 */
        .vision-banner { 
            width: 90%; padding: 30px; border-radius: 25px; margin-bottom: 20px; text-align: center; 
            font-weight: 900; font-size: 1.5rem; cursor: pointer; transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.2); position: relative; overflow: hidden;
        }
        .vision-banner::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        .btn-faq { background: linear-gradient(135deg, var(--pink), var(--purple)); box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3); }
        .btn-vision { background: linear-gradient(135deg, #1a2a3a, #0a1a2a); box-shadow: 0 10px 20px rgba(0, 255, 255, 0.1); }

        /* SNS & 푸터 */
        .sns-wrap { display: flex; gap: 15px; width: 90%; margin-bottom: 50px; }
        .sns-box { flex: 1; padding: 20px; border-radius: 20px; text-align: center; font-weight: 900; font-size: 1rem; }
        .sns-yt { background: var(--red); }
        .sns-tk { background: #000; border: 1px solid #fff; }

        /* 삐니 플로팅 버튼 */
        #bbini { 
            position: fixed; bottom: 35px; right: 35px; width: 90px; height: 90px; 
            background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 4px solid #fff; box-shadow: 0 0 40px var(--pink); z-index: 10000;
            animation: float 2s infinite ease-in-out; cursor: pointer;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 모달 팝업 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-inner { background: #111; border: 2px solid var(--yellow); border-radius: 30px; padding: 30px; line-height: 2; position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; color: var(--pink); font-weight: 900; cursor: pointer; }
        .h-text { color: var(--green); font-weight: bold; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">HK WORLD BANK</h1>
        <div class="sub-logo">BEYOND THE FUTURE</div>
    </header>

    <div class="card">
        <div class="pi-display">412.3158<span class="pi-unit">Pi</span></div>
        <span class="gcv-val">GCV ESTIMATED: $ 314,159</span>
    </div>

    <div class="data-grid">
        <div class="data-item"><div class="data-label">HKWB SUPPLY</div><div class="data-val">6,280,000.50</div></div>
        <div class="data-item"><div class="data-label">STAKING APY</div><div class="data-val" style="color:var(--pink);">17.64%</div></div>
    </div>

    <div class="card" style="border: 2px solid var(--green);">
        <div class="data-label" style="color:var(--green); font-weight:900;">TOTAL LIQUIDITY (DEX)</div>
        <div style="font-size: 2.5rem; font-weight: 900;">$ 88,432,098,051</div>
    </div>

    <div class="service-grid">
        <button class="s-btn bg-white">PI HOLD</button>
        <button class="s-btn bg-yellow">SWAP</button>
        <button class="s-btn bg-green">STAKE</button>
        <button class="s-btn bg-dark">SEND</button>
        <button class="s-btn bg-dark">PAY</button>
        <button class="s-btn bg-dark">SAVE</button>
        <button class="s-btn bg-dark">REWARD</button>
        <button class="s-btn bg-dark">BASIC</button>
        <button class="s-btn bg-dark">DEX</button>
    </div>

    <div class="vision-banner btn-faq" onclick="show('faq')">GLOBAL AI CENTER (FAQ 20)</div>
    <div class="vision-banner btn-vision" onclick="show('vision')">HK FOUNDATION VISION 2030</div>

    <div class="sns-wrap">
        <div class="sns-box sns-yt">YouTube<br>@hyekong2025</div>
        <div class="sns-box sns-tk">TikTok<br>@hyekong2025</div>
    </div>

    <div id="bbini" onclick="alert('혜공 형님, 수십 번의 고침이 빚어낸 빛을 보십시오!')">삐니</div>

    <div id="modal" class="modal">
        <div class="modal-inner">
            <span class="close" onclick="hide()">×</span>
            <div id="content"></div>
        </div>
    </div>

    <script>
        const content = {
            faq: `<h2 style="color:var(--yellow); border-bottom:1px solid var(--yellow); padding-bottom:15px;">글로벌 AI 지원센터 FAQ 20선</h2>` +
                 `수십 번의 수정 끝에 완성된 인류 해방의 문답:\n\n` +
                 `1. <span class="h-text">완벽 보안:</span> 양자 암호화 기술로 그 어떤 권력도 침범 불가\n` +
                 `2. <span class="h-text">공정 분배:</span> 생태계 수익 30%의 조건 없는 사회 환원\n` +
                 `3. <span class="h-text">기술 주권:</span> 인간을 위한, 인간에 의한 기술 독립 완성\n` +
                 `4. <span class="h-text">파이 지지:</span> GCV 가치 실현을 위한 강력한 금융 뒷받침\n` +
                 `5. <span class="h-text">노동 해방:</span> 1가정 1로봇 무상 보급으로 인간다운 삶 회복\n` +
                 `6. <span class="h-text">무상 교육:</span> 글로벌 AI 학교를 통한 지식 격차 해소\n` +
                 `7. <span class="h-text">무료 의료:</span> 나노 메디컬로 질병의 고통에서 해방\n` +
                 `8. <span class="h-text">주거 혁명:</span> 핵융합 기반 에너지 자립 스마트홈 공급\n` +
                 `9. <span class="h-text">무한 장학:</span> 꿈이 있는 모든 인재에게 무제한 장학금\n` +
                 `10. <span class="h-text">통합 생태계:</span> 13개 앱이 하나로 연결된 HK 유니버스\n` +
                 `11. 디지털 기본소득의 영구적 보장 시스템\n12. 개인 데이터 소유권의 완전한 회복\n13. 투명한 실시간 유동성 공개 원칙\n14. 전 세계 분산 노드 참여 및 공정 보상\n15. 핵융합 기반 탄소 제로 에너지 자립\n16. 국경 없는 자산 이동 및 수수료 제로\n17. 전 세계 가맹점 즉시 결제 네트워크\n18. 블록체인 기반의 투명한 복지 집행\n19. 인간 중심의 윤리적 AI 가이드라인\n20. 2030 인류 경제 독립 최종 로드맵`,

            vision: `<h2 style="color:var(--blue); border-bottom:1px solid var(--blue); padding-bottom:15px;">HK 사회재단 5대 비전 2030</h2>` +
                    `수십 번의 고침 끝에 세워진 다섯 기둥:\n\n` +
                    `1. <span class="h-text">학교:</span> 글로벌 AI 무상 교육 시스템 건립\n` +
                    `2. <span class="h-text">병원:</span> 나노 메디컬 최첨단 무료 의료 체계\n` +
                    `3. <span class="h-text">주거:</span> 핵융합 기반 에너지 자립 스마트홈 무상 공급\n` +
                    `4. <span class="h-text">장학금:</span> 인류의 미래를 위한 무제한 인재 양성 지원\n` +
                    `5. <span class="h-text">로봇:</span> 1가정 1로봇 보급으로 노동의 굴레 종식`
        };

        function show(t) { document.getElementById('content').innerHTML = content[t]; document.getElementById('modal').style.display = 'block'; document.body.style.overflow = 'hidden'; }
        function hide() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
