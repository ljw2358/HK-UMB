<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - CORE RESTORE v20.0</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #121212;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        
        /* 국기 포함 언어 선택 */
        .global-lang-box { position: fixed; top: 15px; right: 15px; background: #111; border: 2px solid var(--hk-gold); border-radius: 12px; padding: 5px 10px; z-index: 5000; }
        .global-lang-box select { background: transparent; color: var(--hk-gold); border: none; font-weight: 900; outline: none; font-size: 14px; color: var(--hk-gold); cursor: pointer; }

        .header-section { margin: 50px 0 15px 0; }
        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); }
        .sub-header { color: var(--hk-blue); font-size: 16px; font-weight: 800; margin-top: 5px; }

        .pi-main { font-size: 56px; font-weight: 900; margin: 15px 0 5px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 26px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 25px; border-radius: 50px; font-size: 16px; font-weight: 900; margin-bottom: 20px; background: rgba(57,255,20,0.05); }

        /* 데이터 카드 레이아웃 */
        .supply-card { border: 2px solid var(--hk-gold); background: rgba(255, 215, 0, 0.05); padding: 20px; margin-bottom: 15px; border-radius: 25px; }
        .yield-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .yield-card { background: var(--hk-card); border-radius: 20px; padding: 18px 10px; border: 1px solid #333; }
        .liq-card { border: 2px solid var(--hk-green); background: rgba(57, 255, 20, 0.05); padding: 22px 20px; margin-bottom: 20px; border-radius: 25px; }

        .label { font-size: 13px; font-weight: 800; margin-bottom: 8px; display: block; color: #999; }
        .val { font-size: 28px; font-weight: 900; font-variant-numeric: tabular-nums; }

        /* [복구] 전체 유동성 밑 핵심 버튼 3종 */
        .core-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .core-btn { padding: 15px 5px; border-radius: 12px; font-weight: 900; font-size: 14px; color: #000; text-align: center; border: none; cursor: pointer; transition: 0.2s; }
        .core-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* 에코시스템 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .menu-item { background: #181818; padding: 18px 0; border-radius: 18px; border: 1px solid #252525; }
        .menu-icon { font-size: 24px; margin-bottom: 6px; display: block; }
        .menu-text { font-size: 12px; font-weight: 800; color: #ddd; }

        /* 하단 패널 */
        .big-btn { width: 100%; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-bottom: 10px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; }
        .item-row { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .item-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; margin-bottom: 4px; }
        .item-a { color: #bbb; font-size: 13px; line-height: 1.5; }

        .footer { margin: 40px 0 60px 0; color: #444; font-size: 11px; font-weight: 800; }
