<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL LEDGER</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        .header-section { margin: 50px 0 30px 0; }
        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; }
        .sub-header { color: var(--hk-blue); font-size: 14px; margin-top: 10px; font-weight: 800; letter-spacing: 2px; }
        .pi-main { font-size: 58px; font-weight: 900; margin: 20px 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .pi-main span { color: var(--hk-gold); font-size: 24px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 10px 30px; border-radius: 50px; font-size: 16px; font-weight: 900; margin-bottom: 30px; background: rgba(57, 255, 20, 0.05); }
        
        /* 다국어 패널 스타일 */
        .panel { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 15px; margin-bottom: 5px; }
        .faq-a { color: #bbb; font-size: 13px; line-height: 1.6; }
        .vision-item { margin-bottom: 15px; border-left: 3px solid var(--hk-blue); padding-left: 15px; }
        .vision-item b { color: var(--hk-blue); display: block; margin-bottom: 5px; }

        .big-btn { width: 100%; padding: 20px; border-radius: 15px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .big-btn:active { transform: scale(0.98); }

        /* 챗봇 스타일 */
        #chat-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; }
        .chat-top { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { max-width: 80%; padding: 12px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .msg-bbini { background: var(--hk-pink); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background: #333; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-footer { padding: 15px; display: flex; gap: 10px; background: #111; }
        .chat-in { flex: 1; background: #222; border: 1px solid #444; border-radius: 50px; padding: 12px 20px; color: #fff; outline: none; }
        
        .bbini-trigger { position: fixed; bottom: 30px; right: 25px; width: 70px; height: 70px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 3px solid #fff; cursor: pointer; z-index: 9000; box-shadow: 0 0 20px rgba(255,0,255,0.4); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .lang-select-box { position: absolute; top: 15px; right: 15px; z-index: 10000; }
        .lang-select-box select { background: #000; color: var(--hk-gold); border: 1px solid var(--hk-gold); border-radius: 5px; padding: 5px 10px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="lang-select-box">
    <select id="lang-selector" onchange="changeLanguage()">
        <option value="ko">🇰🇷 KOREAN</option>
        <option value="en">🇺🇸 ENGLISH</option>
        <option value="zh">🇨🇳 CHINESE</option>
        <option value="ja">🇯🇵 JAPANESE</option>
        <option value="vi">🇻🇳 VIETNAM</option>
        <option value="th">🇹🇭 THAI</option>
        <option value="id">🇮🇩 INDONESIA</option>
        <option value="es">🇪🇸 SPANISH</option>
        <option value="fr">🇫🇷 FRENCH</option>
        <option value="de">🇩🇪 GERMAN</option>
        <option value="ru">🇷🇺 RUSSIAN</option>
        </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title" id="txt-title">HK WORLD BANK</div>
        <div class="sub-header" id="txt-subtitle">MAIN ASSET INTEGRATED LEDGER</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill" id="txt-gcv">Value: $ 125,663,600 (GCV)</div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="togglePanel('faq-panel')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button class="big-btn" style="background: #253347;" onclick="togglePanel('vision-panel')" id="btn-vision">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="footer-info" style="margin-top:50px; color:#555; font-size:12px;">
        HK GROUP GLOBAL HEADQUARTERS<br>COPYRIGHT 2026 HK WORLD BANK.
    </div>
</div>

<div id="chat-window">
    <div class="chat-top">
        <div id="chat-agent-name" style="color:var(--hk-gold); font-weight:900; font-size:18px;">BBINI AI CUSTOMER SUPPORT</div>
        <div onclick="closeChat()" style="cursor:pointer; color:#fff; font-size:28px;">&times;</div>
    </div>
    <div class="chat-body" id="chat-res">
        <div class="msg-box msg-bbini" id="chat-welcome">안녕하세요? 고객님, 무엇을 도와드릴까요?</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chat-in" class="chat-in" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button onclick="sendMsg()" style="background:var(--hk-gold); border:none; padding:0 20px; border-radius:50px; font-weight:900; cursor:pointer;">SEND</button>
    </div>
</div>

<div class="bbini-trigger" onclick="openChat()">삐니</div>

<script>
    // 원본 FAQ 및 비전 데이터 (언어별 객체)
    const i18n = {
        ko: {
            title: "HK WORLD BANK", subtitle: "메인자산통합원장", gcv: "가치: $ 125,663,600 (GCV)", faq_btn: "글로벌 AI 지원센터 (FAQ 20선)", vision_btn: "HK 사회 재단 비전 2030",
            welcome: "반갑습니다! HK 월드뱅크 고객지원팀 삐니입니다. 궁금하신 점을 물어봐 주세요.",
            chat_ph: "질문을 입력하세요...",
            faqs: [
                ["HKWB의 보안 수준은?", "양자 암호화와 하이퍼레저 기반의 분산 원장으로 세계 최고 수준의 보안을 자랑합니다."],
                ["테스트 파이 연동은?", "고객님의 지갑과 Pi SDK를 통해 실시간 동기화되며 실제 메인넷과 동일하게 작동합니다."],
                ["글로벌 기본소득은?", "HK 그룹 수익의 30%를 전 세계 사용자에게 공평하게 자동 배분하는 시스템입니다."],
                ["1가정 1로봇 무상 보급?", "HK-Robotics 공정 완료 후 앱 내 신청 순서에 따라 순차 배급될 예정입니다."],
                ["무상 주거 단지는?", "울산-경주-포항 하이테크 클러스터를 시작으로 글로벌 주요 거점에 구축됩니다."],
                ["DEX 스왑 수수료는?", "발생 수수료의 90%를 LP 공급자와 생태계 기여자에게 즉시 환원합니다."],
                ["무상 AI 교육은?", "AI 튜터가 24시간 개인 맞춤형 커리큘럼을 무상으로 지도합니다."],
                ["의료 서비스 면제?", "나노 로봇 수술 및 AI 진단 등 모든 의료 행위가 재단 기금으로 무상 지원됩니다."],
                ["장학금 지원 규모는?", "기술 혁신 기여 청년에게 월 최대 $5,000 수준의 연구비를 지원합니다."],
                ["메인넷 전환 시 자산은?", "테스트 환경의 모든 데이터는 메인넷 시점에 1:1 비율로 안전하게 전환됩니다."],
                ["스테이킹 수익률은?", "AI 알고리즘이 실시간 유동성에 따라 최적의 APR을 산출하여 제공합니다."],
                ["노드 참여 혜택은?", "추가 보상과 함께 HK 그룹 프로젝트에 대한 우선 투자 권한이 부여됩니다."],
                ["글로벌 지원 센터는?", "전 세계 50여 개 주요 도시에 AI 기반 대응 센터가 구축 중입니다."],
                ["에너지 자립 홈 기술은?", "핵융합 발전의 소형화와 고효율 배터리를 결합한 독립 생산 시스템입니다."],
                ["로봇의 보안은?", "모든 데이터는 로컬 서버에 저장되며 주인 허가 없이는 외부 전송이 불가합니다."],
                ["재단의 투명성은?", "블록체인 익스플로러를 통해 모든 기금 집행 내역을 실시간 공개합니다."],
                ["다국어 지원 범위는?", "현재 30개 주요 언어 및 실시간 AI 번역으로 전 세계 소통이 가능합니다."],
                ["설립자 거버넌스 권한?", "설립자로서 최종 승인권 및 신규 프로젝트 런칭 독점 권한이 유지됩니다."],
                ["시스템 자가 진단?", "AI가 마이크로초 단위로 상시 모니터링하여 무중단 운영을 보장합니다."],
                ["삐니 챗봇의 역할?", "고객님의 전담 비서로서 자산 관리부터 기술 브리핑까지 모든 영역을 보조합니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 세계 소외계층에게 무상 AI 교육을 제공합니다."],
                ["🏥 나노 메디컬 병원", "암과 난치병을 정복하는 의료 시스템을 구축합니다."],
                ["🏠 에너지 자립 스마트홈", "핵융합 기술로 주거비 제로 시대를 실현합니다."],
                ["🎓 미래 기술 인재 장학금", "혁신 인재들에게 연구비와 생활비를 전액 지원합니다."],
                ["🤖 1가정 1로봇 무상 보급", "휴머노이드를 보급하여 인류를 노동에서 해방합니다."]
            ]
        },
        en: {
            title: "HK WORLD BANK", subtitle: "GLOBAL LEDGER", gcv: "Value: $ 125,663,600 (GCV)", faq_btn: "AI Support Center (FAQ 20)", vision_btn: "HK Foundation Vision 2030",
            welcome: "Welcome! I am BBINI from HK World Bank support. How can I help you today?",
            chat_ph: "Type your question...",
            faqs: [
                ["Security?", "Top-tier security with quantum encryption and Hyperledger DLT."],
                ["Pi Integration?", "Real-time sync via Pi SDK, identical to Mainnet."],
                ["UBI?", "30% of HK Group profits are distributed globally."],
                ["Robot Supply?", "Distributed sequentially via app applications after production."],
                ["Free Housing?", "High-tech clusters starting from Ulsan-Gyeongju-Pohang."]
                // ... (영어 데이터 20개 매칭 가능)
            ],
            visions: [
                ["🏫 HK Global AI School", "Free AI education for the underprivileged."],
                ["🤖 1 Family, 1 Robot", "Liberating humanity from labor."]
            ]
        }
        // ... zh, ja, vi 등 나머지 언어 데이터를 동일한 형식으로 확장
    };

    let currentLang = 'ko';

    function changeLanguage() {
        currentLang = document.getElementById('lang-selector').value;
        const set = i18n[currentLang] || i18n['ko'];
        
        document.getElementById('txt-title').innerText = set.title;
        document.getElementById('txt-subtitle').innerText = set.subtitle;
        document.getElementById('txt-gcv').innerText = set.gcv;
        document.getElementById('btn-faq').innerText = set.faq_btn;
        document.getElementById('btn-vision').innerText = set.vision_btn;
        document.getElementById('chat-welcome').innerText = set.welcome;
        document.getElementById('chat-in').placeholder = set.chat_ph;

        renderFAQ(set.faqs);
        renderVision(set.visions);
    }

    function renderFAQ(faqs) {
        const list = document.getElementById('faq-list');
        list.innerHTML = faqs.map((f, i) => `
            <div class="faq-item">
                <div class="faq-q">${i+1}. ${f[0]}</div>
                <div class="faq-a">${f[1]}</div>
            </div>
        `).join('');
    }

    function renderVision(visions) {
        const list = document.getElementById('vision-list');
        list.innerHTML = visions.map(v => `
            <div class="vision-item"><b>${v[0]}</b><br>${v[1]}</div>
        `).join('');
    }

    function sendMsg() {
        const input = document.getElementById('chat-in');
        if(!input.value) return;
        const resBox = document.getElementById('chat-res');
        const userMsg = input.value;

        resBox.innerHTML += `<div class="msg-box msg-user">${userMsg}</div>`;

        // 고객 질문에 대한 FAQ 매칭 로직
        const set = i18n[currentLang] || i18n['ko'];
        let answer = currentLang === 'ko' ? 
            "죄송합니다. 해당 질문에 대한 답변을 준비 중입니다. FAQ 리스트를 확인해 주세요." : 
            "I'm sorry. I'm preparing an answer for that. Please check the FAQ list.";

        set.faqs.forEach(f => {
            const keyword = f[0].replace('?', '').split(' ')[0]; // 첫 단어 키워드 매칭
            if(userMsg.includes(keyword)) answer = f[1];
        });

        setTimeout(() => {
            resBox.innerHTML += `<div class="msg-box msg-bbini">${answer}</div>`;
            resBox.scrollTop = resBox.scrollHeight;
        }, 500);
        input.value = "";
    }

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }
    function openChat() { document.getElementById('chat-window').style.display = 'flex'; }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    // 초기화
    changeLanguage();
</script>
</body>
</html>
