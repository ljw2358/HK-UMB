<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-WORLD BANK: REAL-TIME LEDGER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* HK-WorldBank 브랜드 색상 및 스타일 */
        :root { 
            --main-gold: #ffd700; 
            --bg-black: #0a0a0b; 
            --card-gray: #1a1a1c; 
            --text-gray: #a0a0a2; 
            --white: #ffffff; 
            --shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .wrapper { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            position: relative; 
            padding-bottom: 100px; /* 푸터 여유 */
        }
        
        /* 다국어 선택 (상단 고정) */
        .lang-select { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: none; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 8px; 
            padding: 5px; 
            font-size: 12px; 
            z-index: 100; 
        }
        
        /* 헤더 & GCV 표시 */
        header { 
            padding: 60px 20px 30px; 
            text-align: center; 
        }
        .brand-logo { 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--main-gold); 
            letter-spacing: 1px; 
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3); 
        }
        .gcv-badge { 
            margin-top: 10px; 
            font-size: 16px; 
            color: var(--text-gray); 
            font-weight: 500; 
        }
        
        /* 메인 자산 카드 */
        .asset-card { 
            background: var(--card-gray); 
            margin: 0 20px; 
            padding: 40px 30px; 
            border-radius: 28px; 
            text-align: center; 
            box-shadow: var(--shadow); 
            border: 1px solid #2a2a2c; 
        }
        .ledger-label { 
            color: var(--text-gray); 
            font-size: 15px; 
            font-weight: 500; 
            margin-bottom: 15px; 
        }
        .asset-val { 
            font-size: 48px; 
            font-weight: 800; 
            color: var(--main-gold); 
            letter-spacing: -1px; 
        }
        
        /* 8가지 핵심 활동 그리드 */
        .grid-6 { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            padding: 40px 20px; 
        }
        .grid-box { 
            background: #222; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s ease-in-out; 
            border: 1px solid #333; 
        }
        .grid-box:active { 
            transform: scale(0.95); 
            background: var(--main-gold); 
        }
        .grid-box:active i, .grid-box:active span { 
            color: #000; 
        }
        .grid-box i { 
            font-size: 26px; 
            color: var(--main-gold); 
            margin-bottom: 10px; 
            display: block; 
        }
        .grid-box span { 
            font-size: 12px; 
            color: var(--text-gray); 
            font-weight: 600; 
        }

        /* 스테이킹 & 기본소득 실시간 정보 */
        .status-info { 
            background: #111; 
            margin: 0 20px; 
            padding: 25px; 
            border-radius: 24px; 
            border-left: 5px solid var(--main-gold); 
            box-shadow: var(--shadow); 
        }
        .stat-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
        }
        .stat-title { 
            font-size: 14px; 
            color: var(--text-gray); 
        }
        .stat-num { 
            font-size: 14px; 
            color: var(--white); 
            font-weight: 700; 
        }

        /* 하단 푸터 */
        footer { 
            margin-top: auto; 
            padding: 50px 20px; 
            text-align: center; 
            font-size: 12px; 
            color: #666; 
            border-top: 1px solid #222; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <select class="lang-select" id="langSel" onchange="applyLang()">
            <option value="ko">한국어 (APY 10%)</option>
            <option value="en">English (APY 10%)</option>
            <option value="zh">中文 (APY 10%)</option>
            <option value="ja">日本語 (APY 10%)</option>
            <option value="vi">Tiếng Việt (APY 10%)</option>
        </select>

        <header>
            <div class="brand-logo">HK WORLD BANK</div>
            <div class="gcv-badge">1 GCV = $314,159</div>
        </header>

        <div class="asset-card">
            <div class="ledger-label" id="ld-ledger">예치 자산/원장</div>
            <div class="asset-val"><span id="asset-val">100.0000</span> π</div>
        </div>

        <div class="grid-6">
            <div class="grid-box"><i class="fa fa-paper-plane"></i><span data-key="send">보내기</span></div>
            <div class="grid-box"><i class="fa fa-qrcode"></i><span data-key="receive">받기</span></div>
            <div class="grid-box"><i class="fa fa-shopping-cart"></i><span data-key="reward">보상</span></div>
            <div class="grid-box"><i class="fa fa-university"></i><span data-key="staking">스테이킹</span></div>
            <div class="grid-box"><i class="fa fa-shield-alt"></i><span data-key="security">보안</span></div>
            <div class="grid-box"><i class="fa fa-wallet"></i><span data-key="wallet">지갑</span></div>
            <div class="grid-box"><i class="fa fa-users"></i><span data-key="community">커뮤니티</span></div>
            <div class="grid-box" onclick="alert('기본소득 배분 로직 가동!')"><i class="fa fa-gift"></i><span data-key="income">기본소득</span></div>
        </div>

        <div class="status-info">
            <div class="stat-item">
                <span class="stat-title" id="ld-st-title">Staking 10% 적립중</span>
                <span class="stat-num" id="ld-st-val">148,424,935,649.577 π</span>
            </div>
            <div class="stat-item">
                <span class="stat-title">활동 기반 배분(UBI)</span>
                <span class="stat-num">LIVE ACTIVE</span>
            </div>
        </div>

        <footer>
            <p>Chairman: Lee Jaewan (Hyekong)<br>&copy; 2026 HK GROUP. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        // 8가지 핵심 언어 및 데이터 설정 (테스트용)
        const langs = {
            ko: { ledger: "예치 자산/원장", send: "보내기", receive: "받기", reward: "보상", staking: "스테이킹", security: "보안", wallet: "지갑", community: "커뮤니티", income: "기본소득", st_title: "Staking 10% 적립중" },
            en: { ledger: "Staked Assets/Ledger", send: "Send", receive: "Receive", reward: "Reward", staking: "Staking", security: "Security", wallet: "Wallet", community: "Community", income: "Basic Income", st_title: "Staking 10% Active" },
            zh: { ledger: "质押资产/账本", send: "发送", receive: "接收", reward: "奖励", staking: "质押", security: "安全", wallet: "钱包", community: "社区", income: "基本收入", st_title: "质押 10% 激活" },
            ja: { ledger: "預け入れ資産/台帳", send: "送信", receive: "受信", reward: "報酬", staking: "ステーキング", security: "セキュリティ", wallet: "ウォレット", community: "コミュニティ", income: "基本所得", st_title: "ステーキング 10% 稼働中" },
            vi: { ledger: "Tài sản đã đặt cọc/Sổ cái", send: "Gửi", receive: "Nhận", reward: "Phần thưởng", staking: "Staking", security: "Bảo mật", wallet: "Ví", community: "Cộng đồng", income: "Thu nhập cơ bản", st_title: "Staking 10% Đang hoạt động" }
        };

        function applyLang() {
            const l = document.getElementById('langSel').value;
            const d = langs[l] || langs['en'];
            document.getElementById('ld-ledger').innerText = d.ledger;
            document.getElementById('ld-st-title').innerText = d.st_title;
            
            document.querySelectorAll('.grid-box span').forEach(span => {
                const key = span.getAttribute('data-key');
                if(d[key]) span.innerText = d[key];
            });
        }

        // 원장 숫자 실시간 변환/배치 로직
        // 스테이킹(10% APY)과 유저 활동에 따라 숫자가 실시간으로 올라가는 시뮬레이션입니다.
        let baseAmount = 148424935649.577; // 총 예치량
        let myAsset = 100.0000; // 내 자산

        setInterval(() => {
            // 스테이킹 및 유저 활동에 따른 수량 자동 증가 (실시간 반영)
            // 실제 로직은 서버와 연동되어야 하지만, 여기서는 시뮬레이션으로 보여줍니다.
            baseAmount += Math.random() * 0.1; // 총량은 조금씩 계속 증가
            myAsset += (100 * 0.1 / (365 * 24 * 60 * 60 / 3)); // 3초마다 내 스테이킹 이자 반영
            
            // 활동 기반 배분 시뮬레이션 (유저가 버튼을 누를 때마다 올라가는 로직을 추가할 수 있습니다.)
            
            document.getElementById('ld-st-val').innerText = baseAmount.toLocaleString(undefined, {minimumFractionDigits: 3}) + " π";
            document.getElementById('asset-val').innerText = myAsset.toFixed(4);
        }, 3000); // 3초마다 원장 업데이트

        // 초기 실행
        applyLang();
    </script>
</body>
</html>
