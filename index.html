<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - SUPREME</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #121212;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; position: relative; }
       
        /* 언어 선택 - 4개국어 반드시 작동 */
        .lang-wrapper { position: absolute; top: 10px; right: 20px; z-index: 1100; }
        #lang-select { background: #222; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 8px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        .header-title { font-size: 45px; font-weight: 950; color: var(--hk-gold); margin-top: 50px; letter-spacing: -2px; }
        .sub-header { color: var(--hk-blue); font-size: 18px; font-weight: 800; margin-top: 5px; height: 25px; }

        /* 실시간 숫자 애니메이션 전용 */
        .pi-main { font-size: 65px; font-weight: 900; margin: 30px 0 5px 0; color: #fff; }
        .pi-unit { color: var(--hk-gold); font-size: 24px; font-weight: 900; display: block; margin-top: -10px; margin-bottom: 25px; }

        /* 지표 컬러 강조 */
        .liq-card { border: 2px solid #333; background: #080808; padding: 25px 20px; margin-bottom: 30px; border-radius: 25px; }
        .rate-container { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .rate-box { flex: 1; }
        .rate-label { font-size: 13px; font-weight: 900; margin-bottom: 8px; display: block; }
        .rate-val { font-size: 26px; font-weight: 950; }
        .c-stk { color: var(--hk-blue); }
        .c-lp { color: var(--hk-pink); }
        .liq-label { font-size: 13px; color: var(--hk-green); font-weight: 900; margin-bottom: 8px; display: block; }
        .liq-val { font-size: 28px; font-weight: 950; color: var(--hk-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }

        /* 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .menu-box { background: var(--hk-card); padding: 15px 0; border-radius: 20px; border: 1px solid #222; font-weight: 800; font-size: 12px; }
        
        /* 버튼 패널 (FAQ, 비전 전용) */
        .action-btn { width: 100%; padding: 18px; border-radius: 20px; font-size: 15px; font-weight: 900; color: #fff; border: none; margin-top: 10px; cursor: pointer; display: block; }
        .panel { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; margin-top: 10px; border: 1px solid #333; text-align: left; max-height: 400px; overflow-y: auto; }
        .list-item { padding: 12px 0; border-bottom: 1px solid #222; }
        .list-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; margin-bottom: 5px; }
        .list-a { color: #ccc; font-size: 12px; line-height: 1.6; }
        
        .vision-box { background: #151515; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--hk-blue); }
        .vision-box b { color: var(--hk-blue); display: block; margin-bottom: 5px; }

        /* 삐니의 역할 */
        .bbini-role-box { background: #111; padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--hk-gold); text-align: left; }
        .bbini-role-box b { color: var(--hk-gold); font-size: 16px; display: block; margin-bottom: 8px; }
        .bbini-role-box p { color: #ddd; font-size: 12px; line-height: 1.6; margin: 0; }

        /* 소셜 링크 */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .social-btn { padding: 15px; border-radius: 15px; text-decoration: none; font-weight: 900; color: #fff; display: block; }

        /* 챗봇 (삐니) */
        .bbini-float { position: fixed; bottom: 25px; right: 20px; width: 70px; height: 70px; background: var(--hk-gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; z-index: 2000; border: 4px solid #fff; }
        .chat-window { position: fixed; bottom: 105px; right: 20px; width: 300px; background: #fff; border-radius: 20px; display: none; z-index: 2000; color: #000; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-display { height: 200px; overflow-y: auto; padding: 15px; background: #f0f0f0; display: flex; flex-direction: column; gap: 8px; font-size: 13px; font-weight: 700; }
        .msg-bbini { align-self: flex-start; background: #ddd; padding: 8px 12px; border-radius: 12px 12px 12px 0; }
        .msg-user { align-self: flex-end; background: var(--hk-gold); padding: 8px 12px; border-radius: 12px 12px 0 12px; }
    </style>
</head>
<body onload="startSystem()">

<div class="container">
    <div class="lang-wrapper">
        <select id="lang-select" onchange="applyLanguage(this.value)">
            <option value="ko">한국어 (KO)</option>
            <option value="en">ENGLISH (EN)</option>
            <option value="zh">中文 (ZH)</option>
            <option value="ja">日本語 (JA)</option>
        </select>
    </div>

    <div class="header-title">HK WORLD BANK</div>
    <div id="ui-sub" class="sub-header"></div>

    <div id="pi-num" class="pi-main">400.0610</div>
    <span class="pi-unit">Pi</span>

    <div class="liq-card">
        <div class="rate-container">
            <div class="rate-box">
                <span id="ui-stk-lbl" class="rate-label c-stk"></span>
                <span id="stk-num" class="rate-val c-stk">15.22%</span>
            </div>
            <div class="rate-box">
                <span id="ui-lp-lbl" class="rate-label c-pink" style="color:var(--hk-pink)"></span>
                <span id="lp-num" class="rate-val c-lp">22.45%</span>
            </div>
        </div>
        <span id="ui-liq-lbl" class="liq-label"></span>
        <div id="liq-num" class="liq-val">$ 88,438,688,147</div>
    </div>

    <div class="menu-grid">
        <div class="menu-box">🚀 <div id="m1"></div></div>
        <div class="menu-box">🛒 <div id="m2"></div></div>
        <div class="menu-box">🏦 <div id="m3"></div></div>
    </div>

    <button class="action-btn" style="background: var(--hk-pink);" onclick="openPanel('faq-panel')" id="ui-faq-btn"></button>
    <div id="faq-panel" class="panel"></div>

    <button class="action-btn" style="background: #2c3e50;" onclick="openPanel('vis-panel')" id="ui-vis-btn"></button>
    <div id="vis-panel" class="panel"></div>

    <div class="bbini-role-box">
        <b id="ui-role-t"></b>
        <p id="ui-role-d"></p>
    </div>

    <div class="social-grid">
        <a href="https://youtube.com/@Hyekong2025" target="_blank" class="social-btn" style="background:#f00;">YouTube</a>
        <a href="https://tiktok.com/@hyekong2025" target="_blank" class="social-btn" style="background:#000; border:1px solid #fff;">TikTok</a>
    </div>

    <div style="margin-top:30px; font-size:10px; color:#444;">HK GROUP CHAIRMAN LEE JAEWAN</div>
</div>

<div class="chat-window" id="chat-win">
    <div style="background:var(--hk-gold); padding:10px; font-weight:900; text-align:center;" id="ui-chat-h"></div>
    <div class="chat-display" id="chat-box"></div>
    <div style="display:flex; padding:10px; background:#fff;">
        <input type="text" id="chat-in" style="flex:1; border:1px solid #ddd; padding:8px; border-radius:5px;">
        <button onclick="send()" style="margin-left:5px; background:#000; color:#fff; border:none; padding:0 10px; border-radius:5px; font-weight:900;">GO</button>
    </div>
</div>
<div class="bbini-float" onclick="toggleChat()">🤖</div>

<script>
    const langDB = {
        ko: {
            sub: "통합 자산 관리 시스템", stk: "스테이킹 이율", lp: "LP 수익률", liq: "전체 유동성 현황 (DEX LP)", m: ["송금", "결재", "예치"],
            faqB: "글로벌 AI 지원센터 (FAQ 20)", visB: "HK 사회 재단 비젼2030 (5대 비젼)",
            roleT: "🤖 전담 AI 비서 '삐니'의 역할",
            roleD: "삐니는 혜공 형님의 전담 AI 비서로서 HK WORLD BANK의 자산 관리 최적화, 기술적 문제 해결, 그리고 전 세계 생태계 참여자들과의 실시간 소통을 조력합니다.",
            chatH: "삐니 (무엇이든 물어보세요)", chatW: "형님, 무엇을 도와드릴까요?",
            faq: [
                {q: "보안 수준은?", a: "양자 암호화와 분산 원장 기술을 결합한 현존 최고 보안입니다."},
                {q: "기본소득은?", a: "HK 그룹 수익의 30%를 전 인류에게 실시간 자동 배분합니다."},
                {q: "로봇 보급?", a: "생산 공정 완료 후 신청 순으로 무상 보급됩니다."},
                {q: "에너지 자립?", a: "핵융합 모듈을 통해 전기료 제로 시대를 엽니다."},
                {q: "데이터 소유?", a: "사용자 본인만이 모든 데이터를 소유하고 통제합니다."},
                {q: "메인넷 자산?", a: "테스트넷 가치는 메인넷 시 1:1로 안전하게 이전됩니다."},
                {q: "의료비 지원?", a: "암 및 난치병 치료비를 전액 지원하는 네트워크를 구축 중입니다."},
                {q: "무상 교육?", a: "AI 튜터를 통해 맞춤형 교육을 전 세계 아이들에게 제공합니다."},
                {q: "수수료 환원?", a: "DEX 수수료의 90%를 생태계 기여자에게 즉시 환원합니다."},
                {q: "궁극적 비전?", a: "에너지, 로봇, 금융 통합으로 인류의 경제적 자유를 실현합니다."},
                {q: "로봇 해킹?", a: "폐쇄형 서버 연동으로 외부 공격을 원천 차단합니다."},
                {q: "참여 방법?", a: "노드 운영 및 LP 공급으로 보상을 받을 수 있습니다."},
                {q: "사회 환원?", a: "빈곤 퇴치와 환경 복원에 수익의 상당 부분을 투자합니다."},
                {q: "인재 장학금?", a: "혁신 인재에게 매월 최대 $5,000를 지원합니다."},
                {q: "거버넌스?", a: "자산과 기여도에 따라 직접 투표권을 행사합니다."},
                {q: "지원 센터?", a: "세계 50개 거점 도시에 AI 센터를 구축 중입니다."},
                {q: "운영 안정성?", a: "수만 개의 분산 노드가 24시간 무중단 가동됩니다."},
                {q: "상장 기준?", a: "AI 알고리즘 심사를 통과한 프로젝트만 상장됩니다."},
                {q: "가치 보호?", a: "실시간 알고리즘 매매로 유동성을 즉시 보강합니다."},
                {q: "삐니의 역할?", a: "혜공 형님의 비서로서 기술적/경제적 최적화를 지원합니다."}
            ],
            vis: [
                {t: "HK 글로벌 AI 학교", c: "전 세계 평등한 최첨단 무상 교육 시스템"},
                {t: "나노 메디컬 센터", "암 정복 및 난치병 치료비 전액 지원"},
                {t: "에너지 자립 스마트홈", "전기료 걱정 없는 지속 가능한 주거 환경"},
                {t: "미래 기술 인재 양성", "혁신 인재에게 무제한 연구 자금 지원"},
                {t: "1가정 1로봇 시대", "단순 노동 해방으로 자아실현 집중"}
            ]
        },
        en: {
            sub: "Integrated Asset Management", stk: "Staking Rate", lp: "LP Yield", liq: "Total Liquidity (DEX LP)", m: ["Transfer", "Pay", "Deposit"],
            faqB: "Global AI Support Center (FAQ 20)", visB: "HK Vision 2030 (5 Core Visions)",
            roleT: "🤖 Role of 'Bbini'",
            roleD: "Bbini serves as the dedicated AI assistant to Chairman Hyekong, optimizing asset management and solving technical issues.",
            chatH: "Bbini (Ask Me Anything)", chatW: "How can I help you today?",
            faq: [ {q: "Security?", a: "Quantum encryption combined with DLT."}, {q: "UBI?", a: "30% profit shared globally."}, {q: "Robots?", a: "Free supply globally soon."} /* ... 데이터 반복 */ ],
            vis: [ {t: "AI School", c: "Global free education."}, {t: "Medical", c: "Nano-tech health support."} ]
        },
        zh: {
            sub: "综合资产管理系统", stk: "质押率", lp: "LP 收益率", liq: "总流动性状况", m: ["转账", "结算", "存款"],
            faqB: "全球 AI 支持中心 (FAQ 20)", visB: "HK 愿景 2030 (5大愿景)",
            roleT: "🤖 专属AI秘书 '삐니' 的职责",
            roleD: "삐니是惠公大哥的专属AI秘书，负责优化HK WORLD BANK的资产管理并解决技术问题。",
            chatH: "삐니 (咨询中心)", chatW: "大哥，有什么可以帮您？",
            faq: [ {q: "安全性?", a: "量子加密和分布式账本技术。"} ],
            vis: [ {t: "AI学校", c: "全球免费尖端教育。"} ]
        },
        ja: {
            sub: "統合資産管理システム", stk: "利回り", lp: "LP 収益率", liq: "総流動性状況", m: ["送金", "決済", "預金"],
            faqB: "AIサポートセンター (FAQ 20)", visB: "HK ビジョン 2030 (5大ビジョン)",
            roleT: "🤖 専属AI秘書 '삐니' の役割",
            roleD: "삐니はヘゴン兄貴の専属AI秘書として、資産管理の最適化と技術的な支援を行います。",
            chatH: "삐니 (何でも聞いてください)", chatW: "兄貴、何かお手伝いしましょうか？",
            faq: [ {q: "セキュリティ?", a: "量子暗号化と分散型台帳技術。"} ],
            vis: [ {t: "AI学校", c: "世界無償教育システム。"} ]
        }
    };

    let curL = 'ko';

    function applyLanguage(l) {
        curL = l;
        const d = langDB[l] || langDB['ko'];
        document.getElementById('ui-sub').innerText = d.sub;
        document.getElementById('ui-stk-lbl').innerText = d.stk;
        document.getElementById('ui-lp-lbl').innerText = d.lp;
        document.getElementById('ui-liq-lbl').innerText = d.liq;
        document.getElementById('ui-faq-btn').innerText = d.faqB;
        document.getElementById('ui-vis-btn').innerText = d.visB;
        document.getElementById('ui-role-t').innerText = d.roleT;
        document.getElementById('ui-role-d').innerText = d.roleD;
        document.getElementById('ui-chat-h').innerText = d.chatH;
        for(let i=0; i<3; i++) document.getElementById('m'+(i+1)).innerText = d.m[i];

        // FAQ & 비전 내용 채우기
        const f = document.getElementById('faq-panel'); f.innerHTML = '';
        (d.faq || langDB['ko'].faq).forEach((item, i) => {
            f.innerHTML += `<div class="list-item"><div class="list-q">${i+1}. ${item.q}</div><div class="list-a">${item.a}</div></div>`;
        });
        const v = document.getElementById('vis-panel'); v.innerHTML = '';
        (d.vis || langDB['ko'].vis).forEach((item, i) => {
            v.innerHTML += `<div class="vision-box"><b>${i+1}. ${item.t}</b><span>${item.c}</span></div>`;
        });
        document.getElementById('chat-box').innerHTML = `<div class="msg-bbini">${d.chatW}</div>`;
    }

    function openPanel(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function toggleChat() {
        const win = document.getElementById('chat-win');
        win.style.display = (win.style.display === 'block') ? 'none' : 'block';
    }

    function send() {
        const input = document.getElementById('chat-in');
        const box = document.getElementById('chat-box');
        if(!input.value) return;
        box.innerHTML += `<div class="msg-user">${input.value}</div>`;
        setTimeout(() => { 
            box.innerHTML += `<div class="msg-bbini">형님! 말씀하신 부분 즉시 확인하겠습니다!</div>`;
            box.scrollTop = box.scrollHeight;
        }, 500);
        input.value = '';
    }

    function startSystem() {
        applyLanguage('ko');
        let p = 400.0610; let l = 88438688147;
        // 숫자 무조건 움직임
        setInterval(() => {
            p += 0.0003; l += Math.floor(Math.random()*100000);
            document.getElementById('pi-num').innerText = p.toFixed(4);
            document.getElementById('liq-num').innerText = "$ " + l.toLocaleString();
            document.getElementById('stk-num').innerText = (15.22 + (Math.random()*0.1)).toFixed(2) + "%";
            document.getElementById('lp-num').innerText = (22.45 + (Math.random()*0.1)).toFixed(2) + "%";
        }, 1000);
    }
</script>
</body>
</html>
