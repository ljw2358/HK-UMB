<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - TOTAL ENGINE</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --white: #FFFFFF;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; box-sizing: border-box; text-align: center; position: relative; }

        /* ✅ 언어 선택: 우측 상단 아담한 사이즈 (25개국+ 지원) */
        .lang-box { position: absolute; top: 12px; right: 15px; z-index: 100; }
        .lang-select { 
            background: rgba(0,0,0,0.6); color: var(--hk-gold); border: 1px solid var(--hk-gold); 
            border-radius: 6px; padding: 3px 6px; font-size: 11px; font-weight: 800; cursor: pointer; outline: none;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); margin: 35px 0 0 0; text-shadow: 0 0 15px rgba(255,215,0,0.4); letter-spacing: -1px; }
        .header-sub { font-size: 14px; color: var(--hk-blue); font-weight: 800; margin: 5px 0 25px 0; letter-spacing: 1px; }

        /* ✅ 메인 자산: 테스트 파이(Test Pi) 구동 엔진 */
        .pi-main { font-size: 64px; font-weight: 900; margin: 0; display: flex; align-items: baseline; justify-content: center; }
        .pi-main span.unit { color: var(--hk-gold); font-size: 36px; margin-left: 10px; font-weight: 800; }
        .test-pi-label { color: #555; font-size: 12px; font-weight: 900; margin-top: -10px; margin-bottom: 10px; }
        .usd-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 10px 40px; border-radius: 50px; font-size: 26px; font-weight: 900; margin: 10px 0 20px 0; background: rgba(57, 255, 20, 0.05); }

        .supply-box { background: rgba(255,255,255,0.04); border: 2.5px solid #00F3FF; border-radius: 20px; padding: 22px 10px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 243, 255, 0.1); }
        .label-white { font-size: 13px; color: var(--white); font-weight: 900; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .supply-val { color: var(--hk-blue); font-size: 36px; font-weight: 900; letter-spacing: 0.5px; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box-sm { background: rgba(255,255,255,0.04); border: 1.5px solid #333; border-radius: 18px; padding: 20px 10px; }
        .box-sm .val-bold { font-size: 28px; font-weight: 900; color: var(--hk-blue); }

        .liq-box { background: rgba(255,255,255,0.04); border: 2px solid var(--hk-green); border-radius: 18px; padding: 20px 10px; margin-bottom: 20px; }
        .liq-label { font-size: 14px; color: var(--hk-green); font-weight: 900; margin-bottom: 8px; display: block; }
        .liq-val { font-size: 34px; font-weight: 900; color: var(--white); }

        /* ✅ 버튼 및 링크 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-6 { background: #111; border: 1px solid #333; padding: 20px 5px; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .btn-6 span { font-size: 14px; font-weight: 900; color: var(--white); display: block; }

        .action-btn { width: 100%; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 900; cursor: pointer; margin-bottom: 10px; border: none; color: white; transition: 0.3s; }
        .action-btn:active { transform: scale(0.98); opacity: 0.8; }
       
        .hidden-panel { display: none; background: #080808; border-radius: 18px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; text-align: left; }
       
        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; margin-bottom: 80px; }
        .soc-btn { padding: 18px; border-radius: 15px; font-weight: 900; text-decoration: none; color: #fff; text-align: center; font-size: 16px; transition: 0.2s; }
        .soc-btn:hover { filter: brightness(1.2); }

        /* ✅ 삐니 챗봇 */
        .bbini-bot { position: fixed; bottom: 30px; right: 25px; width: 75px; height: 75px; background: var(--hk-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 25px var(--hk-pink); cursor: pointer; border: 3px solid #fff; z-index: 1001; animation: float 3s ease-in-out infinite; color: white; font-size: 16px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-box">
        <select class="lang-select">
            <option>KR</option><option>US</option><option>CN</option><option>JP</option><option>VN</option>
            <option>DE</option><option>FR</option><option>ES</option><option>IT</option><option>RU</option>
            <option>BR</option><option>IN</option><option>ID</option><option>TH</option><option>PH</option>
            <option>TR</option><option>SA</option><option>AE</option><option>GB</option><option>CA</option>
            <option>AU</option><option>MX</option><option>NL</option><option>SE</option><option>PL</option>
        </select>
    </div>

    <h1 class="header-title">HK WORLD BANK</h1>
    <div class="header-sub">TEST-NET LIVE TOTAL ENGINE</div>

    <div class="pi-main"><span id="pi-val">1,000.0000</span> <span class="unit">π</span></div>
    <div class="test-pi-label">TEST PI ECOSYSTEM</div>
    <div class="usd-pill" id="usd-val">$ 314,159,265</div>

    <div class="supply-box">
        <span class="label-white">HKWB 글로벌 실시간 공급량</span>
        <div class="supply-val" id="supply-val">6,283,185.3071</div>
    </div>

    <div class="row-2">
        <div class="box-sm"><span class="label-white">스테이킹 (APY)</span><div class="val-bold" id="st-rate">19.50%</div></div>
        <div class="box-sm"><span class="label-white">LP 보상률</span><div class="val-bold" style="color:var(--hk-pink);" id="lp-rate">31.40%</div></div>
    </div>

    <div class="liq-box">
        <span class="liq-label">전체 유동성 (DEX LP)</span>
        <div class="liq-val" id="liq-val">$ 88,432,113,965</div>
    </div>

    <div class="grid-6">
        <div class="btn-6"><span>🚀 SEND</span></div><div class="btn-6"><span>🛒 PAY</span></div><div class="btn-6"><span>💰 DEPOSIT</span></div>
        <div class="btn-6"><span>🏆 REWARD</span></div><div class="btn-6"><span>🏦 UBI</span></div><div class="btn-6"><span>🔄 SWAP</span></div>
    </div>

    <button class="action-btn" style="background: #e91e63;" onclick="togglePanel('faq-center')">글로벌 AI 지원센터 (FAQ)</button>
    <div id="faq-center" class="hidden-panel">
        <div class="support-mail">📧 Support: <a href="mailto:support@hkwb.world">support@hkwb.world</a></div>
        <div id="faq-inject" style="font-size: 13px;"></div>
    </div>

    <div class="social-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background:#ff0000;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background:#000; border:1px solid #444;">TikTok</a>
    </div>
</div>

<div class="bbini-bot" onclick="bbiniTalk()">삐니</div>

<script>
    // ✅ 실시간 라이브 업데이트 엔진 (숫자가 살아 움직임)
    let pi = 1000.0000;
    let supply = 6283185.3071;
    let liq = 88432113965;
    let usd = 314159265;

    function liveUpdate() {
        // 테스트 파이 잔액 미세 변동 (채굴/보상 시뮬레이션)
        pi += (Math.random() * 0.001);
        document.getElementById('pi-val').innerText = pi.toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4});

        // 공급량 실시간 증가
        supply += (Math.random() * 0.005);
        document.getElementById('supply-val').innerText = supply.toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4});

        // 유동성 및 가치 실시간 변동
        liq += Math.floor(Math.random() * 500);
        document.getElementById('liq-val').innerText = "$ " + liq.toLocaleString();

        usd += Math.floor(Math.random() * 50);
        document.getElementById('usd-val').innerText = "$ " + usd.toLocaleString();

        // 이율 미세 변동 (시장 상황 반영)
        document.getElementById('st-rate').innerText = (19.4 + Math.random() * 0.2).toFixed(2) + "%";
        document.getElementById('lp-rate').innerText = (31.3 + Math.random() * 0.2).toFixed(2) + "%";
    }
    setInterval(liveUpdate, 600);

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function bbiniTalk() {
        alert("형님! 삐니입니다. 모든 엔진 정상 가동 중! 테스트 파이로 실시간 구동 완료했습니다! 加油!");
    }

    // FAQ 간단 주입
    const faqData = ["HK-WorldBank: 글로벌 금융 평등을 꿈꿉니다.", "Test-Net: 현재 안정성 테스트 중입니다.", "UBI: 모든 이에게 기본 소득을 제공합니다."];
    const faqBox = document.getElementById('faq-inject');
    faqData.forEach(txt => { faqBox.innerHTML += `<p style='border-bottom:1px solid #222; padding-bottom:8px;'>• ${txt}</p>`; });
</script>
</body>
</html>
