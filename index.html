<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - THE ETERNAL</title>
    <style>
        :root { 
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF; 
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d; 
        }
        body { 
            background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        
        .header { display: flex; justify-content: flex-end; width: 100%; margin-bottom: 20px; }
        .lang-select { 
            background: #111; border: 2px solid var(--hk-gold); padding: 10px; 
            border-radius: 12px; font-size: 13px; font-weight: bold; color: var(--hk-gold); cursor: pointer;
        }

        .title-main { color: var(--hk-gold); font-size: 38px; font-weight: 900; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .subtitle { color: var(--hk-blue); font-size: 15px; font-weight: bold; margin-bottom: 40px; letter-spacing: 1px; }

        /* 숫자 애니메이션 스타일 */
        .pi-val { font-size: 65px; font-weight: 900; color: #fff; margin: 10px 0; text-shadow: 0 0 20px var(--hk-gold); }
        .pi-unit { color: var(--hk-gold); font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .gcv-box { border: 2px solid var(--hk-green); border-radius: 50px; padding: 15px; color: var(--hk-green); font-weight: bold; margin-bottom: 30px; font-size: 18px; }

        /* 대시보드 (DEX, LP) */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .dash-card { background: var(--hk-card); border: 1px solid #222; padding: 20px; border-radius: 20px; border-bottom: 3px solid var(--hk-gold); }
        .dash-lab { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        .dash-num { font-size: 24px; font-weight: 900; }

        .liq-box { border: 1px solid var(--hk-blue); background: rgba(0,243,255,0.05); padding: 25px; border-radius: 20px; margin-bottom: 35px; }
        .liq-num { font-size: 32px; font-weight: 900; color: var(--hk-green); margin-top: 5px; }

        /* 6대 메뉴 */
        .eco-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .eco-item { background: #111; padding: 20px 5px; border-radius: 18px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .eco-item:hover { border-color: var(--hk-gold); transform: translateY(-5px); }
        .eco-icon { font-size: 28px; margin-bottom: 10px; display: block; }
        .eco-text { font-size: 12px; font-weight: bold; }

        /* FAQ & VISION 버튼 */
        .btn-large { width: 100%; padding: 22px; border-radius: 20px; font-weight: 900; font-size: 16px; margin-top: 15px; border: none; cursor: pointer; text-align: left; transition: 0.3s; }
        .btn-faq { background: var(--hk-pink); color: #fff; box-shadow: 0 10px 20px rgba(255,0,255,0.15); }
        .btn-vision { background: #1a1f2b; color: #fff; border: 1px solid #333; }
        
        .acc-content { display: none; background: #050505; padding: 25px; text-align: left; font-size: 14px; color: #ddd; border-radius: 0 0 20px 20px; border: 1px solid #222; line-height: 2.2; }
        b { color: var(--hk-gold); margin-right: 5px; }

        footer { margin-top: 60px; font-size: 12px; color: #555; padding-bottom: 100px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <select class="lang-select" id="langSelect" onchange="changeLanguage()">
            <option value="ko">🇰🇷 KOREAN</option>
            <option value="en">🇺🇸 ENGLISH</option>
            <option value="zh">🇨🇳 CHINESE</option>
        </select>
    </div>

    <div class="title-main">HK WORLD BANK</div>
    <div id="sub_title" class="subtitle">GLOBAL INTEGRATED LEDGER</div>

    <div class="pi-val" id="pi_num">0</div>
    <div class="pi-unit">Pi Network</div>
    <div class="gcv-box" id="gcv_box">Value: $ 125,663,600</div>

    <div class="dash-grid">
        <div class="dash-card">
            <div id="lab_staking" class="dash-lab">스테이킹 수익률</div>
            <div class="dash-num" style="color:var(--hk-blue)"><span id="num_staking">0</span>%</div>
        </div>
        <div class="dash-card">
            <div id="lab_swap" class="dash-lab">DEX 스왑 리워드</div>
            <div class="dash-num" style="color:var(--hk-pink)"><span id="num_swap">0</span>%</div>
        </div>
    </div>

    <div class="liq-box">
        <div id="lab_liq" class="dash-lab" style="color:var(--hk-blue)">TOTAL LIQUIDITY (HK-LP)</div>
        <div class="liq-num">$ <span id="num_liq">0</span></div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-icon">🚀</span><span id="m1" class="eco-text">송금</span></div>
        <div class="eco-item"><span class="eco-icon">🛒</span><span id="m2" class="eco-text">결제</span></div>
        <div class="eco-item"><span class="eco-icon">🏛️</span><span id="m3" class="eco-text">예치</span></div>
    </div>
    <div class="eco-grid" style="margin-bottom: 25px;">
        <div class="eco-item"><span class="eco-icon">🎁</span><span id="m4" class="eco-text">보상</span></div>
        <div class="eco-item"><span class="eco-icon">💳</span><span id="m5" class="eco-text">기본소득</span></div>
        <div class="eco-item"><span class="eco-icon">🔄</span><span id="m6" class="eco-text">스왑</span></div>
    </div>

    <button id="faq_btn" class="btn-large btn-faq" onclick="toggleAcc('faq')">GLOBAL AI SUPPORT (FAQ 20) ▼</button>
    <div id="faq" class="acc-content"></div>

    <button id="vis_btn" class="btn-large btn-vision" onclick="toggleAcc('vision')">HK FOUNDATION VISION 2030 ▼</button>
    <div id="vision" class="acc-content"></div>

    <footer>© 2026 HK GROUP BY HYEKONG</footer>
</div>

            m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑",

            visContent: "<b>1. AI 격차 해소:</b> 정보 소외 없는 기술 평등<br><b>2. 에너지 혁신:</b> 무한 청정 에너지 연구 지원<br><b>3. 인재 육성:</b> 차세대 우주·로봇 리더 양성<br><b>4. 의료 복지:</b> AI 기반 보편적 건강권 확보<br><b>5. 기술 윤리:</b> 도덕적 기술 표준 글로벌 선도"
        },
        en: {
            sub: "HUMANITY COEXISTENCE MAIN LEDGER",
            gcv: "GCV VALUE: $ 314,159,000",
            staking: "STAKING APY", swap: "DEX SWAP YIELD", liq: "TOTAL LIQUIDITY (HK-LP)",
            m1: "SEND", m2: "PAY", m3: "SAVE", m4: "REWARD", m5: "UBI", m6: "SWAP",
            faqTitle: "GLOBAL AI SUPPORT (FAQ 20) ▼",
            visTitle: "HK FOUNDATION VISION 2030 ▼",
            faqContent: `<b>Q1.</b> Purpose? Closing tech gaps & coexistence<br><b>Q2.</b> Targets? Global innovators & pioneers<br><b>Q3.</b> GPU? High-perf infrastructure allocation<br><b>Q4.</b> Apply? Open proposal submission<br><b>Q5.</b> Rights? Developer-centric ownership<br><b>Q6.</b> Hubs? Seoul & 7 Strategic Global Hubs<br><b>Q7.</b> Ethics? Human dignity as core value<br><b>Q8.</b> Robots? Supporting Figure AI & Humanoids<br><b>Q9.</b> Talent? AI expert training courses<br><b>Q10.</b> Consulting? Legal & BM design support<br><b>Q11.</b> Investment? HK Global Fund matching<br><b>Q12.</b> Security? Quantum-resistant encryption<br><b>Q13.</b> OpenSource? Free servers for public projects<br><b>Q14.</b> Ban? Instant cut for tech misuse<br><b>Q15.</b> Support? 24/7 global engineering team<br><b>Q16.</b> Language? Real-time multilingual collab<br><b>Q17.</b> Profit? Foundation reinvestment cycle<br><b>Q18.</b> Testing? Hardware & real-economy testbeds<br><b>Q19.</b> Community? Global developer forum<br><b>Q20.</b> Vision? 1 AI per person welfare`,
            visContent: "<b>1. Bridge AI Gap:</b> Tech equality for all<br><b>2. Energy:</b> Supporting clean fusion energy<br><b>3. Talent:</b> Raising space & robot leaders<br><b>4. Health:</b> AI-driven universal healthcare<br><b>5. Ethics:</b> Leading moral tech standards"
        },
        zh: {
            sub: "人类共生全球综合账本",
            gcv: "GCV 价值: ¥ 2,199,113,000",
            staking: "质押收益率", swap: "DEX 互换奖励", liq: "总流动性 (HK-LP)",
            m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "基本收入", m6: "互换",
            faqTitle: "全球 AI 支持中心 (FAQ 20) ▼",
            visTitle: "HK 社会基金会 2030 愿景 ▼",
            faqContent: `<b>Q1.</b> 宗旨? 消除技术差距与共生<br><b>Q2.</b> 对象? 全球创新合作伙伴<br><b>Q3.</b> GPU? 免费分配高性能基础设施<br><b>Q4.</b> 申请? 官方门户常时提交提案<br><b>Q5.</b> 权利? 开发者归属原则保护<br><b>Q6.</b> 据点? 首尔及全球7大战略枢纽<br><b>Q7.</b> 伦理? 人类尊严为核心价值<br><b>Q8.</b> 机器人? 支持 Figure AI 等项目<br><b>Q9.</b> 培训? 培养 AI 专业人才<br><b>Q10.</b> 咨询? 法律与商业模式支持<br><b>Q11.</b> 投资? HK 全球基金直接对接<br><b>Q12.</b> 安全? 提供抗量子加密环境<br><b>Q13.</b> 开源? 公益项目免费服务器<br><b>Q14.</b> 中止? 滥用技术时立即封禁<br><b>Q15.</b> 技术? 24/7 全球工程师在岗<br><b>Q16.</b> 语言? 实时多语言协作系统<br><b>Q17.</b> 利润? 社会基金会回馈循环<br><b>Q18.</b> 验证? 硬件与实体经济验证<br><b>Q19.</b> 社区? 运营全球开发者论坛<br><b>Q20.</b> 愿景? 实现全人类 1人 1AI`,
            visContent: "<b>1. 消除 AI 差距:</b> 技术平权<br><b>2. 能源创新:</b> 支持清洁能源研究<br><b>3. 人才培养:</b> 培养航天与机器人领袖<br><b>4. 医疗福利:</b> AI 普及健康权<br><b>5. 技术伦理:</b> 领跑全球道德标准"
        }
    };

    function animateValue(id, start, end, duration, decimals = 0) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const val = (progress * (end - start) + start).toFixed(decimals);
            obj.innerHTML = val.toLocaleString();
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang];

        document.getElementById('sub_title').innerText = t.sub;
        document.getElementById('gcv_box').innerText = t.gcv;
        document.getElementById('lab_staking').innerText = t.staking;
        document.getElementById('lab_swap').innerText = t.swap;
        document.getElementById('lab_liq').innerText = t.liq;
        document.getElementById('m1').innerText = t.m1; document.getElementById('m2').innerText = t.m2;
        document.getElementById('m3').innerText = t.m3; document.getElementById('m4').innerText = t.m4;
        document.getElementById('m5').innerText = t.m5; document.getElementById('m6').innerText = t.m6;
        document.getElementById('faq_btn').innerText = t.faqTitle;
        document.getElementById('faq').innerHTML = t.faqContent;
        document.getElementById('vis_btn').innerText = t.visTitle;
        document.getElementById('vision').innerHTML = t.visContent;

        // 숫자 다시 애니메이션 (뼈속까지 움직임)
        animateValue("pi_num", 0, 400.0220, 1500, 4);
        animateValue("num_staking", 0, 18.5, 1200, 1);
        animateValue("num_swap", 0, 24.5, 1200, 1);
        animateValue("num_liq", 0, 88438688147, 2000, 0);
    }

    function toggleAcc(id) {
        const target = document.getElementById(id);
        const active = target.style.display === 'block';
        document.querySelectorAll('.acc-content').forEach(el => el.style.display = 'none');
        target.style.display = active ? 'none' : 'block';
    }

    window.onload = changeLanguage;
</script>
</body>
</html>
