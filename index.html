<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global AI Hub</title>
    <style>
        :root {
            --bg: #000000;
            --card: #151515;
            --gold: #FFD700;
            --neon-st: #00FFCC; /* 스테이킹 칼라 */
            --neon-lp: #FF00FF; /* 유동성수익 칼라 */
            --neon-green: #39FF14;
            --neon-blue: #00BFFF;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }

        /* 다국어 선택기 */
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #langSelect { 
            background: #222; color: var(--gold); border: 2px solid var(--gold); 
            padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        #txt-ledger { color: #888; margin-top: 10px; font-size: 0.9rem; }

        /* 1, 2. 실시간 수치 칼라 글자 적용 */
        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; }
        .st-val { color: var(--neon-st); font-size: 1.6rem; font-weight: bold; text-shadow: 0 0 10px var(--neon-st); }
        .lp-val { color: var(--neon-lp); font-size: 1.6rem; font-weight: bold; text-shadow: 0 0 10px var(--neon-lp); }

        /* 전체 유동성 LP 공급 */
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { color: var(--neon-green); font-size: 1.8rem; font-weight: 1000; }

        /* 고객지원센터 버튼 */
        .center-btn {
            width: 100%; background: #222; color: white; padding: 18px; border-radius: 15px;
            border: 2px solid var(--gold); font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        /* 3. FAQ 1~11번 전체 노출 영역 */
        .faq-section { display: none; background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--gold); font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; }
        .faq-a { color: #ccc; font-size: 0.85rem; line-height: 1.5; }

        /* 소셜 미디어 */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .soc-btn { padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: bold; }

        /* 4. AI 비서 & 메시지 창 연결 */
        #ai-bot {
            position: fixed; bottom: 40px; right: 20px; width: 65px; height: 65px;
            background: #FF00FF; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; box-shadow: 0 0 20px #FF00FF;
            cursor: pointer; z-index: 1000; animation: bounce 3s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        /* 채팅 입력창 (평소 숨김) */
        #chat-input-box {
            display: none; position: fixed; bottom: 120px; right: 20px; width: 280px;
            background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        #chat-input-box input { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .ai-bubble { position: absolute; bottom: -45px; right: 0; background: var(--gold); color: black; padding: 8px 12px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
            <option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option>
            <option value="es">Español 🇪🇸</option>
            </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div style="font-size: 2.8rem; font-weight: bold; margin: 10px 0;">412.5545 <span style="color:var(--gold)">Pi</span></div>
        <div style="background: var(--neon-green); color: black; padding: 5px 15px; border-radius: 50px; display: inline-block; font-weight: bold;">Value: $ 314,159 (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card">
            <div id="txt-st-label" style="font-size:0.75rem; color:#888; margin-bottom:5px;">실시간 스테이킹 이율</div>
            <div class="st-val" id="live-st">17.38%</div>
        </div>
        <div class="rate-card">
            <div id="txt-lp-label" style="font-size:0.75rem; color:#888; margin-bottom:5px;">실시간 유동성 수익</div>
            <div class="lp-val" id="live-lp">24.44%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp" style="font-size:0.9rem; margin-bottom:10px;">전체 유동성 LP 공급</div>
        <div id="lp-total-num">$ 88,429,580,205</div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">글로벌 AI 고객지원센터</button>

    <div class="faq-section" id="faqBox">
        <p id="txt-test-pi" style="text-align:center; font-size:0.8rem; color:var(--neon-blue); margin-bottom:20px;">테스트 파이(Test-Pi) 기반 구동 중</p>
        <div id="faq-list">
            </div>
    </div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" class="soc-btn" style="background:#FF0000">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" class="soc-btn" style="background:#333; border:1px solid #444">TIKTOK</a>
    </div>
</div>

<div id="ai-bot" onclick="openChat()">
    AI
    <div class="ai-bubble" id="ai-hello">무엇을 도와 드릴까요?</div>
</div>

<div id="chat-input-box">
    <div id="txt-ai-ask" style="color:black; font-weight:bold; margin-bottom:10px; font-size:0.85rem;">무엇을 도와 드릴까요?</div>
    <input type="text" id="userMsg" placeholder="메시지를 입력하세요...">
    <button onclick="closeChat()" style="margin-top:10px; width:100%; padding:8px; background:#333; color:white; border:none; border-radius:5px;">닫기</button>
</div>

<script>
    // 5, 6, 7. 통합 언어 데이터베이스 (20~40개 확장용)
    const i18n = {
        ko: {
            ledger: "메인 자산 통합 원장", st: "실시간 스테이킹 이율", lp: "실시간 유동성 수익", total: "전체 유동성 LP 공급",
            center: "글로벌 AI 고객지원센터", test: "테스트 파이(Test-Pi) 기반 구동 중", ai: "무엇을 도와 드릴까요?",
            faqs: [
                {q: "Q1. 시스템 구동 환경", a: "본 플랫폼은 현재 테스트 파이 기반으로 최적화 구동 중입니다."},
                {q: "Q11. UBI재원과 이율 재원은 어떻게 만드나요?", a: "독자적인 유동성 알고리즘과 글로벌 AI 수익 모델을 결합하여 창출하며, 이는 혜공 형님의 핵심 금융 공학 설계입니다."}
            ]
        },
        en: {
            ledger: "Integrated Main Asset Ledger", st: "Staking APR (Live)", lp: "Liquidity Yield (Live)", total: "Total Liquidity LP Supply",
            center: "Global AI Support Center", test: "Running on Test-Pi Network", ai: "How can I help you?",
            faqs: [
                {q: "Q1. System Environment", a: "This platform is currently running on the Test-Pi network."},
                {q: "Q11. How to create UBI funds?", a: "Created by combining unique liquidity algorithms and global AI models. This is Hyekong's core financial engineering."}
            ]
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;

        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        document.getElementById('txt-center-btn').innerText = d.center;
        document.getElementById('txt-test-pi').innerText = d.test;
        document.getElementById('ai-hello').innerText = d.ai;
        document.getElementById('txt-ai-ask').innerText = d.ai;

        // FAQ 새로고침 (1~11번)
        const list = document.getElementById('faq-list');
        list.innerHTML = "";
        d.faqs.forEach(f => {
            list.innerHTML += `<div class="faq-item"><div class="faq-q">${f.q}</div><div class="faq-a">${f.a}</div></div>`;
        });
    }

    function toggleFaq() {
        const box = document.getElementById('faqBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    // 4. AI 클릭 시 메시지 창으로 바로 가기
    function openChat() {
        document.getElementById('chat-input-box').style.display = 'block';
        document.getElementById('userMsg').focus();
    }

    function closeChat() {
        document.getElementById('chat-input-box').style.display = 'none';
    }

    // 실시간 수치 변동 (2초)
    setInterval(() => {
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (24 + Math.random()).toFixed(2) + '%';
        let lpBase = 88429580205 + Math.floor(Math.random() * 50000);
        document.getElementById('lp-total-num').innerText = '$ ' + lpBase.toLocaleString();
    }, 2000);

    // 초기 실행
    changeLanguage();
</script>
</body>
</html>
