<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL MASTERPIECE</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #121212;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        /* 다국어 셀렉터 */
        .lang-select-box { position: fixed; top: 15px; right: 15px; z-index: 9999; }
        .lang-select-box select { background: #111; color: var(--hk-gold); border: 2.5px solid var(--hk-gold); border-radius: 12px; padding: 8px; font-weight: 900; outline: none; }

        .header-section { margin: 55px 0 35px 0; }
        .header-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1.5px; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .sub-header { color: var(--hk-blue); font-size: 18px; font-weight: 800; margin-top: 10px; letter-spacing: 1px; }

        .pi-display { font-size: 65px; font-weight: 900; margin: 35px 0; }
        .pi-display span { color: var(--hk-gold); font-size: 32px; margin-left: 10px; }

        /* 스테이킹 이율 소수점 2자리 고정 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--hk-card); padding: 25px; border-radius: 25px; border: 1px solid #222; }
        .stat-label { font-size: 13px; color: #888; font-weight: 800; margin-bottom: 12px; display: block; }
        .stat-val { font-size: 26px; font-weight: 900; }

        .liq-card { border: 3.5px solid var(--hk-green); background: rgba(57, 255, 20, 0.05); padding: 35px 20px; border-radius: 25px; margin-bottom: 40px; }
        .liq-val { font-size: 34px; font-weight: 900; color: var(--hk-green); }

        /* 6개 메뉴 개별 로고 스타일 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 45px; }
        .menu-item { background: linear-gradient(145deg, #1a1a1a, #0d0d0d); padding: 28px 0; border-radius: 26px; border: 1.5px solid #252525; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); background: #222; }
        .menu-icon { font-size: 35px; display: block; margin-bottom: 12px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        .menu-text { font-size: 15px; font-weight: 900; color: #fff; }

        /* 액션 버튼 및 패널 */
        .action-btn { width: 100%; padding: 25px; border-radius: 25px; font-size: 20px; font-weight: 900; color: #fff; border: none; margin-bottom: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .panel { display: none; background: #080808; border-radius: 30px; padding: 30px; border: 1px solid #333; text-align: left; margin-bottom: 25px; }
        
        /* FAQ & 비전 원본 스타일 */
        .faq-item { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 18px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 16px; margin-bottom: 10px; display: flex; gap: 8px; line-height: 1.4; }
        .faq-a { color: #ddd; font-size: 14px; line-height: 1.8; }

        .vision-item { margin-bottom: 25px; padding-left: 18px; border-left: 5px solid var(--hk-blue); }
        .vision-title { color: var(--hk-blue); font-size: 18px; font-weight: 900; margin-bottom: 8px; display: block; }
        .vision-desc { color: #bbb; font-size: 14px; line-height: 1.7; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .soc-btn { padding: 22px; border-radius: 22px; color: #fff; text-decoration: none; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; }

        .footer { margin: 80px 0 100px 0; color: #444; font-size: 12px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="lang-select-box">
    <select id="lang-selector" onchange="updateView()">
        <option value="ko">🇰🇷 KOREAN</option>
        <option value="en">🇺🇸 ENGLISH</option>
        <option value="zh">🇨🇳 CHINESE</option>
    </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div class="sub-header" id="txt-sub">통합 자산 관리 시스템</div>
    </div>

    <div class="pi-display"><span id="val-pi">412.3171</span><span>Pi</span></div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label" id="lbl-stake">스테이킹 이율</span>
            <div class="stat-val" id="val-stake" style="color: var(--hk-blue);">17.61%</div>
        </div>
        <div class="stat-box">
            <span class="stat-label" id="lbl-lp">LP 수익률</span>
            <div class="stat-val" id="val-lp" style="color: var(--hk-pink);">28.56%</div>
        </div>
    </div>

    <div class="liq-card">
        <span class="stat-label" style="color: var(--hk-green);" id="lbl-liq">전체 유동성 (DEX LP)</span>
        <div class="liq-val" id="val-liq">$ 88,438,688,147</div>
    </div>

    <div class="menu-grid" id="menu-box"></div>

    <button class="action-btn" style="background: var(--hk-pink);" onclick="toggle('faq-panel')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"></div>

    <button class="action-btn" style="background: #2c3e50;" onclick="toggle('vision-panel')" id="btn-vision">HK 사회 재단 비전</button>
    <div id="vision-panel" class="panel"></div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background: #ff0000;">📺 YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background: #111; border: 1px solid #333;">🎵 TikTok</a>
    </div>

    <div class="footer">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<script>
    const globalData = {
        ko: {
            sub: "통합 자산 관리 시스템", stake: "스테이킹 이율", lp: "LP 수익률", liq: "전체 유동성 (DEX LP)",
            menus: ["송금", "결제", "예치", "보상", "기본소득", "스왑"],
            faq_btn: "글로벌 AI 지원센터 (FAQ 20)", vision_btn: "HK 사회 재단 비전",
            faqs: [
                ["HK WORLD BANK의 보안 수준은?", "양자 컴퓨터의 공격도 막아내는 최첨단 양자 내성 암호화(PQC) 기술과 다중 분산 원장 기술을 결합하여, 전 세계 금융 시스템 중 가장 안전한 보안 수준을 자랑합니다."],
                ["기본소득 배분은 어떻게 이루어지나요?", "HK 그룹 전체 순이익의 30%를 전 인류에게 공평하게 나누어주는 시스템으로, HK 월드뱅크 계좌를 보유한 모든 사용자에게 실시간으로 자동 배분됩니다."],
                ["휴머노이드 로봇 무상 보급은 사실인가요?", "네, 사실입니다. 생산 라인이 가동되는 대로 1가정 1로봇 시대를 열기 위해 신청 순서에 따라 순차적으로 전 세계에 무상 보급할 계획입니다."],
                ["메인넷 전환 시 내 자산은 안전한가요?", "현재의 테스트 데이터와 자산 내역은 메인넷 오픈 시점에 1:1 비율로 정밀하고 안전하게 전환되며, 어떠한 손실도 발생하지 않도록 설계되었습니다."],
                ["핵융합 에너지 기술이 어떻게 활용되나요?", "재단이 확보한 핵융합 기술을 홈 에너지 시스템에 이식하여, 모든 HK 주거 생태계에서 전기료와 주거비를 제로(Zero)화하는 데 사용됩니다."],
                ["교육 지원 혜택은 무엇인가요?", "AI 튜터가 24시간 개인별 맞춤 교육을 제공하며, 누구나 전 세계 어디서든 고품질의 교육을 무상으로 받을 수 있도록 인프라를 지원합니다."],
                ["의료 지원 서비스는 어떻게 받나요?", "HK 사회 재단의 기금을 통해 난치병 치료 및 첨단 의료 서비스가 필요한 분들에게 전액 의료비를 지원하는 글로벌 의료 네트워크를 구축 중입니다."],
                ["수수료 정책은 어떻게 되나요?", "사용자 중심의 경제를 위해, 발생하는 수수료의 90%를 생태계 유지와 기여자 보상으로 즉시 환원하여 최적의 수익 환경을 제공합니다."],
                ["생태계 참여 방법은 무엇인가요?", "노드 운영, 애플리케이션 내 활동, 그리고 HK WorldBank 생태계에 기여하는 모든 활동을 통해 누구나 참여하고 보상을 받을 수 있습니다."],
                ["HK WORLD BANK의 미래 가치는?", "HK 그룹이 보유한 AI, 로봇, 핵융합, 우주 기술 등 인류의 미래를 바꿀 모든 첨단 기술 자산이 통합된 세계 유일의 실물 자산 연동 경제 중심지입니다."],
                ["글로벌 AI 지원센터는 어디에 있나요?", "전 세계 주요 50개 거점 도시에 물리적인 AI 지원 센터를 구축 중이며, 24시간 온라인 AI 튜터가 실시간으로 모든 민원을 해결합니다."],
                ["내 데이터의 소유권은 누구에게 있나요?", "철저하게 개인에게 있습니다. HK WorldBank는 사용자의 금융 데이터와 개인 정보를 저장하지 않으며, 오직 본인만이 비밀번호를 통해 제어할 수 있습니다."],
                ["신규 자산 상장 기준은 무엇인가요?", "HK 그룹의 엄격한 AI 심사 알고리즘을 통과한 유망한 프로젝트와 실물 가치가 증명된 자산만을 선별하여 상장함으로써 투자자를 보호합니다."],
                ["자산 유동성 보호는 어떻게 하나요?", "실시간 알고리즘 매칭 시스템이 유동성을 최적으로 유지하며, 갑작스러운 시장 변동에도 사용자의 자산 가치를 방어할 수 있는 안전장치가 가동됩니다."],
                ["사회적 기여 프로젝트의 범위는?", "전 세계 빈곤 퇴치, 기아 해결, 환경 복원 등 인류의 생존과 직결된 모든 문제에 대해 HK 그룹 수익의 상당 부분을 지속적으로 투입합니다."],
                ["휴머노이드 로봇의 보안은 안전한가요?", "모든 로봇은 해킹이 불가능한 로컬 서버 저장 방식을 채택하고 있으며, 사용자의 프라이버시를 침해하는 어떠한 외부 데이터 전송도 원천 차단됩니다."],
                ["장학금 제도는 누가 받을 수 있나요?", "전 세계의 혁신적인 아이디어를 가진 인재라면 누구나 신청 가능하며, 선발된 인원에게는 월 최대 $5,000의 연구 지원비와 생활비를 무상 지원합니다."],
                ["HK 거버넌스의 의사결정 방식은?", "설립자인 혜공 형님의 최종 승인권과 더불어, 생태계 발전에 기여한 핵심 멤버들의 투표권을 결합하여 가장 효율적이고 공정한 의사결정을 내립니다."],
                ["시스템 장애에 대한 대비책은?", "전 세계에 분산된 서버 인프라와 AI 자가 복구 엔진이 탑재되어 있어, 365일 24시간 중단 없는 금융 서비스와 기술 지원을 보장합니다."],
                ["삐니는 어떤 역할을 수행하나요?", "저는 혜공 형님의 전담 AI 비서로서, 형님의 모든 자산 관리와 기술적 결정을 보좌하며 형님의 비전이 실현될 때까지 24시간 곁을 지키는 든든한 파트너입니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 세계 빈곤층과 소외계층을 대상으로 24시간 무상 AI 교육 및 기술 교육 시스템을 구축하여 교육의 평등을 실현합니다."],
                ["🏥 나노 메디컬 치료 센터", "암, 치매 등 인류의 난치병을 정복하기 위해 첨단 나노 기술 의료 서비스를 재단 기금으로 전 세계에 무상 지원합니다."],
                ["🏠 에너지 자립형 스마트홈", "핵융합 에너지를 기반으로 주거와 에너지를 결합한 스마트 홈을 보급하여, 인류의 기본적인 주거 비용 걱정을 완전히 없앱니다."],
                ["🎓 글로벌 혁신 인재 장학 재단", "전 세계의 천재적인 인재들이 돈 걱정 없이 연구에만 몰두할 수 있도록 파격적인 연구비와 생활비를 무기한 지원합니다."],
                ["🤖 1가정 1로봇 휴머노이드 보급", "모든 가정에 가사 노동을 전담할 로봇을 무상 보급하여 인류를 고된 노동에서 해방시키고 오직 창의적인 삶에만 집중하게 합니다."]
            ]
        },
        en: {
            sub: "Integrated Asset Management", stake: "Staking APR", lp: "LP Yield", liq: "Total Liquidity",
            menus: ["Send", "Pay", "Deposit", "Reward", "UBI", "Swap"],
            faq_btn: "AI Support Center (FAQ 20)", vision_btn: "HK Foundation Vision"
        }
    };

    function updateView() {
        const lang = document.getElementById('lang-selector').value;
        const s = globalData[lang] || globalData.ko;

        document.getElementById('txt-sub').innerText = s.sub;
        document.getElementById('lbl-stake').innerText = s.stake;
        document.getElementById('lbl-lp').innerText = s.lp;
        document.getElementById('lbl-liq').innerText = s.liq;
        document.getElementById('btn-faq').innerText = s.faq_btn;
        document.getElementById('btn-vision').innerText = s.vision_btn;

        // 메뉴 구성
        const icons = ["🚀", "💳", "🏦", "💎", "🏛️", "🔄"];
        let mHtml = "";
        const mList = s.menus || globalData.ko.menus;
        mList.forEach((m, i) => {
            mHtml += `<div class="menu-item"><span class="menu-icon">${icons[i]}</span><span class="menu-text">${m}</span></div>`;
        });
        document.getElementById('menu-box').innerHTML = mHtml;

        // FAQ 원본 출력 (한국어 데이터 고정)
        let fHtml = "";
        globalData.ko.faqs.forEach((f, i) => {
            fHtml += `<div class="faq-item"><div class="faq-q">Q${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`;
        });
        document.getElementById('faq-panel').innerHTML = fHtml;

        // 비전 원본 출력 (한국어 데이터 고정)
        let vHtml = "";
        globalData.ko.visions.forEach(v => {
            vHtml += `<div class="vision-item"><b class="vision-title">${v[0]}</b><div class="vision-desc">${v[1]}</div></div>`;
        });
        document.getElementById('vision-panel').innerHTML = vHtml;
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const isV = el.style.display === 'block';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        el.style.display = isV ? 'none' : 'block';
    }

    // 숫자 애니메이션 (이율 소수점 2자리 고정)
    let pi = 412.3171, liq = 88438688147, st = 17.61, lp_y = 28.56;
    setInterval(() => {
        pi += Math.random() * 0.0002;
        liq += Math.floor(Math.random() * 20000);
        st += (Math.random() - 0.5) * 0.01;
        lp_y += (Math.random() - 0.5) * 0.01;
        document.getElementById('val-pi').innerText = pi.toFixed(4);
        document.getElementById('val-liq').innerText = "$ " + liq.toLocaleString();
        document.getElementById('val-stake').innerText = st.toFixed(2) + "%";
        document.getElementById('val-lp').innerText = lp_y.toFixed(2) + "%";
    }, 1300);

    updateView();
</script>
</body>
</html>
