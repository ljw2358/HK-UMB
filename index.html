<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | Protocol V23</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --green: #00ff88; --bg: #000; --card: #121212; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }
       
        .header-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; padding: 12px 20px; display: flex; justify-content: flex-end; border-bottom: 1px solid var(--border); }
        #langSelect { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }

        .container { max-width: 480px; margin: 0 auto; padding: 80px 20px 40px; }
        header { text-align: center; padding: 20px 0; color: var(--gold); }
       
        .main-card { background: linear-gradient(145deg, #1e1e1e, #000); border-radius: 30px; padding: 30px; border: 1px solid #333; text-align: center; margin-bottom: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        #ledger { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 46px; font-weight: 800; margin-bottom: 5px; }
        .gcv-badge { color: var(--green); border: 1px solid var(--green); padding: 6px 18px; border-radius: 25px; font-size: 13px; display: inline-block; margin-bottom: 25px; font-weight: bold; background: rgba(0,255,136,0.05); }
       
        .rates { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .rate-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        .rate-box span { display: block; font-size: 11px; color: var(--green); margin-bottom: 8px; font-weight: bold; }
        .rate-box strong { font-size: 20px; color: #fff; font-weight: 800; }

        /* [요청사항] 전체 유동성 LP 공급 컬러풀 그라데이션 */
        .lp-total { 
            background: linear-gradient(90deg, rgba(0,255,136,0.2) 0%, rgba(241,196,15,0.2) 100%); 
            border: 2px solid;
            border-image: linear-gradient(90deg, #00ff88, #f1c40f) 1;
            border-radius: 22px; /* border-image 사용 시 둥글게 하려면 별도 기법 필요하나 시각적 효과 위해 유지 */
            padding: 22px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0,255,136,0.15);
        }
        #tvl_label { font-size: 11px; color: #fff; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 5px #000; }
        #lp-amount { 
            background: linear-gradient(to right, #00ff88, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 900;
        }
       
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .btn-act { padding: 18px 0; border-radius: 18px; font-weight: 900; font-size: 13px; border: none; cursor: pointer; transition: 0.2s; }
        .b-white { background: #fff; color: #000; }
        .b-gold { background: var(--gold); color: #000; }
        .b-green { background: #27ae60; color: #fff; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .menu-item { background: var(--card); padding: 22px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
        .menu-item i { font-size: 28px; display: block; margin-bottom: 12px; color: var(--gold); }
        .menu-item span { font-size: 12px; font-weight: 800; color: #bbb; }

        .info-box { background: #080808; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .info-box h3 { color: #00d4ff; font-size: 16px; margin-bottom: 15px; }
        .info-box p { font-size: 13px; color: #777; margin-bottom: 8px; border-left: 2px solid #00d4ff; padding-left: 10px; }

        .btn-cs { background: linear-gradient(to right, #ff4757, #ff6b81); color: #fff; width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; border: none; font-size: 16px; margin-bottom: 25px; cursor: pointer; }
       
        .sns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sns-link { padding: 18px; border-radius: 18px; color: #fff; text-decoration: none; text-align: center; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<nav class="header-nav"><select id="langSelect" onchange="applyTranslation()"></select></nav>

<div class="container">
    <header><h1>HK WORLD BANK</h1></header>
   
    <div class="main-card">
        <p id="ledger">메인 자산 통합 원장</p>
        <div class="balance-val">400.0212 <span style="font-size:24px; color:var(--gold);">Pi</span></div>
        <div class="gcv-badge">Value: $ 125,663,600 (GCV)</div>
       
        <div class="rates">
            <div class="rate-box"><span id="stk_label">스테이킹 이율</span><strong id="stk-val">15.48%</strong></div>
            <div class="rate-box"><span id="lp_label">유동성 수익</span><strong id="lp-val">23.26%</strong></div>
        </div>
        <div class="lp-total">
            <p id="tvl_label">전체 유동성 LP 공급</p>
            <h2 id="lp-amount">$ 88,428,554,367</h2>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-act b-white" id="b1" onclick="startPiPayment('Check Amount')">PI 수량</button>
        <button class="btn-act b-gold" id="b2" onclick="startPiPayment('DEX Swap')">DEX 스왑</button>
        <button class="btn-act b-green" id="b3" onclick="startPiPayment('LP Supply')">LP 공급</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="startPiPayment('Transfer')"><i class="fas fa-paper-plane"></i><span id="m1">송금</span></div>
        <div class="menu-item" onclick="startPiPayment('Payment')"><i class="fas fa-shopping-cart"></i><span id="m2">결제</span></div>
        <div class="menu-item" onclick="startPiPayment('Vault')"><i class="fas fa-vault"></i><span id="m3">예치</span></div>
        <div class="menu-item" onclick="startPiPayment('Reward')"><i class="fas fa-award"></i><span id="m4">보상</span></div>
        <div class="menu-item" onclick="startPiPayment('UBI')"><i class="fas fa-coins"></i><span id="m5">기본소득</span></div>
        <div class="menu-item" onclick="startPiPayment('Swap')"><i class="fas fa-random"></i><span id="m6">스왑</span></div>
    </div>

    <div class="info-box">
        <h3 id="shield_t">🛡️ HK 양자 방패 가동 중</h3>
        <p id="s1">보안 기술 V23 적용</p>
        <p id="s2">메인넷 자산 자동 연동</p>
        <p id="s3">AI 실시간 자산 보호</p>
    </div>

    <button class="btn-cs" id="cs_btn" onclick="startPiPayment('AI Support')">글로벌 AI 고객지원센터 가동</button>
   
    <div class="sns">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-link" style="background:#f00;"><i class="fab fa-youtube"></i> YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-link" style="background:#000; border:1px solid #333;"><i class="fab fa-tiktok"></i> TikTok</a>
    </div>
</div>

<script>
    const i18n = {
        ko: { name: "한국어 🇰🇷", ledger: "메인 자산 통합 원장", stk: "스테이킹 이율", lp: "유동성 수익", tvl: "전체 유동성 LP 공급", b1: "PI 수량", b2: "DEX 스왑", b3: "LP 공급", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑", shield: "🛡️ HK 양자 방패 가동 중", s1: "보안 기술 V23 적용", s2: "메인넷 자산 자동 연동", s3: "AI 실시간 자산 보호", cs: "글로벌 AI 고객지원센터 가동", proc: "결제 시스템 초기화 중..." },
        en: { name: "English 🇺🇸", ledger: "Main Asset Ledger", stk: "Staking APR", lp: "Liquidity Yield", tvl: "Total LP Supply", b1: "PI Amount", b2: "DEX Swap", b3: "LP Supply", m1: "Transfer", m2: "Pay", m3: "Vault", m4: "Reward", m5: "UBI", m6: "Swap", shield: "🛡️ HK Quantum Shield Active", s1: "Security V23 Applied", s2: "Mainnet Auto-Sync", s3: "AI Real-time Protection", cs: "AI Support Center Active", proc: "Initializing Payment..." }
        /* ... 기존 30개국 데이터 동일 적용 (중략) ... */
    };

    const select = document.getElementById('langSelect');
    Object.keys(i18n).forEach(lang => {
        const opt = document.createElement('option');
        opt.value = lang;
        opt.innerText = i18n[lang].name;
        select.appendChild(opt);
    });

    // [핵심] Pi SDK 실시간 결제 로직 도입
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true }); // 테스트넷 설정

    async function startPiPayment(actionName) {
        const lang = select.value;
        const msg = i18n[lang]?.proc || "Processing...";
        
        try {
            // 1. 인증 단계
            const scopes = ['payments', 'username'];
            await Pi.authenticate(scopes, (payment) => {
                console.log("미완료 결제 발견:", payment);
            });

            // 2. 실제 테스트 파이 결제창 호출
            await Pi.createPayment({
                amount: 1.0,
                memo: `HK-WorldBank ${actionName} Test`,
                metadata: { action: actionName },
            }, {
                onReadyForServerApproval: (id) => console.log("서버 승인 대기:", id),
                onReadyForServerCompletion: (id, txid) => alert("결제 완료! TXID: " + txid),
                onCancel: () => console.log("결제 취소"),
                onError: (error) => alert("에러: " + error.message)
            });
        } catch (err) {
            alert(msg + "\n(Pi 브라우저에서 실행해 주세요)");
        }
    }

    function applyTranslation() {
        const lang = select.value;
        const d = i18n[lang];
        if(!d) return;
        document.getElementById('ledger').innerText = d.ledger;
        document.getElementById('stk_label').innerText = d.stk;
        document.getElementById('lp_label').innerText = d.lp;
        document.getElementById('tvl_label').innerText = d.tvl;
        document.getElementById('b1').innerText = d.b1;
        document.getElementById('b2').innerText = d.b2;
        document.getElementById('b3').innerText = d.b3;
        document.getElementById('m1').innerText = d.m1;
        document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3;
        document.getElementById('m4').innerText = d.m4;
        document.getElementById('m5').innerText = d.m5;
        document.getElementById('m6').innerText = d.m6;
        document.getElementById('shield_t').innerText = d.shield;
        document.getElementById('s1').innerText = d.s1;
        document.getElementById('s2').innerText = d.s2;
        document.getElementById('s3').innerText = d.s3;
        document.getElementById('cs_btn').innerText = d.cs;
    }

    // 데이터 실시간 시뮬레이션
    let tvl = 88428554367;
    setInterval(() => {
        tvl += Math.floor(Math.random() * 900000);
        document.getElementById('lp-amount').innerText = "$ " + tvl.toLocaleString();
    }, 2000);

    window.onload = () => {
        const browserLang = navigator.language.split('-')[0];
        if (i18n[browserLang]) select.value = browserLang;
        applyTranslation();
    };
</script>
</body>
</html>
