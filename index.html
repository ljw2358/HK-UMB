<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - 통합 자산 관리 시스템</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            color: #FFD700; /* 황금색 */
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #00FFFF; /* 하늘색 */
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .main-value {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 20px 0;
        }
        .pi-symbol {
            color: #FFD700;
        }
        .currency-box {
            border: 2px solid #00FF00; /* 초록색 테두리 */
            border-radius: 50px;
            padding: 15px;
            margin: 20px 0;
        }
        .currency-value {
            color: #00FF00;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
        }
        .stat-label { color: #888; font-size: 0.9rem; }
        .stat-value { font-size: 1.3rem; font-weight: bold; margin-top: 5px; }
        .liquidity-box {
            border: 2px solid #00FF00;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 15px 5px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            color: #000;
        }
        .btn-white { background-color: #fff; }
        .btn-yellow { background-color: #FFD700; }
        .btn-green { background-color: #00FF00; }
        .btn-dark { background-color: #222; color: #fff; font-size: 0.8rem; }
        .btn-full {
            grid-column: span 3;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #fff;
        }
        .btn-pink { background-color: #E91E63; }
        .btn-navy { background-color: #1C2331; }
        .btn-red { background-color: #FF0000; }
        .btn-black { background-color: #111; border: 1px solid #333; }
        .contact { color: #00FFFF; margin-top: 30px; font-weight: bold; }
        .bini-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #FF00FF;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px #FF00FF;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HK WORLD BANK</h1>
        <div class="subtitle">통합 자산 관리 시스템</div>

        <div class="main-value">314,159 <span class="pi-symbol">Pi</span></div>

        <div class="currency-box">
            <div class="currency-value">₩ 47,123,850,000</div>
        </div>

        <div class="stat-card" style="margin-bottom: 20px;">
            <div class="stat-label">HKWB 실시간 공급량</div>
            <div class="stat-value" style="color: #00FFFF;">6280000.5074</div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">스테이킹</div>
                <div class="stat-value" style="color: #00FFFF;">17.64%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">LP 수익률</div>
                <div class="stat-value" style="color: #FF00FF;">28.57%</div>
            </div>
        </div>

        <div class="liquidity-box">
            <div class="stat-label" style="color: #00FF00;">전체 유동성 (DEX LP)</div>
            <div class="main-value" style="font-size: 2.5rem;">$ 88,432,098,051</div>
        </div>

        <div class="btn-grid">
            <button class="btn btn-white">PI 수량</button>
            <button class="btn btn-yellow">DEX 스왑</button>
            <button class="btn btn-green">LP 스테이킹</button>
            <button class="btn btn-dark">🚀 송금</button>
            <button class="btn btn-dark">🛒 결제</button>
            <button class="btn btn-dark">💰 예치</button>
            <button class="btn btn-dark">🏆 보상</button>
            <button class="btn btn-dark">🏦 기본소득</button>
            <button class="btn btn-dark">🔄 스왑</button>
        </div>

        <button class="btn btn-full btn-pink">글로벌 AI 지원센터 (FAQ 20선)</button>
        <button class="btn btn-full btn-navy">HK 사회 재단 비전</button>

        <div class="stat-grid">
            <button class="btn btn-red">YouTube</button>
            <button class="btn btn-black">TikTok</button>
        </div>

        <div class="contact">support@hkwb.world</div>
    </div>

    <div class="bini-btn">삐니</div>
</body>
</html>
