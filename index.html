<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | GLOBAL INDUSTRIAL OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0;
            letter-spacing: -0.05em;
            -webkit-user-select: none; user-select: none;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* 네온 테마 디자인 */
        .font-gold { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .font-neon-cyan { color: #00FFFF; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        .font-neon-green { color: #39FF14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .font-pink { color: #FF00FF; text-shadow: 0 0 10px rgba(255, 0, 255, 0.5); }

        .neon-box-green {
            border: 3px solid #39FF14;
            border-radius: 35px;
            padding: 30px 20px;
            margin: 20px 0;
            background-color: rgba(0,0,0,0.5);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
        }

        .grid-btn {
            background-color: #1A1A1A;
            border-radius: 20px;
            padding: 22px 10px;
            text-align: center;
            font-weight: 800;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .grid-btn:active { background-color: #333; transform: scale(0.95); }

        /* 삐니 플로팅 버튼 */
        .bbini-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #FF00FF, #C000C0);
            border-radius: 50%;
            border: 4px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
            color: #ffffff;
            font-weight: 900;
            font-size: 1.4rem;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
            z-index: 10000;
            cursor: pointer;
        }

        details summary::-webkit-details-marker { display:none; }
        details[open] summary i { transform: rotate(180deg); }
        
        #lang-select {
            background-color: #1A1A1A;
            color: #ffffff;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }

</head>
<body class="max-w-md mx-auto min-h-screen relative pb-40 border-x border-zinc-900 shadow-2xl">

        </div>

        <div class="neon-box-green text-center py-10" style="border-color: #00FFFF; box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);">

        <div class="grid grid-cols-3 gap-3 pt-4">

            <div class="bg-[#FFD700] text-black rounded-[22px] py-8 text-center font-black text-xl shadow-2xl active:scale-95 transition-all" id="btn-2">DEX 스왑</div>
            <div class="bg-[#39FF14] text-black rounded-[22px] py-8 text-center font-black text-xl shadow-2xl active:scale-95 transition-all" id="btn-3">LP 예치</div>

        <div class="space-y-6 pt-20">

            </details>

            <details class="bg-[#050505] rounded-[28px] overflow-hidden border border-zinc-900 shadow-2xl">

                    <span id="label-vision">HK 사회 재단 비전 2030</span>
                    <i class="fa-solid fa-chevron-down text-lg"></i>

            <div class="py-12 border-y border-zinc-900">

            </div>
            <div class="opacity-30 pb-20">

            }
        };

        function changeLanguage() {
            const l = document.getElementById('lang-select').value;
            const d = multiLang[l] || multiLang['ko'];
            
            document.getElementById('txt-sub').innerText = d.sub;
            document.getElementById('txt-liq').innerText = d.liq;
            document.getElementById('label-faq').innerText = d.labelFaq;
            document.getElementById('label-vision').innerText = d.labelVision;
            document.getElementById('btn-1').innerText = d.btn1;
            document.getElementById('btn-2').innerText = d.btn2;
            document.getElementById('btn-3').innerText = d.btn3;
            
            document.getElementById('faq-box').innerHTML = d.faq.map((f, i) => `
                <div class="border-b border-zinc-900 pb-4">
                    <p class="font-black text-[#E91E63] text-sm mb-1">Q${i+1}. ${f[0]}</p>
                    <p class="text-xs text-zinc-400 leading-relaxed">${f[1]}</p>
                </div>
            `).join('');

            document.getElementById('vision-box').innerHTML = d.vision.map(v => `
                <div class="border-b border-zinc-900 pb-4">
                    <p class="font-black text-[#00FFFF] text-sm mb-1">${v[0]}</p>
                    <p class="text-xs text-zinc-400 leading-relaxed">${v[1]}</p>
                </div>
            `).join('');
        }

        window.onload = changeLanguage;
    </script>
</body>
</html>
