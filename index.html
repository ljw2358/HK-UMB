<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WorldBank | Global Industrial Platform</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #0f172a; color: white; text-align: center; }
        header { padding: 50px; background: linear-gradient(to right, #1e293b, #334155); }
        .container { padding: 20px; }
        .btn { padding: 15px 30px; background-color: #3b82f6; color: white; border: none; cursor: pointer; font-size: 18px; border-radius: 8px; margin: 10px; }
        #agi-chat { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: white; color: black; border-radius: 10px; padding: 10px; display: none; }
    </style>
</head>
<body>

<header>
    <h1>Welcome to HK WorldBank</h1>
    <p>Connecting Robotics, Energy, and Space Infrastructure</p>
    <div id="language-selector">
        <select onchange="changeLanguage(this.value)">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <!-- 50개국 언어 리스트 -->
        </select>
    </div>
</header>

<div class="container">
    <button class="btn" onclick="connectWallet()">Wallet Integration</button>
    <button class="btn" onclick="toggleChat()">AGI Customer Support</button>
</div>

<div id="agi-chat">
    <h3>AGI Support</h3>
    <div id="chat-box" style="height: 300px; overflow-y: scroll;"></div>
    <input type="text" id="chat-input" placeholder="질문을 입력하세요...">
    <button onclick="sendChat()">Send</button>
</div>

<script>
    function changeLanguage(lang) { alert('Language changed to: ' + lang); }
    function connectWallet() { alert('Connecting to Pi Network Wallet...'); }
    function toggleChat() { 
        const chat = document.getElementById('agi-chat');
        chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
    }
    function sendChat() {
        const input = document.getElementById('chat-input').value;
        const box = document.getElementById('chat-box');
        box.innerHTML += `<p><b>You:</b> ${input}</p><p><b>AGI:</b> 처리 중입니다...</p>`;
    }
</script>

</body>
</html>
