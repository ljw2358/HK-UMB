
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - TOTAL LEDGER</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --white: #FFFFFF;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; box-sizing: border-box; text-align: center; }

        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); margin: 40px 0 5px 0; }
        .header-sub { font-size: 16px; color: var(--hk-blue); font-weight: 800; margin-bottom: 30px; }

        /* ✅ 메인 자산 통합 원장 */
        .ledger-box { margin-bottom: 30px; }
        .pi-main { font-size: 65px; font-weight: 900; margin: 0; display: flex; align-items: baseline; justify-content: center; letter-spacing: -2px; }
        .pi-main span.unit { color: var(--hk-gold); font-size: 40px; margin-left: 12px; font-weight: 800; }
        .krw-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 12px 45px; border-radius: 50px; font-size: 28px; font-weight: 900; margin-top: 15px; background: rgba(57, 255, 20, 0.05); }

        /* ✅ 실시간 공급량 바 */
        .supply-bar { background: rgba(0, 243, 255, 0.05); border: 1.5px solid #222; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .supply-val { font-size: 28px; font-weight: 900; color: var(--hk-blue); margin-top: 8px; }

        /* ✅ 스테이킹 및 LP 수익률 (핵심) */
        .rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .rate-box { background: #111; border: 1.5px solid #333; border-radius: 15px; padding: 20px; }
        .rate-title { font-size: 14px; color: #aaa; font-weight: 800; margin-bottom: 10px; }
        .rate-val { font-size: 26px; font-weight: 900; }

        /* ✅ 유동성 지표 */
        .liq-box { border: 2.5px solid var(--hk-green); border-radius: 15px; padding: 18px; margin-bottom: 20px; }
        .liq-val { font-size: 32px; font-weight: 900; color: var(--white); }

        /* ✅ 액션 버튼 */
        .nav-mid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .nav-btn { padding: 18px 5px; border-radius: 12px; font-weight: 900; border: none; font-size: 14px; color: #000; }

        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-6 { background: #1a1a1a; border: 1px solid #333; padding: 22px 5px; border-radius: 15px; text-align: center; }
        .btn-6 span { font-size: 15px; font-weight: 900; color: var(--white); }

        /* ✅ 양파까기 섹션 */
        .action-btn { width: 100%; padding: 22px; border-radius: 18px; font-size: 18px; font-weight: 900; cursor: pointer; margin-bottom: 12px; border: none; color: white; }
        .hidden-panel { display: none; background: #080808; border-radius: 18px; padding: 20px; margin-bottom: 15px; border: 1.5px solid #333; text-align: left; }
        .onion-layer { border-bottom: 1px solid #222; padding: 15px 0; }
        .onion-title { color: var(--hk-gold); font-weight: 800; font-size: 15px; }

        /* ✅ 소셜 및 이메일 */
        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .soc-btn { padding: 20px; border-radius: 15px; font-weight: 900; text-decoration: none; color: #fff; text-align: center; font-size: 18px; }
        .email-link { color: var(--hk-blue); font-size: 22px; font-weight: 900; text-decoration: none; display: block; margin: 40px 0 100px 0; }

        /* ✅ 삐니 챗봇 */
        .bbini-bot { position: fixed; bottom: 30px; right: 30px; width: 80px; height: 80px; background: var(--hk-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 30px var(--hk-pink); border: 4px solid #fff; z-index: 1001; animation: float 3s ease-in-out infinite; color: white; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header-title">HK WORLD BANK</h1>
    <div class="header-sub">통합 자산 관리 시스템</div>

    <div class="ledger-box">
        <div class="pi-main"><span id="pi-val">314,159</span> <span class="unit">Pi</span></div>
        <div class="krw-pill" id="krw-val">₩ 47,123,850,000</div>
    </div>

    <div class="supply-bar">
        <div style="font-size:12px; color:#666; font-weight:800;">HKWB 실시간 공급량</div>
        <div class="supply-val" id="live-supply">6280000.5066</div>
    </div>

    <div class="rate-grid">
        <div class="rate-box">
            <div class="rate-title">스테이킹</div>
            <div class="rate-val" style="color:var(--hk-blue);" id="rate-stk">17.64%</div>
        </div>
        <div class="rate-box">
            <div class="rate-title">LP 수익률</div>
            <div class="rate-val" style="color:var(--hk-pink);" id="rate-lp">28.56%</div>
        </div>
    </div>

    <div class="liq-box">
        <div style="font-size:14px; color:var(--hk-green); font-weight:900; margin-bottom:10px;">전체 유동성 (DEX LP)</div>
        <div class="liq-val" id="live-liq">$ 88,432,094,776</div>
    </div>

    <div class="nav-mid">
        <button class="nav-btn" style="background:#fff;">PI 수량</button>
        <button class="nav-btn" style="background:var(--hk-gold);">DEX 스왑</button>
        <button class="nav-btn" style="background:var(--hk-green);">LP 스테이킹</button>
    </div>

    <div class="grid-6">
        <div class="btn-6"><span>🚀 송금</span></div><div class="btn-6"><span>🛒 결제</span></div><div class="btn-6"><span>💰 예치</span></div>
        <div class="btn-6"><span>🏆 보상</span></div><div class="btn-6"><span>🏦 기본소득</span></div><div class="btn-6"><span>🔄 스왑</span></div>
    </div>

    <button class="action-btn" style="background: #e91e63;" onclick="togglePanel('faq-center')">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-center" class="hidden-panel">
        <div id="faq-inject"></div>
    </div>

    <button class="action-btn" style="background: #1e293b;" onclick="togglePanel('vision-center')">HK 사회 재단 비전</button>
    <div id="vision-center" class="hidden-panel">
        <div class="onion-layer"><span class="onion-title">1단계: 주거 혁신</span></div>
        <div class="onion-layer"><span class="onion-title">2단계: 스마트 의료</span></div>
        <div class="onion-layer"><span class="onion-title">3단계: 인재 장학</span></div>
        <div class="onion-layer"><span class="onion-title">4단계: 글로벌 기본소득</span></div>
    </div>

    <div class="social-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background:#FF0000;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background:#000; border:1px solid #333;">TikTok</a>
    </div>

    <a href="mailto:support@hkwb.world" class="email-link">support@hkwb.world</a>
</div>

<div class="bbini-bot">삐니</div>

<script>
    // ✅ 모든 숫자가 살아 움직이는 실시간 엔진
    function updateNumbers() {
        // 유동성 업데이트
        let liq = 88432094776 + Math.floor(Math.random() * 5000);
        document.getElementById('live-liq').innerText = "$ " + liq.toLocaleString();
        
        // 공급량 업데이트
        let supply = 6280000.5066 + (Math.random() * 0.001);
        document.getElementById('live-supply').innerText = supply.toFixed(4);

        // 수익률 미세 변동
        let stk = 17.64 + (Math.random() * 0.02 - 0.01);
        let lp = 28.56 + (Math.random() * 0.04 - 0.02);
        document.getElementById('rate-stk').innerText = stk.toFixed(2) + "%";
        document.getElementById('rate-lp').innerText = lp.toFixed(2) + "%";
    }
    setInterval(updateNumbers, 800);

    // FAQ 20선 주입
    const faqBox = document.getElementById('faq-inject');
    for(let i=1; i<=20; i++) {
        faqBox.innerHTML += `<div class="onion-layer"><span class="onion-title">${i}. 글로벌 대응 질문 및 핵심 답변 ${i}</span></div>`;
    }

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
