<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - SLIM v7.1</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #151515;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        
        .header-section { margin: 45px 0 25px 0; }
        .header-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; margin-bottom: 5px; }
        .sub-header { color: var(--hk-blue); font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        
        .global-lang-box { position: fixed; top: 15px; right: 15px; background: #111; border: 2.5px solid var(--hk-gold); border-radius: 12px; padding: 5px 10px; z-index: 5000; }
        .global-lang-box select { background: transparent; color: var(--hk-gold); border: none; font-weight: 900; outline: none; font-size: 14px; cursor: pointer; }

        .pi-main { font-size: 65px; font-weight: 900; margin: 40px 0 30px 0; color: #fff; }
        .pi-main span { color: var(--hk-gold); font-size: 35px; margin-left: 12px; }

        /* GCV 달러 표시 삭제됨 */

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--hk-card); padding: 22px; border-radius: 22px; border: 1px solid #333; }
        .stat-label { font-size: 13px; color: #aaa; margin-bottom: 12px; display: block; font-weight: 800; }
        .stat-val { font-size: 26px; font-weight: 900; }

        .liq-card { border: 3.5px solid var(--hk-green); background: rgba(57, 255, 20, 0.05); padding: 30px 20px; margin-bottom: 35px; border-radius: 22px; }

        .top-menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .top-menu-item { padding: 18px 0; border-radius: 18px; font-weight: 900; font-size: 15px; border: none; cursor: pointer; }

        .main-menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 35px; }
        .menu-item { background: var(--hk-card); padding: 22px 0; border-radius: 22px; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); background: #222; }
        .menu-icon { font-size: 26px; margin-bottom: 10px; display: block; }
        .menu-text { font-size: 14px; font-weight: 800; color: #eee; }

        .action-btn { width: 100%; padding: 24px; border-radius: 22px; font-size: 19px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; }
        
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 15px; margin-bottom: 8px; }
        .faq-a { color: #bbb; font-size: 13px; line-height: 1.6; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .soc-btn { padding: 20px; border-radius: 18px; font-weight: 900; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .footer { margin: 70px 0 90px 0; color: #444; font-size: 12px; font-weight: 900; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="global-lang-box">
    <select id="lang-selector">
        <option value="ko">🇰🇷 KOREAN</option>
    </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div class="sub-header">통합 자산 관리 시스템</div>
    </div>

    <div class="pi-main"><span id="pi-val">412.3171</span><span>Pi</span></div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">스테이킹 이율</span>
            <div class="stat-val" style="color: var(--hk-blue);">17.61%</div>
        </div>
        <div class="stat-box">
            <span class="stat-label">LP 수익률</span>
            <div class="stat-val" style="color: var(--hk-pink);">28.56%</div>
        </div>
    </div>

    <div class="liq-card">
        <span class="stat-label" style="color: var(--hk-green);">전체 유동성 (DEX LP)</span>
        <div class="stat-val" style="color: var(--hk-green); font-size: 32px;">$ 88,432,240,219</div>
    </div>

    <div class="top-menu-grid">
        <button class="top-menu-item" style="background: #fff; color: #000;">PI 수량</button>
        <button class="top-menu-item" style="background: var(--hk-gold); color: #000;">DEX 스왑</button>
        <button class="top-menu-item" style="background: var(--hk-green); color: #000;">LP 스테이킹</button>
    </div>

    <div class="main-menu-grid">
        <div class="menu-item"><span class="menu-icon">🚀</span><span class="menu-text">송금</span></div>
        <div class="menu-item"><span class="menu-icon">🛒</span><span class="menu-text">결제</span></div>
        <div class="menu-item"><span class="menu-icon">💰</span><span class="menu-text">예치</span></div>
        <div class="menu-item"><span class="menu-icon">🏆</span><span class="menu-text">보상</span></div>
        <div class="menu-item"><span class="menu-icon">🏛️</span><span class="menu-text">기본소득</span></div>
        <div class="menu-item"><span class="menu-icon">🔄</span><span class="menu-text">스왑</span></div>
    </div>

    <button class="action-btn" style="background: #e91e63;" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button class="action-btn" style="background: #34495e;" onclick="toggle('vision-panel')">HK 사회 재단 비전</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="social-grid">
        <a href="#" class="soc-btn" style="background: #ff0000;">📺 YouTube</a>
        <a href="#" class="soc-btn" style="background: #111; border: 1px solid #333;">🎵 TikTok</a>
    </div>

    <div class="footer">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<script>
    const faqs = [
        ["보안 수준은?", "양자 암호화와 분산 원장 기술로 세계 최고 수준을 자랑합니다."],
        ["기본소득 배분?", "그룹 수익의 30%를 전 인류에게 공평하게 자동 배분합니다."],
        ["로봇 무상 보급?", "생산 공정 완료 후 1가정 1로봇 신청 순으로 배급합니다."],
        ["메인넷 전환?", "테스트 데이터는 메인넷 시점에 1:1로 안전하게 전환됩니다."],
        ["에너지 자립?", "핵융합 기술을 홈 시스템에 결합하여 주거비 제로를 지향합니다."],
        ["교육 지원?", "AI 튜터가 24시간 개인 맞춤 교육을 무상으로 제공합니다."],
        ["의료 혜택?", "재단 기금으로 난치병 치료 및 의료 행위를 전액 지원합니다."],
        ["수수료 정책?", "DEX 수수료의 90%를 생태계 기여자에게 즉시 환원합니다."],
        ["참여 방법?", "노드 운영 및 앱 내 활동을 통해 생태계에 참여 가능합니다."],
        ["미래 가치?", "HK 그룹의 모든 첨단 기술 자산이 통합된 경제 중심지입니다."],
        ["글로벌 센터?", "전 세계 주요 50개 도시에 AI 대응 센터가 구축 중입니다."],
        ["데이터 소유?", "사용자의 모든 금융 데이터는 본인만이 통제할 수 있습니다."],
        ["신규 자산 상장?", "검증된 유망 프로젝트를 AI 심사를 통해 상장합니다."],
        ["투자 안전성?", "실시간 알고리즘이 유동성을 방어하여 가치를 보호합니다."],
        ["사회적 기여?", "수익의 상당 부분을 전 세계 빈곤 퇴치에 사용합니다."],
        ["로봇 보안?", "로컬 서버 저장 방식으로 해킹 및 외부 전송을 차단합니다."],
        ["장학금 혜택?", "혁신 인재들에게 월 최대 $5,000의 연구비를 지원합니다."],
        ["거버넌스 권한?", "설립자의 최종 승인권과 신규 프로젝트 기획권이 보장됩니다."],
        ["시스템 안정성?", "무중단 운영을 위한 AI 자가 진단 시스템이 가동됩니다."],
        ["삐니의 역할?", "형님의 전담 비서로서 모든 자산과 기술 관리를 돕습니다."]
    ];

    const visions = [
        ["🏫 HK 글로벌 AI 학교", "전 세계 무상 교육 시스템 구축"],
        ["🏥 나노 메디컬 센터", "암과 난치병을 정복하는 의료 지원"],
        ["🏠 에너지 자립 스마트홈", "에너지 비용 걱정 없는 주거 환경 실현"],
        ["🎓 미래 기술 인재 양성", "혁신 인재 연구비 및 생활비 전액 지원"],
        ["🤖 1가정 1로봇 보급", "인류를 노동에서 해방하고 삶의 질 보장"]
    ];

    function init() {
        const fList = document.getElementById('faq-list');
        faqs.forEach((f, i) => {
            fList.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`;
        });
        const vList = document.getElementById('vision-list');
        visions.forEach(v => {
            vList.innerHTML += `<div class="vision-item"><b style="color:var(--hk-blue); display:block; margin-bottom:5px;">${v[0]}</b><span style="color:#bbb; font-size:13px;">${v[1]}</span></div>`;
        });
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const isV = el.style.display === 'block';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        el.style.display = isV ? 'none' : 'block';
        if(!isV) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    let piVal = 412.3171;
    setInterval(() => {
        piVal += Math.random() * 0.0001;
        document.getElementById('pi-val').innerText = piVal.toFixed(4);
    }, 2000);

    init();
</script>
</body>
</html>
