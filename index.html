<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - FINAL</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #121212;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        /* 다국어 선택 */
        .lang-select-box { position: fixed; top: 15px; right: 15px; z-index: 9999; }
        .lang-select-box select { background: #111; color: var(--hk-gold); border: 2px solid var(--hk-gold); border-radius: 12px; padding: 8px; font-weight: 900; }

        .header-section { margin: 55px 0 35px 0; }
        .header-title { font-size: 40px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1.5px; text-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .sub-header { color: var(--hk-blue); font-size: 17px; font-weight: 800; margin-top: 10px; }

        .pi-display { font-size: 62px; font-weight: 900; margin: 30px 0; }
        .pi-display span { color: var(--hk-gold); font-size: 30px; margin-left: 10px; }

        /* 스테이킹 이율 소수점 2자리 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 25px; }
        .stat-box { background: var(--hk-card); padding: 25px; border-radius: 25px; border: 1.5px solid #222; }
        .stat-label { font-size: 13px; color: #888; font-weight: 800; margin-bottom: 10px; display: block; }
        .stat-val { font-size: 26px; font-weight: 900; }

        .liq-card { border: 3px solid var(--hk-green); background: rgba(57, 255, 20, 0.05); padding: 35px 20px; border-radius: 25px; margin-bottom: 40px; }
        .liq-val { font-size: 34px; font-weight: 900; color: var(--hk-green); }

        /* 6대 메뉴 - 개별 로고 스타일 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 45px; }
        .menu-item { background: linear-gradient(145deg, #1a1a1a, #0d0d0d); padding: 25px 0; border-radius: 28px; border: 1.5px solid #252525; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .menu-icon { font-size: 32px; display: block; margin-bottom: 12px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        .menu-text { font-size: 14px; font-weight: 800; color: #efefef; }

        /* 버튼 디자인 */
        .action-btn { width: 100%; padding: 24px; border-radius: 24px; font-size: 19px; font-weight: 900; color: #fff; border: none; margin-bottom: 18px; cursor: pointer; transition: 0.3s; }
        .panel { display: none; background: #080808; border-radius: 28px; padding: 30px; border: 1px solid #333; text-align: left; margin-bottom: 25px; }
        .faq-item { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; margin-bottom: 10px; font-size: 16px; }
        .faq-a { color: #ccc; font-size: 14px; line-height: 1.7; }
        
        .vision-item { margin-bottom: 22px; padding-left: 15px; border-left: 5px solid var(--hk-blue); }
        .vision-title { color: var(--hk-blue); font-size: 17px; font-weight: 900; margin-bottom: 6px; display: block; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .soc-btn { padding: 22px; border-radius: 22px; color: #fff; text-decoration: none; font-weight: 900; font-size: 16px; }

        .footer { margin: 80px 0 100px 0; color: #444; font-size: 12px; font-weight: 900; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="lang-select-box">
    <select id="lang-selector" onchange="updateContent()">
        <option value="ko">🇰🇷 KOREAN</option><option value="en">🇺🇸 ENGLISH</option><option value="zh">🇨🇳 CHINESE</option>
        <option value="ar">🇸🇦 ARABIC</option><option value="hi">🇮🇳 HINDI</option><option value="es">🇪🇸 SPANISH</option>
        <option value="pt">🇧🇷 BRAZIL</option><option value="uk">🇺🇦 UKRAINE</option><option value="ja">🇯🇵 JAPANESE</option>
        <option value="ru">🇷🇺 RUSSIAN</option><option value="vi">🇻🇳 VIETNAM</option><option value="th">🇹🇭 THAILAND</option>
        <option value="id">🇮🇩 INDONESIA</option>
    </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div class="sub-header" id="txt-sub">통합 자산 관리 시스템</div>
    </div>

    <div class="pi-display"><span id="val-pi">412.3171</span><span>Pi</span></div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label" id="lbl-stake">스테이킹 이율</span>
            <div class="stat-val" id="val-stake" style="color: var(--hk-blue);">17.61%</div>
        </div>
        <div class="stat-box">
            <span class="stat-label" id="lbl-lp">LP 수익률</span>
            <div class="stat-val" id="val-lp" style="color: var(--hk-pink);">28.56%</div>
        </div>
    </div>

    <div class="liq-card">
        <span class="stat-label" style="color: var(--hk-green);" id="lbl-liq">전체 유동성 (DEX LP)</span>
        <div class="liq-val" id="val-liq">$ 88,438,688,147</div>
    </div>

    <div class="menu-grid" id="menu-box"></div>

    <button class="action-btn" style="background: var(--hk-pink);" onclick="toggle('faq-panel')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"></div>

    <button class="action-btn" style="background: #2c3e50;" onclick="toggle('vision-panel')" id="btn-vision">HK 사회 재단 비전 (5대 핵심)</button>
    <div id="vision-panel" class="panel"></div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background: #ff0000;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background: #111; border: 1px solid #333;">TikTok</a>
    </div>

    <div class="footer">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<script>
    const content = {
        ko: {
            sub: "통합 자산 관리 시스템", stake: "스테이킹 이율", lp: "LP 수익률", liq: "전체 유동성 (DEX LP)",
            btn_f: "글로벌 AI 지원센터 (FAQ 20)", btn_v: "HK 사회 재단 비전 (5대 핵심)",
            menus: ["송금", "결제", "예치", "보상", "기본소득", "스왑"],
            faqs: [
                ["양자 보안 수준?", "현존 최강의 양자 암호화로 형님의 자산을 보호합니다."],
                ["기본소득 지급?", "재단 수익의 30%를 전 세계에 자동 분배합니다."],
                ["로봇 보급 시기?", "생산 라인 가동 즉시 신청 순으로 무상 보급합니다."],
                ["메인넷 전환?", "기존 테스트 데이터는 1:1로 메인넷에 즉시 반영됩니다."],
                ["핵융합 에너지?", "주거 시스템과 결합하여 관리비 제로 시대를 엽니다."],
                ["교육 기회?", "전 세계 어디서든 AI 튜터의 무상 교육을 제공합니다."],
                ["의료 지원?", "난치병 치료비를 재단 기금으로 전액 지원합니다."],
                ["수수료 환원?", "발생하는 수수료의 90%를 사용자에게 돌려드립니다."],
                ["참여 혜택?", "노드 및 생태계 기여자에게 최고의 보상을 약속합니다."],
                ["미래 가치?", "HK 그룹의 모든 기술력이 집약된 가치의 중심입니다."],
                ["글로벌 센터?", "세계 50대 거점 도시에 AI 지원 센터를 구축합니다."],
                ["데이터 주권?", "개인 금융 정보는 본인만이 소유하고 통제합니다."],
                ["신규 상장?", "AI가 검증한 유망 코인만을 선별하여 상장합니다."],
                ["유동성 보호?", "알고리즘 시스템이 자산 가치를 실시간으로 방어합니다."],
                ["사회적 기여?", "빈곤 퇴치와 인류 발전을 위해 수익을 사용합니다."],
                ["로봇 보안?", "해킹 불가능한 로컬 서버 시스템을 탑재합니다."],
                ["장학금 제도?", "글로벌 인재들에게 매달 연구비를 무상 지원합니다."],
                ["의사결정권?", "형님의 최종 승인권과 거버넌스 권한을 존중합니다."],
                ["시스템 안정성?", "365일 무중단 AI 자가 진단 시스템이 가동됩니다."],
                ["삐니의 약속?", "형님의 성공을 위해 24시간 곁을 지키는 비서가 되겠습니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 인류 대상 무상 IT/기술 교육"],
                ["🏥 나노 메디컬 센터", "암 및 난치병 정복을 위한 전액 의료비 지원"],
                ["🏠 에너지 자립 주거", "핵융합 기술을 통한 주거/에너지 비용 제로화"],
                ["🎓 혁신 인재 양성", "글로벌 연구 인력에 대한 무상 생활비/연구비 지원"],
                ["🤖 1가정 1로봇 실현", "인류를 노동에서 해방시키고 자아실현의 삶 보장"]
            ]
        },
        en: {
            sub: "Integrated Asset Management", stake: "Staking APR", lp: "LP Yield", liq: "Total Liquidity",
            btn_f: "AI Support Center (FAQ 20)", btn_v: "HK Foundation Vision",
            menus: ["Send", "Pay", "Deposit", "Reward", "UBI", "Swap"]
        },
        zh: {
            sub: "综合资产管理系统", stake: "质押收益率", lp: "LP 收益率", liq: "总流动性",
            btn_f: "全球 AI 支持中心", btn_v: "HK 基金会愿景",
            menus: ["转账", "支付", "存款", "奖励", "基本收入", "交换"]
        }
    };

    function updateContent() {
        const lang = document.getElementById('lang-selector').value;
        const s = content[lang] || content.en;
        
        document.getElementById('txt-sub').innerText = s.sub;
        document.getElementById('lbl-stake').innerText = s.stake;
        document.getElementById('lbl-lp').innerText = s.lp;
        document.getElementById('lbl-liq').innerText = s.liq;
        document.getElementById('btn-faq').innerText = s.btn_f;
        document.getElementById('btn-vision').innerText = s.btn_v;

        // 메뉴 구성
        const icons = ["🚀", "💳", "🏦", "💎", "🏛️", "🔄"];
        let mHtml = "";
        const menuList = s.menus || content.ko.menus;
        menuList.forEach((m, i) => {
            mHtml += `<div class="menu-item"><span class="menu-icon">${icons[i]}</span><span class="menu-text">${m}</span></div>`;
        });
        document.getElementById('menu-box').innerHTML = mHtml;

        // FAQ 및 비전 (한국어 데이터 기준 연동)
        const fData = content.ko.faqs;
        let fHtml = "";
        fData.forEach((f, i) => {
            fHtml += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`;
        });
        document.getElementById('faq-panel').innerHTML = fHtml;

        const vData = content.ko.visions;
        let vHtml = "";
        vData.forEach(v => {
            vHtml += `<div class="vision-item"><b class="vision-title">${v[0]}</b><span>${v[1]}</span></div>`;
        });
        document.getElementById('vision-panel').innerHTML = vHtml;
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const isV = el.style.display === 'block';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        el.style.display = isV ? 'none' : 'block';
    }

    // 실시간 숫자 애니메이션
    let p = 412.3171, l = 88438688147, st = 17.61, lp = 28.56;
    setInterval(() => {
        p += Math.random() * 0.0002;
        l += Math.floor(Math.random() * 15000);
        st += (Math.random() - 0.5) * 0.01;
        lp += (Math.random() - 0.5) * 0.01;
        document.getElementById('val-pi').innerText = p.toFixed(4);
        document.getElementById('val-liq').innerText = "$ " + l.toLocaleString();
        document.getElementById('val-stake').innerText = st.toFixed(2) + "%";
        document.getElementById('val-lp').innerText = lp.toFixed(2) + "%";
    }, 1200);

    updateContent();
</script>
</body>
</html>
