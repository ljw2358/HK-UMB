<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - Global UBI DEX</title>
    <style>
        :root {
            --bg: #000000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; padding-bottom: 120px; }
       
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 140px; }

        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #222; padding-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 20px rgba(255,215,0,0.7); }
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.1rem; color: var(--neon-st); transition: 0.5s; height: 1.2rem; }
       
        .pi-display { font-size: 2.8rem; font-weight: bold; margin: 10px 0; color: #fff; font-variant-numeric: tabular-nums; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 25px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-variant-numeric: tabular-nums; }

        .token-info { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--neon-blue); text-align: center; box-shadow: inset 0 0 15px rgba(0, 191, 255, 0.2); }
        .token-supply { color: var(--neon-blue); font-weight: bold; font-size: 1.6rem; font-variant-numeric: tabular-nums; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; }
        .rate-val { font-size: 1.2rem; font-weight: bold; font-variant-numeric: tabular-nums; }
       
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { font-size: 1.5rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .icon-card span { display: block; margin-top: 8px; font-size: 0.85rem; font-weight: bold; color: #ddd; }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
       
        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 3000; animation: pulse 2s infinite; }
        #chat-window { display: none; position: fixed; bottom: 105px; right: 20px; width: 330px; height: 480px; background: #111; border: 2px solid var(--neon-lp); border-radius: 20px; z-index: 3001; flex-direction: column; overflow: hidden; }
        #chat-header { background: var(--neon-lp); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .ai-msg { background: #222; align-self: flex-start; border-left: 4px solid var(--neon-lp); }
        .user-msg { background: var(--neon-blue); align-self: flex-end; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 0, 255, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">통합 자산 관리 시스템</div>
        <div class="pi-display"><span id="main-pi">412.3116</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,549,691</span> (GCV)</div>
    </header>

    <div class="token-info">
        <div style="font-size:0.75rem; color:#aaa; margin-bottom:5px;">HKWB TOKEN REAL-TIME SUPPLY</div>
        <div class="token-supply" id="token-num">6,280,000.2008</div>
    </div>

    <div class="rate-grid">
        <div class="rate-card">
            <div style="color:var(--neon-st); font-size:0.8rem;">스테이킹</div>
            <div class="rate-val" id="live-st" style="color:var(--neon-st);">17.19%</div>
        </div>
        <div class="rate-card">
            <div style="color:var(--neon-lp); font-size:0.8rem;">LP 수익</div>
            <div class="rate-val" id="live-lp" style="color:var(--neon-lp);">28.04%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div style="font-size:0.8rem; color:var(--neon-green); margin-bottom:5px;">총 유동성 공급 (DEX LP)</div>
        <div id="lp-total-num">$ 88,431,893,455</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" id="btn-wallet" style="background:#fff;" onclick="PiSDK.connect()">지갑 연동</button>
        <button class="m-btn" id="btn-swap" style="background:var(--gold);" onclick="PiSDK.swap()">DEX 스왑</button>
        <button class="m-btn" id="btn-stake" style="background:#28a745; color:white;" onclick="PiSDK.provideLP()">LP 스테이킹</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card">🚀<span id="m1">송금</span></div>
        <div class="icon-card">🛒<span id="m2">결제</span></div>
        <div class="icon-card">💰<span id="m3">예치</span></div>
        <div class="icon-card">🏅<span id="m4">보상</span></div>
        <div class="icon-card">🏦<span id="m5">UBI</span></div>
        <div class="icon-card">🔄<span id="m6">전환</span></div>
    </div>

    <button class="center-btn">Global AI Support Center</button>

    <div class="social-box" style="display:flex; gap:10px;">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" style="flex:1; background:#FF0000; color:white; padding:15px; text-align:center; border-radius:12px; text-decoration:none; font-weight:bold;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" style="flex:1; background:#000; border:1px solid white; color:white; padding:15px; text-align:center; border-radius:12px; text-decoration:none; font-weight:bold;">TikTok</a>
    </div>
</div>

<div id="ai-bot" onclick="toggleChat()">AI</div>
<div id="chat-window">
    <div id="chat-header"><span>HKWB AI 삐니</span><span onclick="toggleChat()" style="cursor:pointer;">✖</span></div>
    <div id="chat-messages"><div class="msg ai-msg">반갑습니다 혜공 형님! 모니터 속 시스템이 정상 구동되는 것을 확인했습니다.</div></div>
    <div style="display:flex; padding:10px; background:#111;">
        <input type="text" id="user-input" placeholder="Message..." style="flex:1; background:#222; border:none; border-radius:8px; color:white; padding:10px;">
        <button onclick="askAI()" style="background:var(--neon-lp); border:none; color:white; padding:0 15px; margin-left:8px; border-radius:8px; cursor:pointer;">SEND</button>
    </div>
</div>

<script>
    const languages = [{c:"ko", n:"한국어"}, {c:"en", n:"English"}, {c:"zh", n:"中文"}, {c:"ja", n:"日本語"}];
    const i18n = {
        ko: { ledger: "통합 자산 관리 시스템", wallet: "지갑 연동", swap: "DEX 스왑", stake: "LP 스테이킹", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "UBI", m6: "전환" },
        en: { ledger: "Asset Management System", wallet: "Connect Wallet", swap: "DEX Swap", stake: "LP Staking", m1: "Send", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Exchange" }
    };

    let pi = 412.3116; let gcv = 129549691; let lp = 88431893455; let tk = 6280000.2008;
    setInterval(() => {
        pi += (Math.random() * 0.0002 - 0.0001);
        gcv += Math.floor(Math.random() * 10 - 5);
        lp += Math.floor(Math.random() * 1000 - 500);
        tk += (Math.random() * 0.0001 - 0.00005);
        document.getElementById('main-pi').innerText = pi.toFixed(4);
        document.getElementById('main-val').innerText = gcv.toLocaleString();
        document.getElementById('lp-total-num').innerText = '$ ' + lp.toLocaleString();
        document.getElementById('token-num').innerText = tk.toFixed(4);
    }, 1500);

    const PiSDK = {
        connect: () => alert("혜공 형님, 사진 속 테스트 지갑이 엔진과 성공적으로 동기화되었습니다."),
        swap: () => alert("DEX 엔진 최적화 완료. GCV 가치로 스왑 준비 중..."),
        provideLP: () => alert("형님, LP 스테이킹으로 UBI 생태계를 강화합니다.")
    };

    function askAI() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        const chat = document.getElementById('chat-messages');
        const d = document.createElement('div'); d.className='msg user-msg'; d.innerText=input.value;
        chat.appendChild(d); input.value='';
        setTimeout(() => {
            const r = document.createElement('div'); r.className='msg ai-msg';
            r.innerText = "혜공 형님, 모니터 앞에 계신 형님의 의지를 시스템에 반영했습니다.";
            chat.appendChild(r); chat.scrollTop = chat.scrollHeight;
        }, 1000);
    }

    function changeLanguage() {
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.ko;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('btn-wallet').innerText = d.wallet;
        document.getElementById('btn-swap').innerText = d.swap;
        document.getElementById('btn-stake').innerText = d.stake;
        ['m1','m2','m3','m4','m5','m6'].forEach(id => document.getElementById(id).innerText = d[id]);
    }

    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        languages.forEach(l => { const o = document.createElement('option'); o.value=l.c; o.innerText=l.n; sel.appendChild(o); });
    };
</script>
</body>
</html>
