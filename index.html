<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL 30</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --pi-purple: #673ab7;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* 1. 지구본 & 30개국 국기 사이드바 */
        .globe-btn { position: fixed; top: 25px; right: 25px; font-size: 32px; cursor: pointer; z-index: 2000; transition: 0.3s; }
        .globe-btn:hover { transform: scale(1.2); }
        
        .lang-sidebar { 
            position: fixed; top: 0; right: -300px; width: 260px; height: 100%; 
            background: rgba(15, 15, 15, 0.98); border-left: 3px solid var(--hk-gold);
            z-index: 3000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow-y: auto; padding: 20px;
        }
        .lang-sidebar.open { right: 0; }
        .lang-item { 
            padding: 15px; border-bottom: 1px solid #222; cursor: pointer; 
            font-size: 15px; text-align: left; display: flex; align-items: center; gap: 15px; 
        }
        .lang-item:hover { background: var(--pi-purple); color: #fff; border-radius: 10px; }
        .flag { font-size: 20px; }

        /* 기존 예술적 디자인 유지 */
        .header-section { margin: 50px 0 30px 0; }
        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; }
        .sub-header { color: var(--hk-blue); font-size: 16px; margin-top: 10px; font-weight: 800; letter-spacing: 2px; }
        
        .pi-main { font-size: 60px; font-weight: 900; margin: 20px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 26px; }
        .gcv-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 10px 30px; border-radius: 50px; font-size: 18px; font-weight: 900; margin-bottom: 30px; }

        /* 지갑 & 테스트 파이 실구동 */
        .wallet-display { background: #0a0a0a; border: 1px solid var(--hk-blue); border-radius: 20px; padding: 20px; margin: 20px 0; text-align: left; display: none; border-left: 5px solid var(--hk-blue); }
        .wallet-addr { font-size: 10px; color: #666; word-break: break-all; font-family: monospace; margin: 8px 0; }

        .btn-group-label { text-align: left; font-size: 15px; font-weight: 900; margin: 30px 0 15px 5px; color: var(--hk-gold); }
        .top-btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .top-btn { padding: 20px 0; border-radius: 18px; font-weight: 900; color: #000; border: none; cursor: pointer; transition: 0.3s; font-size: 14px; }

        /* Pi Apps 챗봇 */
        .chat-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; flex-direction: column; }
        .chat-nav { background: var(--pi-purple); padding: 20px; font-weight: 900; display: flex; align-items: center; font-size: 18px; }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #111; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .bubble.bot { background: #262626; align-self: flex-start; }
        .bubble.user { background: var(--pi-purple); align-self: flex-end; }
        .chat-input-row { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 25px; padding: 12px 20px; color: #fff; outline: none; }

        .bbini { position: fixed; bottom: 35px; right: 30px; width: 80px; height: 80px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 3px solid #fff; cursor: pointer; z-index: 1000; box-shadow: 0 10px 30px rgba(255,0,255,0.4); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div class="globe-btn" onclick="toggleSidebar()">🌐</div>

<div id="langSide" class="lang-sidebar">
    <div style="font-weight:900; color:var(--hk-gold); margin-bottom:20px; font-size:18px;" id="L_sel_lang">SELECT LANGUAGE</div>
    <div id="flag-list"></div>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title" id="L_title">HK WORLD BANK</div>
        <div class="sub-header" id="L_subtitle">메인자산통합원장</div>
    </div>

    <div class="pi-main"><span id="val_pi">400.0212</span> <span>Pi</span></div>
    <div class="gcv-pill" id="L_gcv">Value: $ 125,663,600 (GCV)</div>

    <div id="wallet-card" class="wallet-display">
        <div style="font-size:13px; font-weight:900; color:var(--hk-blue);" id="L_wallet_head">HK-WORLD TEST WALLET</div>
        <div class="wallet-addr">GDHKWB-JAEWAN-HYEKONG-SUCCESS-2026-PI</div>
        <div style="margin-top:12px; display:flex; justify-content:space-between; font-size: 14px;">
            <span id="L_staked_label">예치된 수량:</span>
            <b style="color:var(--hk-green);"><span id="val_staked">0.0000</span> Pi</b>
        </div>
    </div>

    <div class="btn-group-label" id="L_assets">MAIN ASSETS</div>
    <div class="top-btn-grid">
        <button class="top-btn" style="background: #E0D7FF;" id="L_btn_pi">PI 수량</button>
        <button class="top-btn" style="background: #FFD700;" id="L_btn_dex">DEX 스왑</button>
        <button class="top-btn" style="background: #39FF14;" onclick="runTestNet()" id="L_btn_lp">LP 스테이킹</button>
    </div>

    <div class="btn-group-label" id="L_eco">HK ECOSYSTEM</div>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
        <div class="top-btn" style="background:#111; color:#fff; border:1px solid #222;" onclick="depositPi()"><span style="font-size:20px;">🏦</span><br><span id="L_m1">예치</span></div>
        <div class="top-btn" style="background:#111; color:#fff; border:1px solid #222;"><span style="font-size:20px;">🚀</span><br><span id="L_m2">송금</span></div>
        <div class="top-btn" style="background:#111; color:#fff; border:1px solid #222;"><span style="font-size:20px;">🏠</span><br><span id="L_m3">기본소득</span></div>
    </div>
</div>

<div id="chat-box" class="chat-ui">
    <div class="chat-nav">
        <span onclick="toggleChat()" style="cursor:pointer; margin-right:20px;">←</span>
        <span id="L_chat_title">Pi Apps Chat</span>
    </div>
    <div class="chat-msgs" id="chat-flow">
        <div class="bubble bot" id="L_chat_hi">혜공 형님! 무엇을 도와드릴까요?</div>
    </div>
    <div class="chat-input-row">
        <input type="text" id="c-input" class="chat-input" placeholder="Type a message...">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--pi-purple); font-weight:900; cursor:pointer;">Send</button>
    </div>
</div>

<div class="bbini" onclick="toggleChat()">삐니</div>

<script>
    // 1. 30개국 국기 및 언어 데이터
    const countries = [
        {c:'ko', n:'한국어', f:'🇰🇷'}, {c:'en', n:'English', f:'🇺🇸'}, {c:'cn', n:'简体中文', f:'🇨🇳'},
        {c:'jp', n:'日本語', f:'🇯🇵'}, {c:'vn', n:'Tiếng Việt', f:'🇻🇳'}, {c:'de', n:'Deutsch', f:'🇩🇪'},
        {c:'fr', n:'Français', f:'🇫🇷'}, {c:'es', n:'Español', f:'🇪🇸'}, {c:'ru', n:'Русский', f:'🇷🇺'},
        {c:'it', n:'Italiano', f:'🇮🇹'}, {c:'tr', n:'Türkçe', f:'🇹🇷'}, {c:'th', n:'ไทย', f:'🇹🇭'},
        {c:'id', n:'Bahasa Indonesia', f:'🇮🇩'}, {c:'ph', n:'Filipino', f:'🇵🇭'}, {c:'br', n:'Português', f:'🇧🇷'},
        {c:'sa', n:'العربية', f:'🇸🇦'}, {c:'in', n:'हिन्दी', f:'🇮🇳'}, {c:'nl', n:'Nederlands', f:'🇳🇱'},
        {c:'pl', n:'Polski', f:'🇵🇱'}, {c:'se', n:'Svenska', f:'🇸🇪'}, {c:'ae', n:'UAE', f:'🇦🇪'},
        {c:'my', n:'Malay', f:'🇲🇾'}, {c:'eg', n:'Egypt', f:'🇪🇬'}, {c:'mx', n:'Mexico', f:'🇲🇽'},
        {c:'ca', n:'Canada', f:'🇨🇦'}, {c:'au', n:'Australia', f:'🇦🇺'}, {c:'sg', n:'Singapore', f:'🇸🇬'},
        {c:'hk', n:'Hong Kong', f:'🇭🇰'}, {c:'tw', n:'Taiwan', f:'🇹🇼'}, {c:'ch', n:'Swiss', f:'🇨🇭'}
    ];

    const langMap = {
        ko: { sel_lang: "언어 선택 (30개국)", title: "HK WORLD BANK", subtitle: "메인자산통합원장", gcv: "가치: $ 125,663,600 (GCV)", wallet_head: "내 전용 테스트 지갑", staked_label: "예치된 수량:", assets: "핵심 자산", btn_pi: "PI 수량", btn_dex: "DEX 스왑", btn_lp: "LP 스테이킹", eco: "HK 에코시스템", m1: "예치", m2: "송금", m3: "기본소득", chat_title: "Pi Apps - 삐니 AI 비서", chat_hi: "혜공 형님! 무엇을 도와드릴까요?" },
        en: { sel_lang: "Select Language (30)", title: "HK WORLD BANK", subtitle: "Global Asset Ledger", gcv: "Value: $ 125,663,600 (GCV)", wallet_head: "My Test Wallet", staked_label: "Staked Amount:", assets: "MAIN ASSETS", btn_pi: "PI Balance", btn_dex: "DEX Swap", btn_lp: "LP Staking", eco: "HK ECOSYSTEM", m1: "Deposit", m2: "Transfer", m3: "UBI", chat_title: "Pi Apps - Bbini AI", chat_hi: "Welcome, Chairman! How can I help you?" },
        cn: { sel_lang: "选择语言 (30)", title: "HK世界银行", subtitle: "全球资产账本", gcv: "价值: $ 125,663,600 (GCV)", wallet_head: "我的测试钱包", staked_label: "质押金额:", assets: "核心资产", btn_pi: "PI 余额", btn_dex: "DEX 交换", btn_lp: "LP 质押", eco: "HK 生态系统", m1: "存款", m2: "转账", m3: "基本收入", chat_title: "派应用 - 机器人", chat_hi: "欢迎！有什么可以帮您的？" }
        // ... 타 언어는 en으로 기본 대응하도록 설정
    };

    // 사이드바에 30개 국기 주입
    const flagList = document.getElementById('flag-list');
    countries.forEach(item => {
        flagList.innerHTML += `
            <div class="lang-item" onclick="setSystemLang('${item.c}')">
                <span class="flag">${item.f}</span>
                <span>${item.n}</span>
            </div>`;
    });

    function setSystemLang(lang) {
        const d = langMap[lang] || langMap['en'];
        for(let key in d) {
            const el = document.getElementById('L_'+key);
            if(el) el.innerText = d[key];
        }
        toggleSidebar();
    }

    function toggleSidebar() { document.getElementById('langSide').classList.toggle('open'); }

    // 2. 테스트 파이 실구동
    let pi = 400.0212, staked = 0;
    function runTestNet() {
        document.getElementById('wallet-card').style.display = 'block';
        alert("HK-WorldBank 테스트넷 지갑 활성화!");
    }

    function depositPi() {
        if(pi < 1) return alert("잔액 부족");
        pi -= 1; staked += 1;
        document.getElementById('val_pi').innerText = pi.toFixed(4);
        document.getElementById('val_staked').innerText = staked.toFixed(4);
        alert("테스트 파이 1개 예치 성공!");
    }

    // 3. Pi Apps 스타일 챗봇
    function toggleChat() {
        const c = document.getElementById('chat-box');
        c.style.display = (c.style.display==='flex') ? 'none' : 'flex';
    }

    function sendMsg() {
        const i = document.getElementById('c-input'), f = document.getElementById('chat-flow');
        if(!i.value) return;
        f.innerHTML += `<div class="bubble user">${i.value}</div>`;
        setTimeout(() => {
            let res = "형님, 명령하신 블록체인 트랜잭션을 처리 중입니다.";
            if(i.value.includes("잔액")) res = `현재 가용 잔액은 ${pi.toFixed(4)} Pi입니다.`;
            f.innerHTML += `<div class="bubble bot">${res}</div>`;
            f.scrollTop = f.scrollHeight;
        }, 800);
        i.value = ""; f.scrollTop = f.scrollHeight;
    }
</script>

</body>
</html>
