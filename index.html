            position: relative; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);

        .gcv-badge {
            display: inline-block; border: 2px solid var(--green); color: var(--green);

    function toggleView(show) { document.getElementById('langLayer').style.display = show ? 'block' : 'none'; }

    function applyChange(idx) {
        const n = data[idx];
        document.getElementById('f-icon').innerText = n.f;
        document.getElementById('f-name').innerText = n.n;
        document.getElementById('l-ledger').innerText = n.l;
        document.getElementById('l-lp-lbl').innerText = n.lp;
        document.getElementById('l-shield').innerHTML = `<i class="fas fa-shield-alt"></i> ${n.sh}`;
        document.getElementById('l-ai').innerText = n.ai;
        for(let i=0; i<3; i++) {
            document.getElementById(`b${i+1}`).innerText = n.b[i];
            document.getElementById(`s${i+1}`).innerText = n.s[i];
        }
        for(let i=0; i<6; i++) document.getElementById(`m${i+1}`).innerText = n.m[i];
        toggleView(false);
        gsap.from(".container", {duration: 0.8, opacity: 0, y: 50, ease: "expo.out"});
    }

    const grid = document.getElementById('nationGrid');
    data.forEach((n, idx) => {
        const d = document.createElement('div');
        d.className = 'nation-btn';
        d.innerHTML = `<span style="font-size:30px;">${n.f}</span> ${n.n}`;
        d.onclick = () => applyChange(idx);
        grid.appendChild(d);
    });

    window.onload = () => {
        gsap.from(".brand-h1", {duration: 1.2, y: -60, opacity: 0, ease: "bounce.out"});
        gsap.from(".main-card", {duration: 1, scale: 0.85, opacity: 0, delay: 0.5, ease: "power4.out"});
        gsap.from(".svc-card", {duration: 0.6, y: 30, opacity: 0, stagger: 0.1, delay: 1});
    };
