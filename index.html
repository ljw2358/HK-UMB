<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
            --gcv-fixed: 10000; /* GCV 만불 고정 */
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* V23 하이테크 디자인 */
        .header-section { margin: 40px 0 20px 0; animation: fadeInDown 1s; }
        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .sub-header { color: var(--hk-blue); font-size: 14px; font-weight: 800; letter-spacing: 3px; }

        .pi-main { font-size: 58px; font-weight: 900; margin: 15px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 24px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 30px; border-radius: 50px; font-size: 16px; font-weight: 900; margin-bottom: 25px; }

        /* 실시간 데이터 카드 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-card { background: var(--hk-card); border: 1px solid #1a1a1a; padding: 15px; border-radius: 20px; position: relative; overflow: hidden; }
        .info-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--hk-blue), transparent); }

        /* 9대 항목 시연 버튼 (V23 최적화) */
        .demo-label { text-align: left; font-size: 14px; font-weight: 900; color: var(--hk-gold); margin: 25px 0 12px 5px; }
        .demo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .demo-item { background: #0a0a0a; border: 1px solid #222; padding: 18px 5px; border-radius: 22px; cursor: pointer; transition: 0.2s; }
        .demo-item:hover { border-color: var(--hk-gold); background: #111; transform: translateY(-3px); }
        .demo-icon { font-size: 24px; display: block; margin-bottom: 8px; }
        .demo-text { font-size: 12px; font-weight: 800; color: #eee; }

        /* FAQ & 비전 (원본 데이터) */
        .big-btn { width: 100%; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        .panel { display: none; background: #050505; border-radius: 22px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; line-height: 1.6; }

        /* 소셜 미디어 버튼 */
        .social-box { display: flex; gap: 10px; margin-top: 15px; }
        .soc-btn { flex: 1; padding: 18px; border-radius: 18px; font-weight: 900; text-decoration: none; color: #fff; font-size: 14px; }

        /* 언어 선택 (글로벌 30개국어) */
        .lang-float { position: fixed; top: 15px; right: 15px; z-index: 5000; }
        .lang-float select { background: #111; color: var(--hk-gold); border: 1.5px solid var(--hk-gold); border-radius: 10px; padding: 5px 10px; font-size: 12px; font-weight: 900; outline: none; }

        /* 현지 AI 에이전트 */
        .hyenji-bot { position: fixed; bottom: 30px; right: 25px; width: 75px; height: 75px; background: linear-gradient(135deg, var(--hk-pink), #500050); border-radius: 50%; border: 3px solid #fff; display: flex; items-center; justify-content: center; font-weight: 900; color: #fff; cursor: pointer; z-index: 4000; box-shadow: 0 0 20px var(--hk-pink); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* 애니메이션 */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
