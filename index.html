<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - THE SUPREME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--hk-bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 25px; min-height: 100vh; position: relative; }

        /* [요구사항] 언어 선택기를 우측 상단으로 */
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 0; position: sticky; top: 0; z-index: 1000; }
        #langSelect { 
            background: rgba(0,0,0,0.8); color: var(--hk-gold); border: 2px solid var(--hk-gold); 
            padding: 8px 15px; border-radius: 12px; font-weight: 900; cursor: pointer; 
            font-size: 14px; backdrop-filter: blur(10px); 
        }

        /* 헤더 */
        .header { text-align: center; margin-bottom: 40px; }
        .main-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); text-shadow: 0 0 25px rgba(255,215,0,0.5); letter-spacing: -2px; }
        .sub-title { font-size: 16px; font-weight: 700; color: var(--hk-blue); margin-top: 8px; letter-spacing: 3px; }

        /* [요구사항] PI 수량 및 자산 카드 */
        .asset-card { 
            background: linear-gradient(145deg, #111, #000); border: 1.5px solid #222; 
            border-radius: 35px; padding: 45px 20px; margin-bottom: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); text-align: center;
        }
        .pi-label { font-size: 14px; color: #888; font-weight: 800; margin-bottom: 15px; display: block; }
        .pi-val { font-size: 60px; font-weight: 900; color: #fff; }
        .pi-unit { font-size: 24px; color: var(--hk-gold); margin-left: 8px; }
        .usd-val { color: var(--hk-green); font-weight: 900; font-size: 24px; margin-top: 20px; }

        /* [요구사항] 스왑 및 스테이킹 보상 그리드 */
        .function-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .func-box { 
            background: var(--hk-card); border: 1.5px solid #1a1a1a; 
            padding: 25px 15px; border-radius: 25px; text-align: center;
        }
        .func-label { font-size: 12px; color: #888; font-weight: 800; margin-bottom: 10px; display: block; }
        .func-val { font-size: 20px; font-weight: 900; color: var(--hk-blue); }

        /* [요구사항] 메뉴 구성: DEX, LP, 기본소득 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; }
        .menu-item { 
            background: #111; padding: 25px 5px; border-radius: 20px; border: 1px solid #222; 
            cursor: pointer; text-align: center; transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.95); background: #222; }
        .menu-icon { font-size: 28px; display: block; margin-bottom: 8px; }
        .menu-text { font-size: 13px; font-weight: 900; color: #ccc; }

        /* [요구사항] 소셜 미디어: 유튜브, 틱톡 */
        .sns-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .sns-icon { font-size: 35px; cursor: pointer; text-decoration: none; }

        /* 섹션 패널 버튼 */
        .panel-btn { 
            width: 100%; padding: 28px; border-radius: 30px; font-size: 22px; 
            font-weight: 900; color: #fff; border: none; margin-bottom: 18px; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
        }
        .panel { display: none; background: #050505; border: 2.5px solid #222; border-radius: 35px; padding: 40px 25px; margin-bottom: 50px; text-align: left; }

        /* 데이터 아이템 스타일 */
        .data-group { margin-bottom: 35px; border-bottom: 1px solid #1a1a1a; padding-bottom: 25px; }
        .data-q { color: var(--hk-gold); font-weight: 900; margin-bottom: 15px; font-size: 18px; line-height: 1.4; }
        .data-a { color: #eee; font-size: 15px; line-height: 1.9; padding-left: 15px; border-left: 3px solid var(--hk-pink); }
        .vision-t { color: var(--hk-blue); font-weight: 900; font-size: 20px; margin-bottom: 12px; display: block; }
        .vision-d { color: #aaa; font-size: 15px; line-height: 1.8; }

        footer { text-align: center; margin-top: 80px; padding-bottom: 60px; color: #333; font-size: 13px; font-weight: 900; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <select id="langSelect" onchange="updateAll()">
            <option value="ko">🇰🇷 KOREAN</option>
            <option value="en">🇺🇸 ENGLISH</option>
            <option value="zh">🇨🇳 中文 (CHINA)</option>
        </select>
    </div>

    <header class="header">
        <div class="main-title">HK WORLD BANK</div>
        <div id="sub-title" class="sub-title">INTEGRATED ASSET OS</div>
    </header>

    <div class="asset-card">
        <span id="l-pi-label" class="pi-label">TOTAL BALANCE</span>
        <div class="pi-val"><span id="v-pi">412.3171</span><span class="pi-unit">Pi</span></div>
        <div id="v-usd" class="usd-val">$ 129,542,830</div>
    </div>

    <div class="function-grid">
        <div class="func-box">
            <span id="l-dex" class="func-label">DEX SWAP</span>
            <div class="func-val" id="v-dex">1.0000 HK</div>
        </div>
        <div class="func-box">
            <span id="l-income" class="func-label">BASIC INCOME</span>
            <div class="func-val" id="v-income" style="color:var(--hk-pink)">30% DIST.</div>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><span class="menu-icon">💱</span><span id="m1" class="menu-text">DEX 스왑</span></div>
        <div class="menu-item"><span class="menu-icon">🥩</span><span id="m2" class="menu-text">LP 스테이킹</span></div>
        <div class="menu-item"><span class="menu-icon">🎁</span><span id="m3" class="menu-text">보상 스왑</span></div>
    </div>

    <div class="sns-bar">
        <a href="https://youtube.com" class="sns-icon" title="YouTube">🔴</a>
        <a href="https://tiktok.com" class="sns-icon" title="TikTok">🖤</a>
    </div>

    <button id="btn-faq" class="panel-btn" style="background:var(--hk-pink)" onclick="togglePanel('faq-panel')">GLOBAL AI SUPPORT (FAQ 20)</button>
    <div id="faq-panel" class="panel"></div>

    <button id="btn-vision" class="panel-btn" style="background:#2c3e50" onclick="togglePanel('vision-panel')">HK 5 VISIONS (FOUNDATION)</button>
    <div id="vision-panel" class="panel"></div>

    <footer>HK GROUP GLOBAL HEADQUARTERS</footer>
</div>

            m1: "DEX 스왑", m2: "LP 스테이킹", m3: "보상 스왑", faq_btn: "글로벌 AI 지원센터 (FAQ 20)", vision_btn: "HK 사회 재단 5대 비전",

                {q: "17. 장학금 제도?", a: "혁신적 천재 인재에게 월 최대 $5,000의 연구비와 생활비를 무상 지원합니다."},
                {q: "18. HK 거버넌스?", a: "설립자 혜공 형님의 최종 승인권과 핵심 멤버들의 투표로 의사결정이 이뤄집니다."},
                {q: "19. 시스템 장애?", a: "전 세계 분산 서버와 AI 자가 복구 엔진이 24시간 중단 없는 서비스를 보장합니다."},

                {t: "🏠 에너지 자립 스마트홈", d: "핵융합 에너지를 기반으로 주거 비용 걱정이 없는 스마트홈을 보급합니다."},
                {t: "🎓 혁신 인재 장학 재단", d: "글로벌 천재들이 연구에만 몰두하도록 파격적인 연구비와 생활비를 지원합니다."},
                {t: "🤖 1가정 1로봇 보급", d: "전 가구에 가사 로봇을 무상 보급하여 노동에서 해방시키고 삶의 가치를 높입니다."}
            ]
        },
        en: {
            sub: "INTEGRATED ASSET OS", pi_label: "TOTAL PI BALANCE", dex: "DEX SWAP LIVE", income: "BASIC INCOME",
            m1: "DEX SWAP", m2: "LP STAKING", m3: "REWARD SWAP", faq_btn: "GLOBAL SUPPORT (FAQ 20)", vision_btn: "HK 5 VISIONS",
            faq: [
                {q: "1. Security Status?", a: "Uses Quantum Encryption to provide unhackable security for all assets."},
                {q: "16. Humanoid Safety?", a: "Unhackable local server storage blocks all external data transfers for privacy."},
                {q: "17. Scholarships?", a: "Global talents receive up to $5,000/month for research and living expenses."},
                {q: "18. HK Governance?", a: "Decisions made by Founder Hyekong's final approval and core member voting."},
                {q: "19. System Reliability?", a: "Distributed infrastructure and AI self-healing ensure 24/7 uptime."},
                {q: "20. Bbini's Role?", a: "Dedicated AI assistant supporting Hyekong's asset management and vision 24/7."}
            ],
            vision: [
                {t: "🏫 HK Global AI School", d: "Providing 24/7 free AI education for the underprivileged to achieve equality."},
                {t: "🏥 Nano Medical Center", d: "Conquering incurable diseases through free nano-tech medical services."},
                {t: "🏠 Energy Smart Home", d: "Distributing fusion-powered smart homes to eliminate housing costs."},
                {t: "🎓 Innovation Foundation", d: "Providing unlimited research funds for global geniuses to breakthroughs."},
                {t: "🤖 1 Home, 1 Humanoid", d: "Free distribution of robots to liberate humanity from labor."}
            ]
        },
        zh: {
            sub: "全球资产管理系统", pi_label: "我的总持有量", dex: "实时 DEX 兑换", income: "基本收入分配",
            m1: "DEX 兑换", m2: "LP 质押", m3: "奖励兑换", faq_btn: "全球支持中心 (FAQ 20)", vision_btn: "HK 5大愿景",
            faq: [
                {q: "1. 安全性如何?", a: "采用量子加密技术，提供全球最高级别的安全保障。"},
                {q: "16. 人形机器人安全吗?", a: "采用不可破解的本地存储，严格阻止外部数据传输以保护隐私。"},
                {q: "17. 奖学金制度?", a: "为全球创新人才提供每月高达 $5,000 的研究和生活资助。"},
                {q: "18. HK 治理模式?", a: "由创始人 Hyekong 拥有最终决策权，并结合核心成员投票。"},
                {q: "19. 系统稳定性?", a: "分布式架构与 AI 自愈引擎确保 24/7 不间断服务。"},
                {q: "20. Bbini 的职责?", a: "作为创办人的专属 AI 秘书，24小时支持资产管理和愿景实现。"}
            ],
            vision: [
                {t: "🏫 HK 全球 AI 学校", d: "为弱势群体提供免费 AI 教育，实现教育公平。"},
                {t: "🏥 纳米医疗中心", d: "基金会全资支持，免费提供先进纳米医疗攻克难疾。"},
                {t: "🏠 能源自给智能家居", d: "普及核聚变动力智能家居，实现零住房成本。"},
                {t: "🎓 创新人才基金会", d: "为全球天才提供丰厚经费，助力科学技术突破。"},
                {t: "🤖 1户1机 普及化", d: "免费普及人形机器人，让人类从繁重劳动中解放。"}
            ]
        }
    };

    function updateAll() {
        const lang = document.getElementById('langSelect').value;
        const d = HK_DB[lang] || HK_DB['en'];

        // 텍스트 업데이트
        document.getElementById('sub-title').innerText = d.sub;
        document.getElementById('l-pi-label').innerText = d.pi_label;
        document.getElementById('l-dex').innerText = d.dex;
        document.getElementById('l-income').innerText = d.income;
        document.getElementById('m1').innerText = d.m1;
        document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3;
        document.getElementById('btn-faq').innerText = d.faq_btn;
        document.getElementById('btn-vision').innerText = d.vision_btn;

        // 패널 내용 업데이트 (FAQ & Vision)
        const faqP = document.getElementById('faq-panel');
        faqP.innerHTML = d.faq.map(f => `<div class="data-group"><div class="data-q">${f.q}</div><div class="data-a">${f.a}</div></div>`).join('');

        const visP = document.getElementById('vision-panel');
        visP.innerHTML = d.vision.map(v => `<div class="data-group"><span class="vision-t">${v.t}</span><p class="vision-d">${v.d}</p></div>`).join('');
    }

    function togglePanel(id) {
        const el = document.getElementById(id);
        const isShow = el.style.display === 'block';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        el.style.display = isShow ? 'none' : 'block';
        if(!isShow) el.scrollIntoView({ behavior: 'smooth' });
    }

    // 실시간 데이터 흐름
    let pi = 412.3171, usd = 129542830;
    setInterval(() => {
        pi += Math.random() * 0.0001;
        usd += Math.floor(Math.random() * 100);
        document.getElementById('v-pi').innerText = pi.toFixed(4);
        document.getElementById('v-usd').innerText = "$ " + usd.toLocaleString();
    }, 2000);

    updateAll(); // 초기화
</script>

</body>
</html>
