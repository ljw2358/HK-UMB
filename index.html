<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - IMMORTAL MASTER</title>
    <style>
        :root { 
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF; 
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d; 
            --hk-red: #FF0000;
        }
        body { 
            background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        /* 불멸의 아우라 효과 */
        .container { 
            width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center;
            position: relative; z-index: 1;
        }
        .aura {
            position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%); z-index: 0; pointer-events: none;
        }
        
        .header { display: flex; justify-content: flex-end; width: 100%; margin-bottom: 20px; }
        .lang-select { 
            background: rgba(255,215,0,0.1); border: 1px solid var(--hk-gold); padding: 8px 12px; 
            border-radius: 10px; font-size: 11px; font-weight: bold; color: var(--hk-gold); outline: none;
        }

        .title-main { color: var(--hk-gold); font-size: 36px; font-weight: 900; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .subtitle { color: var(--hk-blue); font-size: 14px; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; }

        /* [핵심 1] PI 수량 - 불멸의 금빛 각인 */
        .asset-section { margin-bottom: 40px; }
        .pi-val { font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--hk-gold); margin: 10px 0; }
        .pi-unit { color: var(--hk-gold); font-size: 28px; font-weight: bold; }
        .gcv-badge { 
            display: inline-block; border: 2px solid var(--hk-green); padding: 10px 25px; 
            border-radius: 50px; color: var(--hk-green); font-weight: 900; font-size: 16px; margin-top: 10px;
            box-shadow: 0 0 10px rgba(57,255,20,0.3);
        }

        /* [핵심 2] DEX 스왑 & LP 스테이킹 대시보드 */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .dash-card { 
            background: linear-gradient(145deg, #111, #050505); border: 1px solid #222; 
            padding: 20px; border-radius: 20px; position: relative; overflow: hidden;
        }
        .dash-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
        
        .dash-label { font-size: 11px; color: #777; margin-bottom: 8px; font-weight: bold; }
        .dash-val { font-size: 22px; font-weight: 900; }

        /* 유동성 현황 */
        .liq-box { 
            background: rgba(0,243,255,0.05); border: 1px solid var(--hk-blue); 
            padding: 20px; border-radius: 20px; margin-bottom: 30px;
        }
        .liq-title { font-size: 12px; color: var(--hk-blue); margin-bottom: 10px; font-weight: bold; }
        .liq-val { font-size: 28px; font-weight: 900; color: var(--hk-green); }

        /* 6대 핵심 생태계 메뉴 */
        .eco-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .eco-item { 
            background: var(--hk-card); padding: 20px 5px; border-radius: 18px; 
            border: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer;
        }
        .eco-item:hover { border-color: var(--hk-gold); background: #151515; }
        .eco-icon { font-size: 26px; margin-bottom: 10px; display: block; }
        .eco-text { font-size: 12px; font-weight: bold; color: #bbb; }

        /* [핵심 3] FAQ 20 & 5대 비전 (금강경 버전) */
        .btn-action { 
            width: 100%; padding: 20px; border-radius: 18px; font-weight: 900; 
            font-size: 15px; margin-top: 15px; border: none; cursor: pointer; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-faq { background: var(--hk-pink); color: #fff; box-shadow: 0 10px 20px rgba(255,0,255,0.2); }
        .btn-vis { background: #1a1f2b; color: #fff; border: 1px solid #333; }
        
        .content-area { 
            display: none; background: #050505; padding: 25px; text-align: left; 
            font-size: 14px; color: #ccc; border-radius: 0 0 20px 20px; 
            border: 1px solid #222; border-top: none; line-height: 2;
        }
        .content-area b { color: var(--hk-gold); display: inline-block; width: 60px; }

        .sns-row { display: flex; gap: 10px; margin-top: 40px; }
        .sns-btn { 
            flex: 1; padding: 18px; border-radius: 15px; font-weight: bold; 
            text-decoration: none; font-size: 14px; color: #fff;
        }
        
        footer { margin-top: 60px; font-size: 11px; color: #444; padding-bottom: 80px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="aura"></div>

<div class="container">
    <div class="header">
        <select class="lang-select" id="langSelect" onchange="updateAll()">
            <option value="ko">🇰🇷 KOREAN</option>
            <option value="en">🇺🇸 ENGLISH</option>
            <option value="zh">🇨🇳 CHINESE</option>
        </select>
    </div>

    <div class="title-main">HK WORLD BANK</div>
    <div id="sub_title" class="subtitle">GLOBAL INTEGRATED LEDGER</div>

    <div class="asset-section">
        <div class="pi-val">400.0220</div>
        <div class="pi-unit">Pi Network Assets</div>
        <div id="gcv_val" class="gcv-badge">GCV: $ 125,663,600</div>
    </div>

    <div class="dash-grid">
        <div class="dash-card">
            <div id="l_r1" class="dash-label">LP STAKING</div>
            <div id="v_r1" class="dash-val" style="color:var(--hk-blue)">18.5%</div>
        </div>
        <div class="dash-card">
            <div id="l_r2" class="dash-label">DEX SWAP YIELD</div>
            <div id="v_r2" class="dash-val" style="color:var(--hk-pink)">24.5%</div>
        </div>
    </div>

    <div class="liq-box">
        <div id="liq_t" class="liq-title">TOTAL LIQUIDITY (HK-LP)</div>
        <div id="liq_v" class="liq-val">$ 88,438,688,147</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-icon">🚀</span><span id="m1" class="eco-text">송금</span></div>
        <div class="eco-item"><span class="eco-icon">🛒</span><span id="m2" class="eco-text">결제</span></div>
        <div class="eco-item"><span class="eco-icon">🏛️</span><span id="m3" class="eco-text">예치</span></div>
    </div>
    <div class="eco-grid" style="margin-bottom: 30px;">
        <div class="eco-item"><span class="eco-icon">🎁</span><span id="m4" class="eco-text">보상</span></div>
        <div class="eco-item"><span class="eco-icon">💳</span><span id="m5" class="eco-text">기본소득</span></div>
        <div class="eco-item"><span class="eco-icon">🔄</span><span id="m6" class="eco-text">스왑</span></div>
    </div>

    <button id="f_btn" class="btn-action btn-faq" onclick="toggleAcc('faq')">
        <span>GLOBAL AI SUPPORT (FAQ 20)</span><span>▼</span>
    </button>
    <div id="faq" class="content-area"></div>

    <button id="v_btn" class="btn-action btn-vis" onclick="toggleAcc('vision')">
        <span>HK FOUNDATION VISION 2030</span><span>▼</span>
    </button>
    <div id="vision" class="content-area"></div>

    <div class="sns-row">
        <a href="https://youtube.com/@Hyekong2025" class="sns-btn" style="background:var(--hk-red)">YOUTUBE</a>
        <a href="https://tiktok.com/@hyekong2025" class="sns-btn" style="background:#111; border:1px solid #333;">TIKTOK</a>
    </div>

    <footer>© 2026 HK GROUP · FOUNDER HYEKONG</footer>
</div>

<script>
    const data = {
        ko: {
            sub: "인류 상생 메인 통합 원장", m1: "해외 송금", m2: "GCV 결제", m3: "자산 예치", m4: "기여 보상", m5: "기본 소득", m6: "DEX 스왑",
            gcv: "GCV 가치: $ 125,663,600", r1: "LP 스테이킹", v1: "18.5% (APY)", r2: "DEX 스왑 수익", v2: "24.5% (Yield)",
            liqT: "전체 유동성 현황 (HK-POOL)", liqV: "$ 88,438,688,147",
            fb: "글로벌 AI 지원센터 (FAQ 20)", vb: "HK 사회 재단 비젼 2030",
            faq: `<b>Q1.</b> 설립 목적? 인류 기술 격차 해소 및 상생<br><b>Q2.</b> 지원 대상? 글로벌 혁신 파트너 및 개척자<br><b>Q3.</b> GPU 자원? 고성능 인프라 단계별 무상 할당<br><b>Q4.</b> 신청 방법? 공식 포털 제안서 상시 접수<br><b>Q5.</b> 기술 소유? 개발자 귀속 원칙 및 보호<br><b>Q6.</b> 거점 위치? 서울 및 글로벌 7대 전략 허브<br><b>Q7.</b> 윤리 기준? 인간 존엄성을 최우선 가치로 실현<br><b>Q8.</b> 로봇 지원? Figure AI 등 휴머노이드 프로젝트<br><b>Q9.</b> 교육 과정? AI 및 로봇 전문 인재 양성<br><b>Q10.</b> 컨설팅? 법률 대응 및 비즈니스 모델 설계<br><b>Q11.</b> 투자 매칭? HK 글로벌 펀드와 직접 연결<br><b>Q12.</b> 보안 환경? 양자 내성 암호 샌드박스 제공<br><b>Q13.</b> 오픈소스? 공익 프로젝트 서버 무상 지원<br><b>Q14.</b> 중단 기준? 기술 악용 및 비윤리적 사용 시<br><b>Q15.</b> 기술 지원? 24/7 글로벌 엔지니어 상주<br><b>Q16.</b> 언어 지원? 실시간 다국어 협업 시스템<br><b>Q17.</b> 수익 배분? 사회 재단 환원 및 선순환 구조<br><b>Q18.</b> 테스트베드? 하드웨어 및 실물 경제 실증<br><b>Q19.</b> 커뮤니티? 글로벌 개발자 포럼 참여<br><b>Q20.</b> 미래 비전? 전 인류 1인 1AI 기술 복지`,
            vis: "<b>1. AI 격차 해소:</b> 정보 소외 없는 기술 평등<br><b>2. 에너지 혁신:</b> 무한 청정 핵융합 에너지 지원<br><b>3. 인재 육성:</b> 차세대 우주·로봇 리더 양성<br><b>4. 의료 복지:</b> AI 기반 보편적 건강권 확보<br><b>5. 기술 윤리:</b> 도덕적 기술 표준 글로벌 선도"
        },
        en: {
            sub: "HUMANITY COEXISTENCE LEDGER", m1: "TRANSFER", m2: "PAYMENT", m3: "DEPOSIT", m4: "REWARD", m5: "UBI", m6: "SWAP",
            gcv: "GCV VALUE: $ 314,159,000", r1: "LP STAKING", v1: "18.5%", r2: "SWAP YIELD", v2: "24.5%",
            liqT: "TOTAL LIQUIDITY (HK-POOL)", liqV: "$ 95,204,441,800",
            fb: "GLOBAL AI SUPPORT (FAQ 20)", vb: "HK FOUNDATION VISION 2030",
            faq: "<b>FAQ 1-20:</b> Dedicated to closing the tech gap, providing GPU resources, and human-centric AI development...",
            vis: "<b>1. AI Equality 2. Clean Energy 3. Global Talent 4. Universal Health 5. Tech Ethics</b>"
        },
        zh: {
            sub: "人类共生综合账本", m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "基本收入", m6: "互换",
            gcv: "GCV 价值: ¥ 2,199,113,000", r1: "质押收益", v1: "18.5%", r2: "互换收益", v2: "24.5%",
            liqT: "总流动性 (HK-池)", liqV: "¥ 680,105,800,000",
            fb: "全球 AI 支持 (FAQ 20)", vb: "HK 基金会 愿景 2030",
            faq: "<b>FAQ 1-20:</b> 致力于消除技术差距，提供高性能 GPU 资源，并以人为本开发 AI...",
            vis: "<b>1. 消除 AI 差距 2. 能源创新 3. 人才培养 4. 医疗福利 5. 技术伦理</b>"
        }
    };

    function updateAll() {
        const lang = document.getElementById('langSelect').value;
        const s = data[lang];
        document.getElementById('sub_title').innerText = s.sub;
        document.getElementById('m1').innerText = s.m1; document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3; document.getElementById('m4').innerText = s.m4;
        document.getElementById('m5').innerText = s.m5; document.getElementById('m6').innerText = s.m6;
        document.getElementById('gcv_val').innerText = s.gcv;
        document.getElementById('l_r1').innerText = s.r1; document.getElementById('v_r1').innerText = s.v1;
        document.getElementById('l_r2').innerText = s.r2; document.getElementById('v_r2').innerText = s.v2;
        document.getElementById('liq_t').innerText = s.liqT; document.getElementById('liq_v').innerText = s.liqV;
        document.getElementById('f_btn').firstElementChild.innerText = s.fb;
        document.getElementById('faq').innerHTML = s.faq;
        document.getElementById('v_btn').firstElementChild.innerText = s.vb;
        document.getElementById('vision').innerHTML = s.vis;
    }

    function toggleAcc(id) {
        const target = document.getElementById(id);
        const active = target.style.display === 'block';
        document.querySelectorAll('.content-area').forEach(el => el.style.display = 'none');
        target.style.display = active ? 'none' : 'block';
    }
    window.onload = updateAll;
</script>
</body>
</html>
