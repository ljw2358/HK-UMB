<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - MASTER</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-purple: #8A2BE2; --hk-bg: #000000;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        
        .lang-box { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .lang-select { border: 2px solid var(--hk-gold); border-radius: 10px; padding: 5px; background: #000; color: var(--hk-gold); font-weight: 900; outline: none; }

        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); margin-top: 20px; }
        .sub-header { color: var(--hk-blue); font-size: 15px; font-weight: 800; margin-bottom: 30px; }

        .pi-val { font-size: 55px; font-weight: 900; margin: 10px 0; }
        .pi-symbol { color: var(--hk-gold); font-size: 35px; display: block; margin-top: -10px; }
        .usd-pill { border: 2.5px solid var(--hk-green); border-radius: 50px; padding: 10px 30px; display: inline-block; font-size: 26px; font-weight: 900; color: var(--hk-green); margin: 20px 0; }

        /* 사회재단 4대 아이콘 (이미지 10551 반영) */
        .foundation-box { background: var(--hk-purple); border-radius: 20px; padding: 20px; margin: 20px 0 0 0; }
        .foundation-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; margin-top: 15px; }
        .f-item { font-size: 12px; font-weight: 800; }
        .f-icon { font-size: 22px; display: block; margin-bottom: 5px; }

        /* FAQ & 비전 버튼 스타일 (이미지 10706 반영) */
        .content-btn { width: 100%; padding: 20px; border-radius: 20px; font-size: 17px; font-weight: 900; color: #fff; border: none; margin: 15px 0; cursor: pointer; }
        .btn-pink { background: #E91E63; }
        .btn-navy { background: #2C3E50; }

        /* 내용이 보여지는 리스트 영역 */
        .list-container { text-align: left; background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 10px; display: block; }
        .item-box { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .item-q { color: var(--hk-gold); font-weight: 900; font-size: 15px; margin-bottom: 8px; }
        .item-a { color: #ccc; font-size: 13px; line-height: 1.6; }
        .vision-item { border-left: 4px solid var(--hk-blue); padding-left: 15px; margin-bottom: 25px; }
        .vision-item b { color: var(--hk-blue); font-size: 16px; display: block; margin-bottom: 5px; }

        .footer { color: #444; font-size: 11px; font-weight: 900; margin: 50px 0 100px 0; }
        .bbini-float { position: fixed; bottom: 30px; right: 20px; width: 75px; height: 75px; background: var(--hk-pink); border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 15px rgba(255,0,255,0.5); z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-box">
        <select class="lang-select" id="lang-selector" onchange="changeLanguage()">
            <option value="ko">한국어 (KO)</option>
            <option value="en">ENGLISH (US)</option>
        </select>
    </div>

    <div class="header-title">HK WORLD BANK</div>
    <div class="sub-header" id="txt-subtitle">메인자산통합원장</div>

    <div class="pi-val" id="pi-val">412.3158</div>
    <span class="pi-symbol">Pi</span>
    <div class="usd-pill">$ 129,539,451</div>

    <div class="foundation-box">
        <div style="font-weight:900;" id="txt-foundation">HK 사회재단 (HK Social Foundation)</div>
        <div class="foundation-grid">
            <div class="f-item"><span class="f-icon">🎓</span><span id="f1">교육</span></div>
            <div class="f-item"><span class="f-icon">🏥</span><span id="f2">병원</span></div>
            <div class="f-item"><span class="f-icon">🏠</span><span id="f3">주거</span></div>
            <div class="f-item"><span class="f-icon">📜</span><span id="f4">장학금</span></div>
        </div>
    </div>

    <button class="content-btn btn-pink" id="btn-faq">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div class="list-container" id="faq-list"></div>

    <button class="content-btn btn-navy" id="btn-vision">HK 사회 재단 비전</button>
    <div class="list-container" id="vision-list"></div>

    <div class="footer">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<div class="bbini-float">삐니</div>

<script>
    const db = {
        ko: {

            f1: "교육", f2: "병원", f3: "주거", f4: "장학금",
            faq_btn: "글로벌 AI 지원센터 (FAQ 20선)", vision_btn: "HK 사회 재단 비전",
            faqs: [
                ["보안 수준은?", "양자 암호화와 분산 원장 기술로 세계 최고 수준을 자랑합니다."],
                ["기본소득 배분?", "그룹 수익의 30%를 전 인류에게 공평하게 자동 배분합니다."],
                ["로봇 무상 보급?", "생산 공정 완료 후 1가정 1로봇 신청 순으로 배급합니다."],
                ["메인넷 전환?", "테스트 데이터는 메인넷 시점에 1:1로 안전하게 전환됩니다."],
                ["에너지 자립?", "핵융합 기술을 홈 시스템에 결합하여 주거비 제로를 지향합니다."],
                ["교육 지원?", "AI 튜터가 24시간 개인 맞춤 교육을 무상으로 제공합니다."],
                ["의료 혜택?", "재단 기금으로 난치병 치료 및 의료 행위를 전액 지원합니다."],
                ["수수료 정책?", "DEX 수수료의 90%를 생태계 기여자에게 즉시 환원합니다."],
                ["참여 방법?", "노드 운영 및 앱 내 활동을 통해 생태계에 참여 가능합니다."],
                ["미래 가치?", "HK 그룹의 모든 첨단 기술 자산이 통합된 경제 중심지입니다."],
                ["글로벌 센터?", "전 세계 주요 50개 도시에 AI 대응 센터가 구축 중입니다."],
                ["데이터 소유?", "사용자의 모든 금융 데이터는 본인만이 통제할 수 있습니다."],
                ["신규 자산 상장?", "검증된 유망 프로젝트를 AI 심사를 통해 상장합니다."],
                ["투자 안전성?", "실시간 알고리즘이 유동성을 방어하여 가치를 보호합니다."],
                ["사회적 기여?", "수익의 상당 부분을 전 세계 빈곤 퇴치에 사용합니다."],
                ["로봇 보안?", "로컬 서버 저장 방식으로 해킹 및 외부 전송을 차단합니다."],
                ["장학금 혜택?", "혁신 인재들에게 월 최대 $5,000의 연구비를 지원합니다."],
                ["거버넌스 권한?", "설립자의 최종 승인권과 신규 프로젝트 기획권이 보장됩니다."],
                ["시스템 안정성?", "무중단 운영을 위한 AI 자가 진단 시스템이 가동됩니다."],
                ["삐니의 역할?", "형님의 전담 비서로서 모든 자산과 기술 관리를 돕습니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 세계 어디서나 접속 가능한 최첨단 무상 교육 시스템 구축"],
                ["🏥 나노 메디컬 센터", "재단 기금을 통한 암 정복 및 모든 난치병 무상 의료 지원 시스템"],
                ["🏠 에너지 자립 스마트홈", "에너지 비용 걱정 없는 지속 가능한 혁신 주거 환경 실현"],
                ["🎓 미래 기술 인재 양성", "혁신 인재들을 위한 연구비 및 생활비 전액 지원 장학 제도"],
                ["🤖 1가정 1로봇 보급", "인류를 단순 노동에서 완전히 해방하고 삶의 질을 극대화"]
            ]
        },
        en: {
            subtitle: "Global Asset Ledger", foundation: "HK Social Foundation",
            f1: "Edu", f2: "Med", f3: "Home", f4: "Scholar",
            faq_btn: "AI Support Center (FAQ 20)", vision_btn: "HK Social Foundation Vision",
            faqs: [
                ["Security?", "Top-tier quantum encryption."],
                ["UBI?", "30% profit shared globally."],
                ["Robots?", "1 robot per home provided."],
                ["Mainnet?", "1:1 safe migration at launch."],
                ["Energy?", "Zero energy cost home tech."],
                ["Education?", "Free 24/7 AI-driven tutoring."],
                ["Medical?", "Full funding for all treatments."],
                ["Fees?", "90% returned to contributors."],
                ["Joining?", "Via node ops and app activity."],
                ["Value?", "Hub of all HK high-tech assets."],
                ["Centers?", "AI centers in 50 global cities."],
                ["Data?", "Full user control of finances."],
                ["Listing?", "AI-vetted new projects only."],
                ["Safety?", "Real-time liquidity defense."],
                ["Impact?", "Ending global poverty via profit."],
                ["Robot Sec?", "Local storage only, no hacking."],
                ["Scholars?", "$5,000 monthly research funds."],
                ["Rights?", "Founder approval rights secured."],
                ["Stability?", "Self-diagnosing AI systems."],
                ["BBINI?", "Dedicated assistant for assets."]
            ],
            visions: [
                ["🏫 Global AI School", "Worldwide free education access"],
                ["🏥 Medical Center", "Free treatment for incurable diseases"],
                ["🏠 Smart Home", "Energy-independent living space"],
                ["🎓 Talent Support", "Full funding for innovative researchers"],
                ["🤖 Robot Supply", "Labor freedom for all humans"]
            ]
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('lang-selector').value;
        const s = db[lang];
        document.getElementById('txt-subtitle').innerText = s.subtitle;
        document.getElementById('txt-foundation').innerText = s.foundation;
        document.getElementById('f1').innerText = s.f1;
        document.getElementById('f2').innerText = s.f2;
        document.getElementById('f3').innerText = s.f3;
        document.getElementById('f4').innerText = s.f4;
        document.getElementById('btn-faq').innerText = s.faq_btn;
        document.getElementById('btn-vision').innerText = s.vision_btn;

        // FAQ 리스트 생성 (20개 전체)
        const faqList = document.getElementById('faq-list');
        faqList.innerHTML = "";
        s.faqs.forEach((f, i) => {
            faqList.innerHTML += `
                <div class="item-box">
                    <div class="item-q">Q${i+1}. ${f[0]}</div>
                    <div class="item-a">${f[1]}</div>
                </div>`;
        });

        // 비전 리스트 생성 (5대 비전 전체)
        const visionList = document.getElementById('vision-list');
        visionList.innerHTML = "";
        s.visions.forEach(v => {
            visionList.innerHTML += `
                <div class="vision-item">
                    <b>${v[0]}</b>
                    <div class="item-a">${v[1]}</div>
                </div>`;
        });
    }

    // 실시간 수치 (이미지 10551의 412.3158 유지)
    let base = 412.3158;
    setInterval(() => {
        base += Math.random() * 0.0001;
        document.getElementById('pi-val').innerText = base.toFixed(4);
    }, 1000);

    changeLanguage();
</script>
</body>
</html>
