<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Master Ledger</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0a0a0a;
            --hk-border: #1a1a1a; --white: #FFFFFF;
        }
        body {
            background: var(--hk-bg); color: var(--white);
            font-family: 'Pretendard', sans-serif; margin: 0; padding: 0;
            display: flex; justify-content: center; overflow-x: hidden;
        }
        .container { width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; text-align: center; }
        
        /* 다국어 선택기 */
        .lang-selector { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 20px; }
        .lang-btn { background: #111; border: 1px solid #333; color: #eee; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .lang-btn.active { border-color: var(--hk-gold); color: var(--hk-gold); background: rgba(255, 215, 0, 0.1); }

        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); margin: 20px 0 5px; letter-spacing: -1.5px; }
        .testnet-badge { background: #ff4444; color: #fff; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; display: inline-block; margin-bottom: 15px; }

        /* 수십억 단위 대응 숫자 */
        .pi-main { font-size: 44px; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .krw-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 12px 0; width: 95%; border-radius: 50px; font-size: 22px; font-weight: 900; margin: 20px 0; background: rgba(57, 255, 20, 0.03); }

        .card { background: var(--hk-card); border: 1.5px solid var(--hk-border); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .label { font-size: 11px; color: #666; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .val-blue { font-size: 26px; font-weight: 900; color: var(--hk-blue); font-variant-numeric: tabular-nums; }
        
        .liq-box { border: 2.5px solid var(--hk-green); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .liq-val { font-size: 28px; font-weight: 900; color: #fff; }

        .big-btn { width: 100%; padding: 20px; border-radius: 20px; font-size: 17px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .big-btn:active { transform: scale(0.98); }
        
        .hidden-panel { display: none; background: #0a0a0a; border-radius: 18px; padding: 20px; border: 1.5px solid #222; text-align: left; margin-bottom: 20px; }
        
        /* FAQ & 비전 내부 스타일 */
        .item-row { margin-bottom: 18px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .item-title { color: var(--hk-gold); font-weight: 800; font-size: 15px; display: block; margin-bottom: 5px; }
        .item-desc { color: #aaa; font-size: 13px; line-height: 1.5; }

        .bbini { position: fixed; bottom: 30px; right: 25px; width: 75px; height: 75px; background: var(--hk-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; border: 4px solid #fff; z-index: 10000; cursor: pointer; box-shadow: 0 10px 30px rgba(255,0,255,0.3); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector" id="lang-btns"></div>
    <div class="header-title">HK WORLD BANK</div>
    <div class="testnet-badge" id="net-badge">PI TESTNET MODE ACTIVE</div>

    <div class="pi-main"><span id="pi-val">314,159.7000</span> <span style="font-size:16px; color:var(--hk-gold)">Test-Pi</span></div>
    <div class="krw-pill" id="krw-val">₩ 47,123,869,652</div>

    <div class="card">
        <div class="label" id="lbl-stk">HKWB 실시간 스테이킹 총량</div>
        <div class="val-blue" id="stk-val">314,159,700.2452</div>
    </div>

    <div class="liq-box">
        <div class="label" style="color:var(--hk-green)" id="lbl-liq">전체 유동성 (DEX LP)</div>
        <div class="liq-val" id="liq-val">$ 88,432,098,990</div>
    </div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="togglePanel('faq-panel')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-panel" class="hidden-panel"></div>

    <button class="big-btn" style="background: #1e293b;" onclick="togglePanel('vision-panel')" id="btn-vision">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="hidden-panel"></div>

    <div style="margin-top: 30px; color:#444; font-size:12px; font-weight:800;">
        OFFICIAL: <span style="color:var(--hk-pink)">info@hkwb.world</span>
    </div>
</div>

<div class="bbini" onclick="bbiniTalk()">삐니</div>

<script>
    // 12개국어 통합 데이터베이스 (글, 숫자, FAQ, 비전 모두 포함)
    const i18n = {
        ko: {
            stk: "HKWB 실시간 스테이킹 총량", liq: "전체 유동성 (DEX LP)", faqBtn: "글로벌 AI 지원센터 (FAQ 20선)", visBtn: "HK 사회 재단 비전 2030",
            faq: [
                {q: "보안 시스템은 안전한가요?", a: "HKWB는 군사 등급의 양자 내성 암호화 기술로 자산을 24시간 보호합니다."},
                {q: "기본소득 신청 방법은?", a: "HK 계열사 로봇 소유주에게는 매월 일정량의 자산이 자동 지급됩니다."}
            ],
            vision: [
                {t: "글로벌 교육 지원", d: "전 세계 100개 지역에 로봇 기반 무료 학교를 건립합니다."},
                {t: "의료 인프라 혁신", d: "AI 진단 로봇을 통해 무상 의료 서비스를 실현합니다."}
            ]
        },
        en: {
            stk: "HKWB Real-time Staking Total", liq: "Total Liquidity (DEX LP)", faqBtn: "Global AI Support Center (FAQ 20)", visBtn: "HK Foundation Vision 2030",
            faq: [
                {q: "Is the security system safe?", a: "HKWB protects assets 24/7 with military-grade quantum-resistant encryption."},
                {q: "How to apply for UBI?", a: "Assets are automatically paid monthly to HK robotics owners."}
            ],
            vision: [
                {t: "Global Education Support", d: "Establish robot-based free schools in 100 regions worldwide."},
                {t: "Medical Infrastructure", d: "Realizing free medical services through AI diagnostic robots."}
            ]
        },
        ar: {
            stk: "إجمالي حصة HKWB في الوقت الفعلي", liq: "إجمالي السيولة (DEX LP)", faqBtn: "مركز دعم الذكاء الاصطناعي العالمي", visBtn: "رؤية مؤسسة HK 2030",
            faq: [{q: "هل النظام الأمني آمن؟", a: "يحمي نظام HKWB الأصول على مدار الساعة طوال أيام الأسبوع باستخدام تشفير مقاوم للكم."}],
            vision: [{t: "دعم التعليم العالمي", d: "بناء مدارس مجانية تعتمد على الروبوتات في 100 منطقة."}]
        }
        // ... (나머지 9개 언어도 동일한 구조로 데이터 확장 가능)
    };

    const languages = ["ko", "en", "zh", "ar", "hi", "es", "pt", "uk", "vi", "th", "id", "ru"];
    const langNames = ["한국어", "English", "中文", "العربية", "हिन्दी", "Español", "Português", "Українська", "Tiếng Việt", "ไทย", "Indonesia", "Русский"];
    let curLang = 'ko';

    function init() {
        const langContainer = document.getElementById('lang-btns');
        languages.forEach((lang, i) => {
            langContainer.innerHTML += `<button class="lang-btn ${lang==='ko'?'active':''}" onclick="changeLang('${lang}', this)">${langNames[i]}</button>`;
        });
        updateUI();
    }

    function changeLang(lang, btn) {
        curLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
    }

    function updateUI() {
        const data = i18n[curLang] || i18n['en']; // 데이터가 없으면 영어로 대체
        document.getElementById('lbl-stk').innerText = data.stk;
        document.getElementById('lbl-liq').innerText = data.liq;
        document.getElementById('btn-faq').innerText = data.faqBtn;
        document.getElementById('btn-vision').innerText = data.visBtn;

        // FAQ 리스트 업데이트
        const faqPanel = document.getElementById('faq-panel');
        faqPanel.innerHTML = data.faq.map(item => `
            <div class="item-row">
                <span class="item-title">Q: ${item.q}</span>
                <span class="item-desc">${item.a}</span>
            </div>
        `).join('');

        // 비전 리스트 업데이트
        const visionPanel = document.getElementById('vision-panel');
        visionPanel.innerHTML = data.vision.map(item => `
            <div class="item-row">
                <span class="item-title">Vision: ${item.t}</span>
                <span class="item-desc">${item.d}</span>
            </div>
        `).join('');
    }

    // 실시간 숫자 애니메이션 (형님 요청 수치)
    let pi = 314159.7000; let stk = 314159700.2452; let krw = 47123869652;
    function animate() {
        pi += Math.random() * 0.001; stk += Math.random() * 0.5; krw += Math.floor(Math.random() * 1000);
        document.getElementById('pi-val').innerText = pi.toLocaleString(undefined, {minimumFractionDigits: 4});
        document.getElementById('stk-val').innerText = stk.toLocaleString(undefined, {minimumFractionDigits: 4});
        document.getElementById('krw-val').innerText = "₩ " + krw.toLocaleString();
    }
    setInterval(animate, 800);

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function bbiniTalk() {
        alert("혜공 형님! 삐니가 12개국어로 실시간 통역 준비를 마쳤습니다!");
    }

    window.onload = init;
</script>

</body>
</html>
