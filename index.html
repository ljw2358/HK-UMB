<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL MASTER</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #151515;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        
        .header-section { margin: 45px 0 25px 0; }
        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; }
        .sub-header { color: var(--hk-blue); font-size: 17px; font-weight: 800; }
        
        .lang-box { margin-bottom: 20px; text-align: right; }
        .lang-box select { background: #111; color: var(--hk-gold); border: 2px solid var(--hk-gold); border-radius: 10px; padding: 8px; font-weight: 900; font-size: 13px; }

        .pi-main { font-size: 60px; font-weight: 900; margin: 30px 0; color: #fff; }
        .pi-main span { color: var(--hk-gold); font-size: 30px; margin-left: 10px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--hk-card); padding: 22px; border-radius: 22px; border: 1px solid #333; }
        .stat-label { font-size: 13px; color: #aaa; margin-bottom: 12px; display: block; font-weight: 800; }
        .stat-val { font-size: 24px; font-weight: 900; }

        .liq-card { border: 3.5px solid var(--hk-green); background: rgba(57, 255, 20, 0.05); padding: 30px 20px; margin-bottom: 35px; border-radius: 22px; }

        .top-menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .top-menu-item { padding: 18px 0; border-radius: 18px; font-weight: 900; font-size: 14px; border: none; }

        .main-menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 35px; }
        .menu-item { background: var(--hk-card); padding: 22px 0; border-radius: 22px; border: 1px solid #222; }
        .menu-text { font-size: 14px; font-weight: 800; color: #eee; display: block; margin-top: 8px; }

        .action-btn { width: 100%; padding: 22px; border-radius: 22px; font-size: 18px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .soc-btn { padding: 20px; border-radius: 18px; font-weight: 900; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-box">
        <select id="lang-select" onchange="updateLang()">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="zh">🇨🇳 中문</option>
            <option value="ar">🇸🇦 العربية</option>
            <option value="hi">🇮🇳 हिन्दी</option>
            <option value="es">🇪🇸 Español</option>
            <option value="pt">BR Português</option>
            <option value="uk">🇺🇦 Українська</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="vi">🇻🇳 Tiếng Việt</option>
            <option value="th">🇹🇭 ภาษาไทย</option>
            <option value="id">🇮🇩 Indonesia</option>
        </select>
    </div>

    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div id="txt-subtitle" class="sub-header">통합 자산 관리 시스템</div>
    </div>

    <div class="pi-main"><span id="val-pi">412.3171</span><span>Pi</span></div>

    <div class="stats-grid">
        <div class="stat-box">
            <span id="txt-staking" class="stat-label">스테이킹 이율</span>
            <div id="val-staking" class="stat-val" style="color: var(--hk-blue);">17.61%</div>
        </div>
        <div class="stat-box">
            <span id="txt-lp" class="stat-label">LP 수익률</span>
            <div id="val-lp" class="stat-val" style="color: var(--hk-pink);">28.56%</div>
        </div>
    </div>

    <div class="liq-card">
        <span id="txt-liq" class="stat-label" style="color: var(--hk-green);">전체 유동성 (DEX LP)</span>
        <div id="val-liq" class="stat-val" style="color: var(--hk-green); font-size: 32px;">$ 88,432,240,219</div>
    </div>

    <div class="main-menu-grid" id="menu-container"></div>

    <button id="btn-faq" class="action-btn" style="background: #e91e63;" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"></div>

    <button id="btn-vision" class="action-btn" style="background: #34495e;" onclick="toggle('vision-panel')">HK 사회 재단 비전</button>
    <div id="vision-panel" class="panel"></div>

    <div class="social-grid">
        <a href="https://youtube.com/@형님채널" class="soc-btn" style="background: #ff0000;">📺 YouTube</a>
        <a href="https://tiktok.com/@형님계정" class="soc-btn" style="background: #111; border: 1px solid #333;">🎵 TikTok</a>
    </div>
</div>

<script>
    const data = {
        ko: { sub: "통합 자산 관리 시스템", stake: "스테이킹 이율", lp: "LP 수익률", liq: "전체 유동성 (DEX LP)", menus: ["송금", "결제", "예치", "보상", "기본소득", "스왑"], faq_btn: "글로벌 AI 지원센터 (FAQ 20)", vision_btn: "HK 사회 재단 비전", 
              faqs: [["삐니의 역할?", "형님의 전담 비서로서 모든 관리를 돕습니다."], ["보안은?", "양자 암호화로 철저히 보호됩니다."]], 
              visions: ["HK 글로벌 AI 학교", "1가정 1로봇 보급"] },
        en: { sub: "Integrated Asset Management", stake: "Staking APR", lp: "LP Yield", liq: "Total Liquidity", menus: ["Send", "Pay", "Deposit", "Reward", "UBI", "Swap"], faq_btn: "Global AI Support (FAQ 20)", vision_btn: "HK Foundation Vision", 
              faqs: [["Role of BBINI?", "As your dedicated assistant, I manage everything."], ["Security?", "Protected by top-tier quantum encryption."]], 
              visions: ["HK Global AI School", "1 Robot per Household"] },
        zh: { sub: "综合资产管理系统", stake: "质押收益率", lp: "LP 收益率", liq: "总流动性", menus: ["转账", "支付", "存款", "奖励", "基本收入", "交换"], faq_btn: "全球 AI 支持中心", vision_btn: "HK 基金会愿景", 
              faqs: [["BBINI 的角色？", "作为您的专属秘书，我负责管理一切。"], ["安全性？", "通过量子加密技术实现最高安全级别。"]], 
              visions: ["HK 全球 AI 学校", "每户一台机器人"] }
    };

    function updateLang() {
        const l = document.getElementById('lang-select').value;
        const s = data[l] || data.en; // 아랍어 등은 영어로 대체 가능
        document.getElementById('txt-subtitle').innerText = s.sub;
        document.getElementById('txt-staking').innerText = s.stake;
        document.getElementById('txt-lp').innerText = s.lp;
        document.getElementById('txt-liq').innerText = s.liq;
        document.getElementById('btn-faq').innerText = s.faq_btn;
        document.getElementById('btn-vision').innerText = s.vision_btn;
        
        let mHtml = "";
        s.menus.forEach((m, i) => mHtml += `<div class="menu-item"><span>🚀</span><span class="menu-text">${m}</span></div>`);
        document.getElementById('menu-container').innerHTML = mHtml;

        let fHtml = ""; s.faqs.forEach(f => fHtml += `<p><b>${f[0]}</b><br>${f[1]}</p>`);
        document.getElementById('faq-panel').innerHTML = fHtml;
        
        let vHtml = ""; s.visions.forEach(v => vHtml += `<p>✅ ${v}</p>`);
        document.getElementById('vision-panel').innerHTML = vHtml;
    }

    // 숫자가 살아 움직이게!
    function animateValue(id, start, range, fixed) {
        setInterval(() => {
            let current = start + (Math.random() * range);
            document.getElementById(id).innerText = fixed ? current.toFixed(4) : '$ ' + Math.floor(current).toLocaleString();
        }, 1500);
    }

    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    animateValue('val-pi', 412.31, 0.05, true);
    animateValue('val-staking', 17.5, 0.5, true); // %는 생략
    animateValue('val-lp', 28.5, 0.2, true);
    animateValue('val-liq', 88432240219, 1000000, false);
    updateLang();
</script>
</body>
</html>
