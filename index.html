<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');

        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
            padding: 50px 0;
        }

        /* [핵심] 중앙 메인 프레임 */
        .main-frame {
            width: 800px; /* 통합 화면을 위한 너비 확장 */
            background: #0d0d0d;
            border-radius: 40px;
            padding: 60px 50px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        /* 상단 노란색 점선 포인트 */
        .dotted-border-top {
            width: 80%;
            height: 40px;
            border: 2px dashed #ffcc00;
            border-radius: 20px;
            margin: 0 auto 50px auto;
        }

        /* [핵심] 3행 2열 그리드 메뉴 (이미지 그대로) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .menu-btn {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }
        .menu-btn:hover { border-color: #333; background: #222; }
        .menu-btn i { font-size: 32px; color: #ffcc00; margin-bottom: 15px; display: block; }
        .menu-btn .btn-text { font-size: 14px; font-weight: bold; color: #fff; }

        /* [핵심] Deposit/Withdraw 버튼 */
        .deposit-btn {
            width: 100%;
            background: #ffcc00;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            padding: 20px 0;
            border-radius: 20px;
            text-transform: capitalize;
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.2);
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .deposit-btn:hover { background: #e6b800; }

        .withdraw-btn {
            width: 100%;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            padding: 20px 0;
            border-radius: 20px;
            text-transform: capitalize;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }
        .withdraw-btn:hover { background: #222; }

        /* [핵심] 이미지 2장의 하단 정보 통합 (스테이킹 및 보안) */
        .footer-info-section {
            background: #111;
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid #222;
            margin-top: 50px;
        }

        /* 스테이킹 정보 (이미지 그대로) */
        .staking-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 25px;
            margin-bottom: 25px;
        }
        .staking-label { color: #ffcc00; font-size: 14px; font-weight: bold; }
        .staking-value { font-size: 42px; font-weight: 900; color: #fff; letter-spacing: -1px; }

        /* 보안 정보 헤더 (HK QUANTUM SHIELD) */
        .security-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ffcc00;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* 보안 정보 항목 (체크 아이콘 포함) */
        .security-item {
            font-size: 12px;
            color: #aaa;
            line-height: 1.8;
            margin-bottom: 12px;
            position: relative;
            padding-left: 20px;
        }
        .security-item::before {
            content: '\f00c'; /* fontawesome check icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #ffcc00;
            position: absolute;
            left: 0;
            top: 2px;
        }

        /* Safe-Custody Fee (빨간색) */
        .fee-item {
            color: #ff3b3b;
            font-weight: bold;
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="dotted-border-top"></div>

        <section class="menu-grid">
            <div class="menu-btn">
                <i class="fa-solid fa-paper-plane"></i><span class="btn-text">보내기</span>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-qrcode"></i><span class="btn-text">받기</span>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-cart-shopping"></i><span class="btn-text">이재원</span>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-building-columns"></i><span class="btn-text">10% APY</span>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-shield-halved"></i><span class="btn-text">예치 10%</span>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-wallet"></i><span class="btn-text">예치 10%</span>
            </div>
        </section>

        <section class="mb-10">
            <button class="deposit-btn">Deposit</button>
            <button class="withdraw-btn">Withdraw</button>
        </section>

        <footer class="footer-info-section">
            
            <div class="staking-info-row">
                <p class="staking-label">Staking 10%</p>
                <p class="staking-value">148,424,935,685,572</p>
            </div>

            <div class="security-header">
                <i class="fa-solid fa-shield-halved"></i>
                HK QUANTUM SHIELD ACTIVE
            </div>
            <div class="security-item">개인정보보호법 준수: 알고리즘 보안 시스템 적용</div>
            <div class="security-item">Proof of Privates 1:1 대용 오프라인 콜드월렛</div>
            <div class="security-item">AI 실시간 위협 탐지 및 자산 보호 중</div>

            <div class="security-item fee-item">
                SAFE-CUSTODY FEE: 10% (QUANTUM SHIELD)
            </div>
        </footer>
    </div>

</body>
</html>
