<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | Protocol V23 | 30 Global Nations</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* [1. DESIGN SYSTEM - 형님의 시그니처 골드] */
        :root { 
            --gold: #f1c40f; 
            --gold-glow: rgba(241, 196, 15, 0.6);
            --green: #00ff88; 
            --bg: #000; 
            --card: #0a0a0a; 
            --border: #1a1a1a; 
            --pink: #ff4d6d;
            --cyan: #00d9ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* [2. 배경 특수 효과] */
        .quantum-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, #111 0%, #000 80%);
            z-index: -1;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 0 20px 150px; }

        /* [3. 분류 1: 30개국 국기 선택 네비게이션] */
        .top-nav {
            position: sticky; top: 0; width: 100%; padding: 20px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: flex-end; z-index: 2000; border-bottom: 1px solid var(--border);
        }
        .lang-trigger {
            background: #000; color: var(--gold); border: 2px solid var(--gold);
            padding: 12px 25px; border-radius: 20px; font-size: 16px; font-weight: 900;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        /* 웅장한 국기 선택 모달 */
        #flagModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 3000; padding: 40px 15px; animation: slideUp 0.4s ease-out;
        }
        .modal-inner { max-width: 450px; margin: 0 auto; }
        .modal-h { color: var(--gold); text-align: center; font-size: 22px; font-weight: 900; margin-bottom: 30px; letter-spacing: 2px; }
        .flag-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 
            max-height: 70vh; overflow-y: auto; padding-bottom: 20px;
        }
        .flag-item { 
            background: #111; padding: 18px; border-radius: 18px; border: 1px solid #222;
            text-align: left; font-size: 14px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
        }
        .flag-item:hover { border-color: var(--gold); background: #1a1a1a; }

        /* [4. 분류 2: 메인 타이틀] */
        header { padding: 60px 0 30px; text-align: center; }
        .logo-txt { font-size: 38px; font-weight: 900; color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 20px var(--gold-glow); }
        .tag-txt { font-size: 10px; color: #444; letter-spacing: 4px; font-weight: bold; margin-top: 8px; }

        /* [5. 분류 3: 메인 자산 통합 원장] */
        .ledger-box {
            background: linear-gradient(165deg, #121212, #000);
            border-radius: 40px; padding: 45px 25px; border: 1px solid var(--border);
            text-align: center; margin-bottom: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .l-label { color: var(--gold); font-size: 13px; font-weight: 900; letter-spacing: 2px; margin-bottom: 35px; display: block; }
        .l-val { font-size: 60px; font-weight: 900; letter-spacing: -3px; line-height: 1; }
        .pi-symbol { color: var(--gold); font-size: 28px; font-style: italic; margin-left: 8px; }
        
        .gcv-badge {
            display: inline-block; background: rgba(0,255,136,0.05); color: var(--green);
            padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(0,255,136,0.2);
            font-size: 17px; font-weight: 900; margin: 35px 0;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: rgba(255,255,255,0.02); padding: 22px; border-radius: 25px; text-align: left; border: 1px solid var(--border); }
        .stat-card label { color: var(--green); font-size: 10px; font-weight: 900; display: block; margin-bottom: 8px; }
        .stat-card p { font-size: 24px; font-weight: 900; }

        /* [6. 분류 4: 6구 핵심 메뉴] */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 35px 0; }
        .menu-btn {
            background: var(--card); aspect-ratio: 1/1; border-radius: 28px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
        }
        .menu-btn i { color: var(--gold); font-size: 30px; margin-bottom: 12px; }
        .menu-btn span { font-size: 12px; color: #777; font-weight: 900; }

        /* [7. 분류 5: HK 양자 방패] */
        .shield-zone {
            background: #050505; border-radius: 35px; padding: 30px;
            border: 1px solid rgba(0, 217, 255, 0.2); margin-bottom: 30px;
        }
        .s-head { color: var(--cyan); font-weight: 900; font-size: 18px; margin-bottom: 22px; display: flex; align-items: center; gap: 12px; }
        .s-item { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; font-size: 14px; color: #aaa; font-weight: 600; }
        .s-bar { width: 3px; height: 18px; background: var(--cyan); border-radius: 10px; box-shadow: 0 0 10px var(--cyan); }

        /* [8. 분류 6: 글로벌 AI 고객지원센터] */
        .ai-center-btn {
            width: 100%; background: var(--pink); color: #fff; padding: 28px;
            border-radius: 30px; border: none; font-size: 20px; font-weight: 900;
            box-shadow: 0 15px 45px rgba(255, 77, 109, 0.4); cursor: pointer;
        }

        /* [9. 분류 7: 하단 소셜 및 미션] */
        .mission-footer { text-align: center; padding: 60px 0; border-top: 1px solid #111; margin-top: 40px; }
        .mission-txt { font-size: 14px; color: #444; font-weight: 800; line-height: 2; }
        .gold-dot { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes pulse { 50% { opacity: 0.1; } }
    </style>
</head>
<body>

<div class="quantum-layer"></div>

<nav class="top-nav">

    function openFlags() { document.getElementById('flagModal').style.display = 'block'; }

    function applyNation(idx) {
        const n = nations[idx];
        document.getElementById('curFlag').innerText = n.f;
        document.getElementById('curName').innerText = n.n;
        document.getElementById('t-ledger').innerText = n.l;
        document.getElementById('t-ai').innerText = n.ai;
        document.getElementById('t-mission').innerHTML = `<span class="gold-dot"></span> ${n.mi}`;

        for(let i=0; i<6; i++) document.getElementById(`m${i+1}`).innerText = n.m[i];
        closeFlags();
        gsap.from(".container", {duration: 0.4, opacity: 0, y: 15});
    }

    const grid = document.getElementById('flagGrid');
    nations.forEach((n, idx) => {
        const d = document.createElement('div');
        d.className = 'flag-item';
        d.innerHTML = `<span>${n.f}</span> ${n.n}`;
        d.onclick = () => applyNation(idx);

    window.onload = () => {
        gsap.from(".logo-txt", {duration: 1.2, y: -30, opacity: 0, ease: "back.out"});
