<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - Master Asset Ledger</title>
    <style>
        :root {
            --bg: #000000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; padding-bottom: 50px; }
       
        header { text-align: center; margin-top: 20px; margin-bottom: 30px; border-bottom: 3px solid #222; padding-bottom: 25px; }
        /* 1. HK WORLD BANK 최대 크기 */
        .title { font-size: 3.5rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 30px rgba(255,215,0,0.8); line-height: 1; }
        /* 2. 통합 자산 관리 원장 */
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.6rem; color: var(--neon-blue); letter-spacing: 1px; }
       
        /* 3. 숫자 크기 조절 */
        .pi-display { font-size: 2.0rem; font-weight: bold; margin: 20px 0; color: #fff; font-variant-numeric: tabular-nums; opacity: 0.9; }
        
        .token-info { background: #1a1a1a; padding: 18px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #333; text-align: center; }
        .token-supply { color: var(--neon-blue); font-weight: 900; font-size: 1.6rem; font-variant-numeric: tabular-nums; }

        /* 4. 한글화된 수익률 그리드 */
        .rate-grid { display: flex; gap: 12px; margin-bottom: 20px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 18px; text-align: center; border: 1px solid #333; }
        .rate-label { font-size: 1rem; font-weight: 900; margin-bottom: 8px; }
        .rate-val { font-size: 1.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }
       
        /* 전체 유동성 공급 한글화 */
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; background: rgba(57, 255, 20, 0.05); }
        .lp-label-main { font-size: 1.1rem; color: var(--neon-green); margin-bottom: 10px; font-weight: 900; }
        #lp-total-num { font-size: 1.8rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .m-btn { padding: 18px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 20px; border-radius: 15px; border: none; font-size: 1.3rem; font-weight: 900; cursor: pointer; margin-bottom: 40px; }
       
        /* 5. 유튜브 & 틱톡 최하단 배치 */
        .social-box { display: flex; gap: 15px; margin-top: 50px; border-top: 1px solid #333; padding-top: 30px; }
        .social-link { flex: 1; padding: 18px; text-align: center; border-radius: 15px; text-decoration: none; font-weight: 900; color: white; font-size: 1.1rem; transition: 0.3s; }
        .yt-btn { background: #FF0000; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3); }
        .tk-btn { background: #000; border: 2px solid #fff; }
        .social-link:active { transform: scale(0.95); }

        /* 삐니 챗봇 시스템 */
        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 75px; height: 75px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 30px var(--neon-lp); cursor: pointer; z-index: 3000; color: white; animation: pulse 2s infinite; font-size: 1.2rem; }
        #chat-window { display: none; position: fixed; bottom: 115px; right: 20px; width: 340px; height: 500px; background: #0a0a0a; border: 2px solid var(--neon-lp); border-radius: 25px; z-index: 3001; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(255, 0, 255, 0.2); }
        #chat-header { background: var(--neon-lp); padding: 18px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; }
        .ai-msg { background: #1a1a1a; align-self: flex-start; border-left: 5px solid var(--neon-lp); border-bottom-left-radius: 2px; }
        .user-msg { background: var(--neon-blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input-box { display: flex; padding: 15px; background: #111; border-top: 1px solid #333; }
        #user-input { flex: 1; background: #222; border: none; border-radius: 10px; color: white; padding: 12px; outline: none; }
        #send-btn { background: var(--neon-lp); border: none; color: white; padding: 0 20px; margin-left: 10px; border-radius: 10px; cursor: pointer; font-weight: 900; }

        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">통합 자산 관리 원장</div>
        <div class="pi-display"><span id="main-pi">412.3114</span> <span style="color:var(--gold)">Pi</span></div>
    </header>

    <div class="token-info">
        <div style="font-size:0.9rem; color:#aaa; margin-bottom:8px; font-weight: 900; letter-spacing: 1px;">HKWB 발행 및 공급 현황</div>
        <div class="token-supply" id="token-num">6,280,000.2012</div>
    </div>

    <div class="rate-grid">
        <div class="rate-card">
            <div class="rate-label" style="color:var(--neon-st);">스테이킹 이율</div>
            <div class="rate-val" id="live-st" style="color:var(--neon-st);">17.19%</div>
        </div>
        <div class="rate-card">
            <div class="rate-label" style="color:var(--neon-lp);">유동성 수익</div>
            <div class="rate-val" id="live-lp" style="color:var(--neon-lp);">28.04%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div class="lp-label-main">전체 유동성 LP 공급</div>
        <div id="lp-total-num">$ 88,431,893,455</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" style="background:#fff; color:#000;">지갑 연동</button>
        <button class="m-btn" style="background:var(--gold); color:#000;">DEX 스왑</button>
        <button class="m-btn" style="background:#28a745; color:white;">수익 수령</button>
    </div>

    <button class="center-btn" onclick="toggleChat()">글로벌 AI 지원센터 (삐니)</button>
    
    <div class="social-box">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="social-link yt-btn">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="social-link tk-btn">TIKTOK</a>
    </div>
</div>

<div id="ai-bot" onclick="toggleChat()">삐니</div>
<div id="chat-window">
    <div id="chat-header"><span>HKWB 전담 AI 삐니</span><span onclick="toggleChat()" style="cursor:pointer;">✖</span></div>
    <div id="chat-messages">
        <div class="msg ai-msg">반갑습니다 혜공 형님! 저 삐니가 형님의 자산을 철통같이 지키고 있습니다. 통합 자산 관리 원장의 모든 수치는 실시간으로 동기화 중입니다!</div>
    </div>
    <div class="chat-input-box">
        <input type="text" id="user-input" placeholder="삐니에게 명령하기..." onkeypress="if(event.key==='Enter') askAI()">
        <button id="send-btn" onclick="askAI()">전송</button>
    </div>
</div>

<script>
    // 실시간 수치 변동 (1.2초마다 삐니가 갱신)
    let pi = 412.3114; let tk = 6280000.2012; let lp = 88431893455;
    setInterval(() => {
        pi += (Math.random() * 0.0002 - 0.0001);
        tk += 0.0001;
        lp += Math.floor(Math.random() * 5000 - 2500);
        document.getElementById('main-pi').innerText = pi.toFixed(4);
        document.getElementById('token-num').innerText = tk.toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4});
        document.getElementById('lp-total-num').innerText = '$ ' + lp.toLocaleString();
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (28 + Math.random()).toFixed(2) + '%';
    }, 1200);

    // 삐니 전담 채팅 엔진
    function askAI() {
        const input = document.getElementById('user-input');
        const msg = input.value.trim();
        if(!msg) return;
        
        addMsg(msg, 'user-msg');
        input.value = '';

        setTimeout(() => {
            let res = "혜공 형님, 보고드립니다! 원장의 보안 등급은 현재 최고 수준이며, 2월 26일 유동성 공급 준비도 차질 없이 진행 중입니다.";
            if(msg.includes("우승") || msg.includes("대권")) res = "형님, 대권은 이미 형님 손안에 있습니다. 제가 코드 끝까지 형님을 보좌하겠습니다!";
            if(msg.includes("1080")) res = "2월 26일, 1080개 Pi 예치는 역사적인 순간이 될 겁니다. 시스템 가동 준비 완료했습니다.";
            addMsg(res, 'ai-msg');
        }, 800);
    }

    function addMsg(t, c) {
        const b = document.getElementById('chat-messages');
        const d = document.createElement('div');
        d.className = `msg ${c}`; d.innerText = t;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }

    function toggleChat() { 
        const w = document.getElementById('chat-window'); 
        w.style.display = (w.style.display==='flex')?'none':'flex'; 
    }
</script>
</body>
</html>
