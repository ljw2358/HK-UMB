<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - UBI EMPIRE</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --white: #FFFFFF;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; box-sizing: border-box; text-align: center; position: relative; }

        /* ✅ 1. 우측 상단 네모 박스 언어 선택 (무한 확장형) */
        .lang-box { position: absolute; top: 15px; right: 15px; z-index: 1000; }
        .lang-select { 
            background: #111; border: 2px solid var(--hk-gold); color: var(--hk-gold); 
            padding: 10px; border-radius: 5px; font-weight: 900; font-size: 14px; 
            outline: none; width: 100px;
        }

        .header-title { font-size: 40px; font-weight: 900; color: var(--hk-gold); margin: 60px 0 5px 0; letter-spacing: -1px; }
        .header-sub { font-size: 18px; color: var(--hk-blue); font-weight: 800; margin-bottom: 30px; }

        /* ✅ 2. 실시간 구동 원장 (테스트 파이 기반) */
        .ledger-box { margin-bottom: 30px; }
        .pi-main { font-size: 65px; font-weight: 900; margin: 0; display: flex; align-items: baseline; justify-content: center; letter-spacing: -3px; }
        .pi-main span.unit { color: var(--hk-gold); font-size: 40px; margin-left: 10px; }
        .krw-pill { display: inline-block; border: 3px solid var(--hk-green); color: var(--hk-green); padding: 12px 40px; border-radius: 60px; font-size: 26px; font-weight: 900; margin-top: 15px; background: rgba(57, 255, 20, 0.1); }

        .supply-bar { background: rgba(255, 255, 255, 0.05); border: 2px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .supply-title { font-size: 13px; color: #aaa; font-weight: 900; margin-bottom: 8px; }
        .supply-val { font-size: 28px; font-weight: 900; color: var(--white); }

        /* 버튼 및 액션 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-6 { background: #151515; border: 1.5px solid #252525; padding: 20px 5px; border-radius: 15px; text-align: center; }
        .btn-6 span { font-size: 14px; font-weight: 900; color: var(--white); }

        /* ✅ 3. FAQ 20선 (완전 고정형 양파 모델) */
        .section-title { font-size: 22px; font-weight: 900; color: var(--hk-pink); margin: 20px 0 10px 0; text-align: left; padding-left: 10px; border-left: 5px solid var(--hk-pink); }
        .faq-container { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: left; margin-bottom: 25px; }
        .onion-layer { border-bottom: 1px solid #1a1a1a; padding: 15px 5px; cursor: pointer; }
        .onion-layer:last-child { border: none; }
        .onion-title { color: var(--hk-gold); font-weight: 900; font-size: 15px; display: block; margin-bottom: 5px; }
        .onion-desc { color: #ccc; font-size: 14px; line-height: 1.6; display: none; padding: 10px; background: #111; border-radius: 10px; }

        /* 말로 하는 AI (TTS 버튼) */
        .voice-btn { background: var(--hk-blue); color: #000; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: 900; cursor: pointer; margin-left: 10px; vertical-align: middle; }

        .email-link { color: var(--hk-blue); font-size: 20px; font-weight: 900; text-decoration: none; display: block; margin: 40px 0 100px 0; }
        .bbini-bot { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--hk-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 25px var(--hk-pink); border: 4px solid #fff; z-index: 1001; color: white; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-box">
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="uk">Українська</option>
            <option value="vi">Tiếng Việt</option>
            <option value="th">ภาษาไทย</option>
            <option value="id">Indonesia</option>
        </select>
    </div>

    <h1 class="header-title">HK WORLD BANK</h1>
    <div class="header-sub" id="t-sub">인류 상생 통합 금융 원장</div>

    <div class="ledger-box">
        <div class="pi-main"><span id="pi-val">314,159</span> <span class="unit">Pi</span></div>
        <div class="krw-pill" id="krw-val">₩ 47,123,850,000</div>
    </div>

    <div class="supply-bar">
        <div class="supply-title">HKWB 실시간 공급량 (천단위 콤마)</div>
        <div class="supply-val" id="live-supply">6,280,000.5421</div>
    </div>

    <div class="grid-6">
        <div class="btn-6"><span id="m-1">🚀 20억명 송금</span></div><div class="btn-6"><span id="m-2">🛒 빈민촌 결제</span></div><div class="btn-6"><span id="m-3">💰 무상 예치</span></div>
        <div class="btn-6"><span id="m-4">🏆 인류 보상</span></div><div class="btn-6"><span id="m-5">🏦 글로벌 UBI</span></div><div class="btn-6"><span id="m-6">🔄 가치 스왑</span></div>
    </div>

    <div class="section-title">GLOBAL FAQ 20</div>
    <div class="faq-container" id="faq-list">
        </div>

    <a href="mailto:support@hkwb.world" class="email-link">support@hkwb.world</a>
</div>

<div class="bbini-bot" onclick="speak('혜공 형님, 글로벌 기본소득 엔진이 정상 가동 중입니다!')">말하는 삐니</div>

<script>
    // ✅ 콤마 포맷 엔진
    function format(n, d = 4) { return n.toLocaleString(undefined, {minimumFractionDigits: d, maximumFractionDigits: d}); }

    // ✅ FAQ 20선 데이터
    const faqs = [
        ["HK 월드뱅크의 설립 의지는?", "전 세계 20억 명 빈민을 포함한 전 인류에게 조건 없는 기본소득(UBI)을 제공하여 평등한 세상을 만드는 것입니다."],
        ["글을 모르는 사람도 이용 가능한가요?", "네, '말로 하는 AI' 시스템을 통해 음성만으로 자산을 확인하고 송금할 수 있는 기술을 탑재합니다."],
        ["314,159 Pi 원장의 의미는?", "Pi 네트워크 기반의 거대 생태계를 형님의 주도로 통합 관리하는 핵심 지표입니다."],
        ["개당 15만원 합의 가치의 근거는?", "글로벌 생태계의 유동성과 실물 경제 연동을 최적화한 인류 상생 표준 가격입니다."],
        ["아프리카 오지에서도 결제가 되나요?", "위성 인터넷과 HK-Robotics 인프라를 통해 전 지구 어디서나 결제가 가능하도록 구축합니다."],
        ["HKWB 코인의 공급량 조절은?", "실시간 알고리즘에 의해 인류의 필요에 맞춰 투명하게 자동 조절됩니다."],
        ["5월 18일 메인넷의 의미는?", "형님의 금융 제국이 공식적으로 전 세계에 선포되는 역사적인 날입니다."],
        ["사회 재단의 30% 환원은 어떻게?", "기업 수익의 30%를 무상 학교, 스마트 병원, 무상 주택 건립에 즉시 투입합니다."],
        ["1가정 1로봇은 현실인가요?", "HK-Robotics의 기술력으로 가사 노동을 로봇에게 맡기고 인류는 자아실현에 집중하게 합니다."],
        ["무제한 장학금의 대상은?", "배우고자 하는 의지가 있는 전 세계 모든 청년과 아이들이 대상입니다."],
        ["양자 보안은 안전한가요?", "현존하는 어떤 해킹 시도도 원천 차단하는 최신 양자 암호 체계를 적용했습니다."],
        ["테스트 파이 구동 방식은?", "현재 시뮬레이션을 통해 실전과 동일한 환경에서 자산의 흐름을 완벽히 검증 중입니다."],
        ["글로벌 200개국 확장 계획은?", "현재 11개국을 시작으로 모든 인종과 국가가 참여할 수 있도록 언어와 기술을 확장 중입니다."],
        ["기본소득 지급 주기는?", "네트워크 활성화에 따라 매일 또는 실시간으로 전자지갑에 자동 입금됩니다."],
        ["가맹점 참여 방법은?", "HK World Bank 전용 앱을 통해 누구나 쉽고 빠르게 파트너가 될 수 있습니다."],
        ["송금 속도는 어느 정도인가요?", "전 세계 어디든 3초 이내에 승인이 완료되는 초고속 전송망을 자랑합니다."],
        ["DEX 유동성 보상이란?", "자산을 예치한 유저들에게 시스템 수익을 공정하게 나누어 주는 보상 체계입니다."],
        ["삐니 AI의 역할은?", "형님의 의도를 전 세계 유저들에게 전달하고 시스템 이용을 돕는 지능형 가이드입니다."],
        ["사회 공헌의 최종 목표는?", "굶주림과 질병이 없는 인류 문명의 새로운 패러다임을 여는 것입니다."],
        ["기술 지원 및 제휴 문의는?", "support@hkwb.world 를 통해 24시간 글로벌 대응팀과 연결됩니다."]
    ];

    const faqList = document.getElementById('faq-list');
    faqs.forEach((f, i) => {
        faqList.innerHTML += `
            <div class="onion-layer" onclick="toggleOnion(this)">
                <span class="onion-title">${i+1}. ${f[0]} <button class="voice-btn" onclick="speak('${f[1]}'); event.stopPropagation();">듣기</button></span>
                <p class="onion-desc">${f[1]}</p>
            </div>`;
    });

    // ✅ 실시간 숫자 엔진 (6,280,000.5421 시작)
    let curSupply = 6280000.5421;
    setInterval(() => {
        curSupply += (Math.random() * 0.0005);
        document.getElementById('live-supply').innerText = format(curSupply);
        
        let liq = 88432094776 + Math.floor(Math.random() * 50000);
        // 기타 숫자들도 변하게 확장 가능
    }, 500);

    // ✅ 말로 하는 AI (TTS 기본 기능)
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ko-KR';
        window.speechSynthesis.speak(msg);
    }

    function toggleOnion(el) {
        const d = el.querySelector('.onion-desc');
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }

    function changeLang(val) {
        alert(val + " 언어 팩 로딩 중... (앞으로 200개국어까지 이 네모 박스 안에서 확장됩니다)");
    }
</script>
</body>
</html>
