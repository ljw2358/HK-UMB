<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL MASTER v6.0</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        /* 1. 명칭 변경: HK 월드뱅크 */
        .header-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); letter-spacing: -2px; margin-top: 50px; }
        .sub-header { color: var(--hk-blue); font-size: 14px; margin-top: 10px; font-weight: 800; letter-spacing: 3px; }

        .pi-main { font-size: 58px; font-weight: 900; margin: 30px 0 5px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 24px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 30px; border-radius: 50px; font-size: 15px; font-weight: 900; margin-bottom: 25px; background: rgba(57, 255, 20, 0.05); }

        /* 2. [위치 이동] 파이 숫자 밑에 바로 전체 유통 현황 */
        .liq-card { border: 2.5px solid var(--hk-gold); background: rgba(255,255,255,0.03); padding: 20px; margin: 10px 0 20px 0; border-radius: 24px; }
        .section-label { font-size: 13px; color: var(--hk-blue); font-weight: 900; margin-bottom: 8px; display: block; }
        .section-val { font-size: 26px; font-weight: 900; color: var(--hk-green); }

        /* 3. [위치 이동] 그 밑에 파이 수량, DEX SWAP, LP 스테이킹 */
        .asset-card { border: 2px solid #222; background: rgba(255,255,255,0.02); padding: 20px; margin-bottom: 40px; border-radius: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .asset-item { display: flex; flex-direction: column; gap: 5px; }
        .asset-label { font-size: 10px; color: #666; font-weight: 900; }
        .asset-val { font-size: 13px; font-weight: 900; color: #fff; }

        .btn-group-label { text-align: left; font-size: 14px; font-weight: 900; margin: 20px 0 15px 5px; color: var(--hk-gold); border-left: 4px solid var(--hk-gold); padding-left: 10px; }
        
        /* 4. [아이콘 배치] 송금 위/아래 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .menu-item { background: #111; padding: 22px 0; border-radius: 24px; border: 1px solid #222; }
        .menu-icon { font-size: 26px; margin-bottom: 8px; display: block; }
        .menu-text { font-size: 12px; font-weight: 800; }

        .big-btn { width: 100%; padding: 20px; border-radius: 22px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; }
        .faq-a { color: #bbb; font-size: 12px; line-height: 1.6; margin-top: 5px; }
        .vision-item { margin-bottom: 15px; padding: 15px; background: #111; border-radius: 15px; border-left: 4px solid var(--hk-blue); }
        .vision-item b { color: var(--hk-blue); font-size: 15px; display: block; margin-bottom: 5px; }

        .footer { margin: 60px 0 100px 0; color: #444; font-size: 10px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="header-title">HK 월드뱅크</div>
        <div class="sub-header">GLOBAL ADVANCED CENTER</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill">Value: $ 125,663,600 (GCV)</div>

    <div class="liq-card">
        <span class="section-label">전체 유동성 현황, DEX</span>
        <div class="section-val">$ 88,438,688,147</div>
    </div>

    <div class="asset-card">
        <div class="asset-item">
            <span class="asset-label">파이 수량</span>
            <span class="asset-val" style="color:var(--hk-gold)">400.0212</span>
        </div>
        <div class="asset-item" style="border-left: 1px solid #222; border-right: 1px solid #222;">
            <span class="asset-label">DEX SWAP</span>
            <span class="asset-val">ACTIVE</span>
        </div>
        <div class="asset-item">
            <span class="asset-label">LP 스테이킹</span>
            <span class="asset-val" style="color:var(--hk-green)">28.57%</span>
        </div>
    </div>

    <div class="btn-group-label">MAIN BANKING</div>
    <div class="menu-grid">
        <div class="menu-item"><span class="menu-icon">🚀</span><span class="menu-text">송금</span></div>
        <div class="menu-item"><span class="menu-icon">🛒</span><span class="menu-text">결제</span></div>
        <div class="menu-item"><span class="menu-icon">🏦</span><span class="menu-text">예치</span></div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" style="border-color: var(--hk-gold);"><span class="menu-icon">🎁</span><span class="menu-text">보상</span></div>
        <div class="menu-item" style="border-color: var(--hk-gold);"><span class="menu-icon">💳</span><span class="menu-text">기본소득</span></div>
        <div class="menu-item" style="border-color: var(--hk-gold);"><span class="menu-icon">🔄</span><span class="menu-text">스왑</span></div>
    </div>

    <button class="big-btn" style="background: var(--hk-pink); margin-top: 40px;" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel" style="display:block;"><div id="faq-list"></div></div>

    <button class="big-btn" style="background: #253347;" onclick="toggle('vision-panel')">HK 사회 재단 비전 2030 (5)</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="footer">HK GROUP FOUNDER & CHAIRMAN LEE JAEWAN</div>
</div>

<script>
    // FAQ 20개 & 비전 5개 데이터 세팅
    const faqs = [
        ["보안 수준은?", "양자 암호화 기술로 보호됩니다."], ["기본소득 배분?", "수익의 30%를 전 인류에게 배분합니다."], 
        ["로봇 보급?", "신청 순서에 따라 무상 보급합니다."], ["핵융합 에너지?", "에너지 비용 제로를 목표로 합니다."],
        ["교육 시스템?", "AI 튜터가 무상 교육을 지원합니다."], ["의료 지원?", "재단 기금으로 전액 지원합니다."],
        ["수수료 환원?", "생태계 기여자에게 90% 환원합니다."], ["참여 방법?", "노드 및 앱 활동으로 참여합니다."],
        ["미래 가치?", "모든 첨단 기술의 통합지입니다."], ["글로벌 센터?", "50개 도시에 구축 중입니다."],
        ["데이터 권리?", "사용자가 100% 소유합니다."], ["신규 상장?", "AI 심사 후 상장됩니다."],
        ["유동성 보호?", "알고리즘이 가치를 방어합니다."], ["사회 기여?", "빈곤 퇴치에 기부됩니다."],
        ["로봇 보안?", "해킹 차단 시스템이 작동합니다."], ["장학 혜택?", "월 $5,000 연구비를 지원합니다."],
        ["거버넌스?", "설립자의 승인권이 보장됩니다."], ["안정성?", "자가 진단 AI가 가동됩니다."],
        ["자산 전환?", "1:1 안전 전환을 보장합니다."], ["삐니의 역할?", "형님의 전담 비서입니다."]
    ];
    const visions = [
        ["🏫 HK 글로벌 AI 학교", "무상 교육 시스템"], ["🏥 나노 메디컬 센터", "난치병 정복 의료"], 
        ["🏠 에너지 자립 홈", "에너지 비용 제로"], ["🎓 인재 양성", "연구비 전액 지원"], 
        ["🤖 1가정 1로봇", "노동 해방 실현"]
    ];

    const fList = document.getElementById('faq-list');
    faqs.forEach((f, i) => { fList.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`; });

    const vList = document.getElementById('vision-list');
    visions.forEach(v => { vList.innerHTML += `<div class="vision-item"><b>${v[0]}</b>${v[1]}</div>`; });

    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    let p=400.0212;
    setInterval(() => {
        p += Math.random()*0.0001;
        document.getElementById('pi-val').innerHTML = p.toFixed(4) + " <span>Pi</span>";
    }, 1000);
</script>
</body>
</html>
