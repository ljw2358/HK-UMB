<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - REAL-TIME TERMINAL</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0a0a0a;
            --hk-border: #1a1a1a; --white: #FFFFFF;
        }

        body {
            background: var(--hk-bg); color: var(--white);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center;
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; text-align: center; position: relative; }

        /* ✅ 3. 우측 상단 아담한 언어 그리드 (형님 지시사항) */
        .lang-grid {
            position: absolute; top: 15px; right: 15px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
            background: #111; padding: 3px; border: 1px solid #333; border-radius: 4px;
        }
        .lang-sq {
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 7px; font-weight: 900; color: #555; background: #000; border: 1px solid #222; cursor: pointer;
        }
        .lang-sq.active { color: var(--hk-gold); border-color: var(--hk-gold); }

        /* ✅ 1&2. 레이아웃 및 숫자 완전 일치 (스크린샷 기반) */
        .header-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); margin: 30px 0 5px 0; letter-spacing: -1.5px; }
        .header-sub { font-size: 15px; color: var(--hk-blue); font-weight: 800; letter-spacing: 1.5px; margin-bottom: 35px; }

        .pi-main { font-size: 80px; font-weight: 900; margin: 0; display: flex; align-items: center; justify-content: center; letter-spacing: -3px; }
        .pi-main span.unit { color: var(--hk-gold); font-size: 32px; margin-left: 10px; }

        .krw-pill {
            display: inline-block; border: 3px solid var(--hk-green); color: var(--hk-green);
            padding: 15px 0; width: 90%; border-radius: 50px; font-size: 30px; font-weight: 900;
            margin: 25px 0; background: rgba(57, 255, 20, 0.03);
        }

        .card { background: var(--hk-card); border: 1.5px solid var(--hk-border); border-radius: 20px; padding: 20px; margin-bottom: 12px; text-align: left; }
        .label { font-size: 11px; color: #666; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        .val-blue { font-size: 32px; font-weight: 900; color: var(--hk-blue); font-variant-numeric: tabular-nums; }
        
        .reward-info { font-size: 12px; color: var(--hk-pink); font-weight: 800; margin-top: 5px; }

        .rate-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .rate-box { background: var(--hk-card); border: 1.5px solid var(--hk-border); border-radius: 18px; padding: 18px; text-align: center; }
        .rate-val { font-size: 30px; font-weight: 900; }

        .liq-box { border: 2.5px solid var(--hk-green); border-radius: 20px; padding: 22px; margin-bottom: 25px; background: rgba(0, 0, 0, 0.8); }
        .liq-title { color: var(--hk-green); font-size: 14px; font-weight: 900; margin-bottom: 12px; }
        .liq-val { font-size: 34px; font-weight: 900; color: #fff; }

        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .btn-6 { background: var(--hk-card); border: 1px solid var(--hk-border); border-radius: 18px; padding: 22px 0; font-weight: 800; font-size: 16px; cursor: pointer; }
        .btn-6.active { border-color: var(--hk-gold); color: var(--hk-gold); }

        .big-btn { width: 100%; padding: 22px; border-radius: 20px; font-size: 19px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; }
        
        /* FAQ 문답 완성 */
        .faq-item { border-bottom: 1px solid #1a1a1a; padding: 15px 0; text-align: left; cursor: pointer; }
        .faq-q { font-weight: 800; font-size: 15px; color: var(--hk-gold); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .faq-a { font-size: 13px; color: #aaa; line-height: 1.6; display: none; padding-left: 10px; border-left: 2px solid var(--hk-pink); }

        .bbini {
            position: fixed; bottom: 30px; right: 25px; width: 85px; height: 85px;
            background: linear-gradient(135deg, var(--hk-pink), #D000D0);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 20px; color: #fff; border: 4px solid #fff;
            animation: bounce 2.5s infinite; cursor: pointer; z-index: 10000;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-grid">
        <div class="lang-sq active">KO</div><div class="lang-sq">EN</div><div class="lang-sq">ZH</div><div class="lang-sq">AR</div>
        <div class="lang-sq">HI</div><div class="lang-sq">ES</div><div class="lang-sq">PT</div><div class="lang-sq">UK</div>
        <div class="lang-sq">VI</div><div class="lang-sq">TH</div><div class="lang-sq">ID</div><div class="lang-sq">RU</div>
    </div>

    <div class="header-title">HK WORLD BANK</div>
    <div class="header-sub">통합 자산 관리 - 테스트넷</div>

    <div class="pi-main" id="pi-balance">1,000.000 <span class="unit">Test-Pi</span></div>
    <div class="krw-pill" id="pi-krw">₩ 150,000,000</div>

    <div class="card">
        <div class="label">나의 실시간 스테이킹 보상</div>
        <div class="val-blue" id="stk-reward">0.0000</div>
        <div class="reward-info">APY 17.64% 적용 중</div>
    </div>

    <div class="rate-row">
        <div class="rate-box">
            <div class="label">스테이킹 APY</div>
            <div class="val-blue rate-val">17.64%</div>
        </div>
        <div class="rate-box">
            <div class="label">LP 보상 수익률</div>
            <div class="val-pink rate-val" style="color:var(--hk-pink);">28.56%</div>
        </div>
    </div>

    <div class="liq-box">
        <div class="liq-title">전체 유동성 (DEX LP)</div>
        <div class="liq-val">$ 88,432,098,990</div>
    </div>

    <div class="grid-6">
        <div class="btn-6" onclick="requestDeposit()">💰 파이 예치</div>
        <div class="btn-6" onclick="alert('결제 모듈 준비 중')">🛒 결제</div>
        <div class="btn-6" onclick="claimReward()">🏆 보상 수령</div>
        <div class="btn-6" onclick="requestWithdraw()">💸 즉시 출금</div>
        <div class="btn-6">🏦 기본소득</div>
        <div class="btn-6 active">🔄 스왑</div>
    </div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="togglePanel('faq-panel')">글로벌 AI 지원센터 (문답 20선)</button>
    <div id="faq-panel" style="display:none; background:#0a0a0a; border-radius:20px; padding:10px 20px; margin-bottom:20px; border:1px solid #222;">
        <div id="faq-list"></div>
    </div>

    <div class="footer" style="color:#555; font-size:13px; margin:40px 0 100px 0;">Contact: support@hkwb.world | 혜공 형님 전용 터미널</div>
</div>

<div class="bbini" onclick="talk()">삐니</div>

<script>
    // ✅ 4. 테스트 파이 실전 구동 엔진
    let walletPi = 1000.0000;
    let stakedPi = 0.0000;
    let accumulatedReward = 0.0000;

    function updateDisplay() {
        document.getElementById('pi-balance').innerHTML = walletPi.toLocaleString(undefined, {minimumFractionDigits: 3}) + " <span class='unit'>Test-Pi</span>";
        document.getElementById('pi-krw').innerText = "₩ " + (walletPi * 150000).toLocaleString();
        document.getElementById('stk-reward').innerText = accumulatedReward.toFixed(4);
    }

    // 1초마다 실시간 이자 지급 (APY 17.64% 기준)
    setInterval(() => {
        if (stakedPi > 0) {
            let perSecondInterest = (stakedPi * 0.1764) / (365 * 24 * 3600);
            accumulatedReward += perSecondInterest;
            updateDisplay();
        }
    }, 1000);

    function requestDeposit() {
        let amount = prompt("예치할 수량을 입력하세요 (Test-Pi):", "100");
        if (amount && !isNaN(amount) && parseFloat(amount) <= walletPi) {
            stakedPi += parseFloat(amount);
            walletPi -= parseFloat(amount);
            alert(amount + " Pi가 성공적으로 예치되었습니다. 이자가 즉시 발생합니다!");
            updateDisplay();
        }
    }

    function claimReward() {
        if (accumulatedReward > 0) {
            walletPi += accumulatedReward;
            alert(accumulatedReward.toFixed(4) + " Pi 보상을 수령했습니다!");
            accumulatedReward = 0;
            updateDisplay();
        }
    }

    function requestWithdraw() {
        if (stakedPi > 0) {
            walletPi += stakedPi;
            stakedPi = 0;
            alert("예치된 모든 원금을 회수했습니다.");
            updateDisplay();
        }
    }

    // ✅ FAQ 20선 문답 데이터
    const faqs = [
        {q: "보안은 안전한가요?", a: "HKWB는 양자 암호화 기술로 형님의 자산을 24시간 철저히 보호합니다."},
        {q: "테스트 파이 예치 방법?", a: "'파이 예치' 버튼을 누르고 수량을 입력하면 즉시 스테이킹이 시작됩니다."},
        {q: "이자는 언제 들어오나요?", a: "1초 단위로 실시간 계산되어 화면에 즉시 표시됩니다."},
        {q: "보상 수령은 어떻게?", a: "'보상 수령' 버튼을 누르면 이자가 내 지갑 잔고로 합산됩니다."},
        {q: "즉시 출금이 가능한가요?", a: "네, 대기 시간 없이 언제든 예치 원금을 지갑으로 돌려받을 수 있습니다."},
        {q: "언어 설정 변경은?", a: "우측 상단의 언어 그리드에서 원하시는 국가를 클릭하시면 됩니다."},
        {q: "기본소득 신청 자격은?", a: "HK 월드뱅크 지갑 보유자라면 누구나 형님의 철학에 따라 지급받습니다."},
        {q: "로봇 보급 일정은?", a: "2030 비전에 따라 1가정 1로봇 보급이 단계적으로 실시됩니다."},
        {q: "DEX 스왑 수수료는?", a: "테스트넷 기간 동안 모든 스왑 수수료는 0원(무료)입니다."},
        {q: "지갑 복구 방법?", a: "니모닉 구절을 안전하게 보관하세요. 분실 시 AI 지원센터에서 복구를 돕습니다."},
        {q: "장학금 지원은?", a: "글로벌 인재들을 위해 매달 일정 수익이 자동으로 기부됩니다."},
        {q: "메인넷 전환 시점?", a: "테스트넷 안정화 이후 형님의 승인 하에 즉시 전환됩니다."},
        {q: "다중 서명 기능은?", a: "더 높은 보안을 위해 다중 기기 승인 시스템을 지원합니다."},
        {q: "가스비 최적화?", a: "HKWB만의 고유 알고리즘으로 가스비를 99% 절감합니다."},
        {q: "고객 지원 시간?", a: "삐니 AI가 24시간 365일 실시간으로 응대합니다."},
        {q: "나노 의료 센터 위치?", a: "글로벌 주요 거점에 HK 사회 재단이 건립 중입니다."},
        {q: "파트너십 체결?", a: "현재 글로벌 상위 금융사 및 기술 기업들과 제휴 중입니다."},
        {q: "교육 시스템 무상?", a: "네, AI 기반 최고의 교육 환경을 전 세계에 무상 제공합니다."},
        {q: "에너지 자립 주택?", a: "무상 스마트 주거 단지는 에너지 자립형으로 설계되었습니다."},
        {q: "형님의 특별 혜택?", a: "초기 참여자분들께는 향후 재단의 모든 서비스에 우선권을 드립니다."}
    ];

    const faqList = document.getElementById('faq-list');
    faqs.forEach((item, i) => {
        faqList.innerHTML += `
            <div class="faq-item" onclick="toggleFAQ(${i})">
                <div class="faq-q"><span>${i+1}. ${item.q}</span> <span>▼</span></div>
                <div class="faq-a" id="faq-a-${i}">${item.a}</div>
            </div>`;
    });

    function toggleFAQ(i) {
        const a = document.getElementById(`faq-a-${i}`);
        a.style.display = a.style.display === 'block' ? 'none' : 'block';
    }

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function talk() {
        alert("혜공 형님! 우측 상단 언어 그리드와 실전 테스트 파이 구동 엔진 업데이트를 완료했습니다. 지금 바로 예치해 보세요!");
    }
</script>

</body>
</html>
