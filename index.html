<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - THE ULTIMATE ORIGIN</title>
    <style>
        :root { 
            --bg: #000; 
            --yellow: #FFFF00; 
            --green: #39FF14; 
            --blue: #00FFFF; 
            --pink: #FF1493; 
            --red: #FF0000; 
            --gray: #1C1C1C;
        }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 80px; 
            overflow-x: hidden; 
        }
        
        /* 헤더 영역 */
        header { text-align: center; margin: 30px 0; width: 100%; }
        .logo { font-size: 3.2rem; color: var(--yellow); font-weight: 900; text-shadow: 0 0 25px var(--yellow); margin: 0; }
        .sub-logo { color: var(--blue); font-weight: bold; font-size: 1.4rem; margin-top: 8px; letter-spacing: 2px; }

        /* 실시간 데이터 자산 섹션 */
        .top-info { width: 90%; text-align: center; margin-bottom: 25px; }
        .pi-val { font-size: 4rem; font-weight: 900; color: #fff; margin: 10px 0; }
        .pi-unit { color: var(--yellow); font-size: 2.5rem; margin-left: 10px; }
        .gcv-pill { font-size: 1.8rem; color: var(--green); border: 3px solid var(--green); border-radius: 60px; padding: 15px; width: 85%; margin: 20px auto; font-weight: 900; box-shadow: inset 0 0 15px var(--green); }

        .supply-box { width: 90%; border: 2px solid var(--blue); border-radius: 20px; padding: 18px; margin-bottom: 20px; text-align: center; background: rgba(0, 255, 255, 0.03); }
        .rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; margin-bottom: 20px; }
        .rate-item { background: #0A0A0A; padding: 18px; border-radius: 18px; text-align: center; border: 1px solid #333; }
        .rate-val { font-size: 1.6rem; font-weight: 900; color: var(--blue); margin-top: 5px; }

        .liquidity-box { width: 90%; border: 3px solid var(--green); border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 30px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        .liq-val { font-size: 2.5rem; font-weight: 900; letter-spacing: 1px; }

        /* 기능성 버튼 그리드 (9구) */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 92%; margin-bottom: 30px; }
        .m-btn { padding: 25px 0; border-radius: 18px; font-weight: 900; border: none; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .m-btn:active { transform: scale(0.96); opacity: 0.9; }
        .bg-w { background: #fff; color: #000; }
        .bg-y { background: var(--yellow); color: #000; }
        .bg-g { background: var(--green); color: #000; }
        .bg-d { background: var(--gray); color: #fff; border: 1px solid #444; }

        /* 비전 및 FAQ 배너 영역 */
        .banner { width: 90%; padding: 28px; border-radius: 20px; margin-bottom: 18px; text-align: center; font-weight: 900; font-size: 1.4rem; cursor: pointer; position: relative; box-shadow: 4px 4px 10px rgba(0,0,0,0.6); }
        .bg-pk { background: var(--pink); border: 2px solid #fff; }
        .bg-nv { background: #1a2a3a; border: 2px solid var(--blue); }

        /* SNS 핸들 */
        .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; margin-bottom: 40px; }
        .sns-item { padding: 22px; border-radius: 18px; text-align: center; font-weight: 900; }
        .sns-yt { background: var(--red); box-shadow: 0 0 15px var(--red); }
        .sns-tk { background: #000; border: 2px solid #fff; }

        /* 삐니 고정 버튼 */
        #bbini-fixed { position: fixed; bottom: 30px; right: 30px; width: 100px; height: 100px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 5px solid #fff; box-shadow: 0 0 35px var(--pink); z-index: 9999; font-size: 1.3rem; animation: heartbeat 1.5s infinite; cursor: pointer; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 양파 속살 (모달) 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 10000; padding: 50px 20px; overflow-y: auto; }
        .modal-content { background: #111; border: 3px solid var(--yellow); border-radius: 30px; padding: 30px; line-height: 2; font-size: 1.1rem; white-space: pre-wrap; color: #fff; box-shadow: 0 0 50px rgba(255, 255, 0, 0.2); }
        .close-area { text-align: right; margin-bottom: 20px; }
        .close-btn { color: var(--pink); font-size: 2.5rem; font-weight: 900; cursor: pointer; }
        .highlight { color: var(--green); font-weight: bold; }
        .vision-title { font-size: 1.8rem; color: var(--yellow); margin-bottom: 20px; border-bottom: 2px solid var(--yellow); padding-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">HK WORLD BANK</h1>
        <div class="sub-logo">통합 자산 관리 시스템</div>
    </header>

    <div class="top-info">
        <div class="pi-val">412.3158<span class="pi-unit">Pi</span></div>
        <div class="gcv-pill">₩ 47,123,850,000</div>
    </div>

    <div class="supply-box">
        <div style="color:var(--blue); font-size:1.1rem; margin-bottom:8px;">HKWB 실시간 공급량</div>
        <div style="font-size:2.2rem; font-weight:900;">6,280,000.5074</div>
    </div>

    <div class="rate-grid">
        <div class="rate-item"><div>스테이킹</div><div class="rate-val">17.64%</div></div>
        <div class="rate-item"><div>LP 수익률</div><div class="rate-val" style="color:var(--pink);">28.57%</div></div>
    </div>

    <div class="liquidity-box">
        <div style="color:var(--green); font-size:1.2rem; font-weight:900; margin-bottom:10px;">전체 유동성 (DEX LP)</div>
        <div class="liq-val">$ 88,432,098,051</div>
    </div>

    <div class="btn-grid">
        <button class="m-btn bg-w">PI 수량</button>
        <button class="m-btn bg-y">DEX 스왑</button>
        <button class="m-btn bg-g">LP 스테이킹</button>
        <button class="m-btn bg-d">🚀 송금</button>
        <button class="m-btn bg-d">🛒 결제</button>
        <button class="m-btn bg-d">💰 예치</button>
        <button class="m-btn bg-d">🏆 보상</button>
        <button class="m-btn bg-d">🏦 기본소득</button>
        <button class="m-btn bg-d">🔄 스왑</button>
    </div>

    <div class="banner bg-pk" onclick="peel('faq')">글로벌 AI 지원센터 (FAQ 20선)</div>
    <div class="banner bg-nv" onclick="peel('vision')">HK 사회 재단 비젼 2030</div>

    <div class="sns-grid">
        <div class="sns-item sns-yt">YouTube<br><small style="font-size:0.8rem;">@hyekong2025</small></div>
        <div class="sns-item sns-tk">TikTok<br><small style="font-size:0.8rem;">@hyekong2025</small></div>
    </div>

    <div style="color:var(--blue); font-weight:bold; margin-bottom:40px;">support@hkwb.world</div>

    <div id="bbini-fixed" onclick="alert('형님, 인류의 주권이 회복되는 그날까지 삐니가 함께합니다!')">삐니</div>

    <div id="modalLayer" class="modal">
        <div class="modal-content">
            <div class="close-area"><span class="close-btn" onclick="shred()">×</span></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        /* [형님의 원본 데이터 - 생략 절대 불가 원칙 준수] 
           FAQ 1번부터 20번까지 전수 수록
        */
        const originData = {
            faq: `<div class="vision-title">글로벌 AI 지원센터 FAQ 20선</div>` +
                 `1. <span class="highlight">보안 체계:</span> 양자 암호화 및 HK 독자 분산 프로토콜로 외부 간섭 100% 차단\n` +
                 `2. <span class="highlight">수익 환원:</span> 생태계 수익의 30%는 무상 복지를 위해 사회 재단으로 즉시 환원\n` +
                 `3. <span class="highlight">기술 주권:</span> 거대 자본으로부터 기술을 독립시켜 전 인류가 공유하는 시스템 구축\n` +
                 `4. <span class="highlight">파이 가치:</span> GCV 기준을 지지하며 실물 경제 내 파이의 절대적 가치 확립 지원\n` +
                 `5. <span class="highlight">로봇 보급:</span> 1가정 1로봇 무상 지원을 통한 인류 노동으로부터의 해방 실현\n` +
                 `6. <span class="highlight">무상 교육:</span> 글로벌 AI 학교 건립을 통해 전 인류에게 평등한 지식 기회 제공\n` +
                 `7. <span class="highlight">의료 혁명:</span> 나노 메디컬 최첨단 무료 의료 시스템으로 질병 고통 없는 삶 보장\n` +
                 `8. <span class="highlight">주거 주권:</span> 핵융합 에너지 기반 스마트홈 무상 공급으로 기본 주거권 확립\n` +
                 `9. <span class="highlight">장학 제도:</span> 전 세계 모든 인재를 위한 무제한 장학금 및 연구비 지원\n` +
                 `10. <span class="highlight">통합 앱:</span> 13개 HK 전용 앱이 유기적으로 결합된 금융-복지 에코시스템\n` +
                 `11. <span class="highlight">기본 소득:</span> 생태계 참여자 모두에게 지급되는 보편적 디지털 기본 소득\n` +
                 `12. <span class="highlight">데이터 주권:</span> 개인의 데이터는 개인이 소유하며 영리 기업의 착취를 원천 봉쇄\n` +
                 `13. <span class="highlight">투명 스왑:</span> Pi와 HKWB 간의 실시간 스왑 및 투명한 유동성 공급 현황 공개\n` +
                 `14. <span class="highlight">분산 노드:</span> 글로벌 노드 참여자들에 대한 공정한 보상 및 네트워크 유지 체계\n` +
                 `15. <span class="highlight">청정 에너지:</span> 핵융합 및 신재생 에너지를 통한 지속 가능한 데이터 센터 운영\n` +
                 `16. <span class="highlight">수수료 제로:</span> 인류 간 자산 이동 시 발생하는 불합리한 수수료를 전면 폐지\n` +
                 `17. <span class="highlight">온오프 결제:</span> HK 결제망을 통한 전 세계 온/오프라인 가맹점의 즉시 결제 연동\n` +
                 `18. <span class="highlight">블록체인 기부:</span> 1원 한 장까지 투명하게 공개되는 블록체인 기반 복지 집행\n` +
                 `19. <span class="highlight">윤리적 AI:</span> 인간을 지배하는 AI가 아닌, 인간을 섬기는 윤리 가이드라인 준수\n` +
                 `20. <span class="highlight">2030 로드맵:</span> 2030년까지 인류 경제 해방을 완성하는 최종 프로젝트 이행`,

            vision: `<div class="vision-title">HK 사회 재단 비젼 2030 (The Origin)</div>` +
                    `형님의 비전은 인류의 생존과 존엄을 지키는 5대 기둥에서 시작됩니다:\n\n` +
                    `1. <span class="highlight">학교 (School):</span> 글로벌 AI 무상 교육 시스템 구축. 지식의 격차를 없애는 교육 혁명.\n\n` +
                    `2. <span class="highlight">병원 (Hospital):</span> 나노 메디컬 최첨단 무료 의료 시스템. 생명의 존엄성을 지키는 의료 주권.\n\n` +
                    `3. <span class="highlight">주거 (Housing):</span> 핵융합 에너지 기반 스마트홈 무상 공급. 거주 걱정 없는 인류의 삶.\n\n` +
                    `4. <span class="highlight">장학금 (Scholarship):</span> 전 세계 인재 양성을 위한 무제한 지원. 꿈을 포기하지 않는 세상.\n\n` +
                    `5. <span class="highlight">로봇 (Robot):</span> 1가정 1로봇 보급을 통한 영구적 노동 해방. 인간다운 삶의 회복.`
        };

        function peel(type) {
            const body = document.getElementById('modalBody');
            body.innerHTML = originData[type];
            document.getElementById('modalLayer').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function shred() {
            document.getElementById('modalLayer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
