<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-WorldBank Global Ecosystem</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* [1. 황금빛 노란 옷 디자인 테마] */
        :root {
            --hk-gold: #FFD700;
            --hk-dark: #000000;
            --hk-card: #1A1A1A;
            --hk-green: #2EBC62;
            --hk-white: #FFFFFF;
            --hk-red: #FF0000; /* 유튜브/틱톡 포인트 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--hk-dark); color: var(--hk-white); font-family: 'Noto Sans KR', sans-serif; padding-bottom: 50px; }
        .hk-container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* [2. 헤더 및 상태표시] */
        .hk-status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--hk-green); }
        .dot { width: 8px; height: 8px; background: var(--hk-green); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* [3. 메인 전광판] */
        .main-balance {
            background: linear-gradient(145deg, #222, #000);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .ledger-name { color: var(--hk-gold); font-size: 14px; margin-bottom: 12px; letter-spacing: 2px; }
        .pi-amount { font-size: 40px; font-weight: 700; margin-bottom: 15px; }
        .pi-amount span { color: var(--hk-gold); font-size: 26px; }

        /* [4. 3인방 버튼] */
        .action-grid { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-main { flex: 1; padding: 18px 5px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; }
        .btn-w { background: #fff; color: #000; }
        .btn-g { background: var(--hk-gold); color: #000; }
        .btn-gr { background: var(--hk-green); color: #fff; }

        /* [5. 황금 아이콘 메뉴 그리드] */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .menu-box { background: var(--hk-card); border-radius: 20px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255, 215, 0, 0.1); }
        .menu-box i { color: var(--hk-gold) !important; font-size: 32px !important; display: block; margin-bottom: 12px; }
        .menu-box span { font-size: 14px; font-weight: 500; }

        /* [6. ★ 형님이 말씀하신 유튜브 & 틱톡 섹션 ★] */
        .sns-section { margin-bottom: 30px; }
        .sns-title { color: var(--hk-gold); font-size: 16px; margin-bottom: 15px; font-weight: bold; padding-left: 5px; }
        .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sns-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; color: white;
            transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .sns-btn:active { transform: scale(0.95); }
        .yt { background: #FF0000; } /* 유튜브 레드 */
        .tt { background: #000000; border: 1px solid #FF0050; } /* 틱톡 블랙/핑크 */

        /* [7. 보안 패널] */
        .security-box { background: rgba(0, 229, 255, 0.05); border: 1px solid #00E5FF; border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .sec-header { color: #00E5FF; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        /* [8. 고객센터 하단 버튼] */
        .cs-button {
            width: 100%; background: var(--hk-card); color: var(--hk-gold); border: 2px solid var(--hk-gold);
            padding: 20px; border-radius: 20px; font-weight: bold; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 12px;
        }
    </style>
</head>
<body>

<div class="hk-container">
    <div class="hk-status-bar">
        <div class="live-indicator"><div class="dot"></div>HK-WORLD NETWORK ACTIVE</div>
        <i class="fas fa-wifi" style="color: var(--hk-gold);"></i>
    </div>

    <h1 style="text-align: center; margin-bottom: 30px; letter-spacing: 4px; font-weight: 300;">HK-WORLD BANK</h1>

    <div class="main-balance">
        <p class="ledger-name">MAIN CONSOLIDATED LEDGER</p>
        <div class="pi-amount">400.0212 <span>Pi</span></div>
        <div style="color: var(--hk-gold); font-weight: bold; background: rgba(255,215,0,0.1); display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 13px;">
            GCV VALUE: $ 314,159
        </div>
    </div>

    <div class="action-grid">
        <button class="btn-main btn-w" onclick="alert('PI 수량 확인 중...')">PI 수량</button>
        <button class="btn-main btn-g" onclick="alert('DEX 스왑 엔진 준비 중...')">DEX 스왑</button>
        <button class="btn-main btn-gr" onclick="alert('LP 공급 시동 중...')">LP 공급</button>
    </div>

    <div class="menu-grid">
        <div class="menu-box"><i class="fas fa-paper-plane"></i><span>송금</span></div>
        <div class="menu-box" onclick="initHKPayment()"><i class="fas fa-shopping-cart"></i><span>결제</span></div>
        <div class="menu-box"><i class="fas fa-vault"></i><span>예치</span></div>
        <div class="menu-box"><i class="fas fa-award"></i><span>보상</span></div>
        <div class="menu-box"><i class="fas fa-coins"></i><span>기본소득</span></div>
        <div class="menu-box"><i class="fas fa-random"></i><span>스왑</span></div>
    </div>

    <div class="sns-section">
        <p class="sns-title"><i class="fas fa-share-nodes" style="margin-right: 10px;"></i>OFFICIAL CHANNELS</p>
        <div class="sns-grid">
            <a href="https://www.youtube.com/@hykong2025" target="_blank" class="sns-btn yt">
                <i class="fab fa-youtube" style="font-size: 20px;"></i> 유튜브
            </a>
            <a href="https://www.tiktok.com/@hykong2025" target="_blank" class="sns-btn tt">
                <i class="fab fa-tiktok" style="font-size: 20px;"></i> 틱톡
            </a>
        </div>
    </div>

    <div class="security-box">
        <div class="sec-header"><i class="fas fa-user-shield"></i>SECURITY V23 ACTIVE</div>
        <p style="font-size: 13px; color: #888; line-height: 1.8;">
            ● 블록체인 자산 실시간 동기화 가동<br>
            ● 글로벌 보안 프로토콜 레이어-7 적용<br>
            ● AI 기반 이상 거래 자동 탐지 시스템
        </p>
    </div>

    <button class="cs-button" onclick="initHKPayment()">
        <i class="fas fa-headset"></i> 글로벌 AI 고객지원센터 가동
    </button>
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
    const Pi = window.Pi;

    async function initHKPayment() {
        console.log("HK-WorldBank 결제 엔진 시동...");
        if (typeof Pi !== 'undefined') {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "HK-WorldBank Test Payment",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (id) => console.log("승인 대기:", id),
                    onReadyForServerCompletion: (id, txid) => alert("결제 완료! TXID: " + txid),
                    onCancel: (id) => console.log("취소됨"),
                    onError: (err) => alert("오류 발생: " + err.message)
                });
            } catch (e) {
                alert("파이 브라우저에서 실행해 주세요!");
            }
        } else {
            alert("시스템 시동 중... 잠시 후 다시 시도하세요.");
        }
    }

    // [이 밑으로 300줄을 향한 추가 로직 구역...]
    // ..........................................
</script>

</body>
</html>
