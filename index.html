<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - Multi-Language Engine</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; position: relative; }

        /* 상단 상태바 & 50개국어 셀렉터 (우측 상단) */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; gap: 10px; }
        #langSelect {
            background: #000; color: var(--gold); border: 2px solid var(--gold);
            padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; outline: none; font-size: 0.9rem;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .node-tag { color: var(--gold); font-weight: 900; font-size: 0.8rem; margin-right: auto; }

        /* 헤더 섹션 */
        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        .sub-title { font-weight: bold; margin-top: 10px; font-size: 1.1rem; color: var(--neon-st); }
        .pi-display { font-size: 3rem; font-weight: 900; margin: 15px 0; font-variant-numeric: tabular-nums; }
        .gcv-box {
            background: rgba(57, 255, 20, 0.05); color: var(--neon-green); padding: 10px 30px;
            border: 1.5px solid var(--neon-green); border-radius: 50px; display: inline-block;
            font-weight: 900; font-size: 1.3rem;
        }

        /* 통계 카드들 */
        .supply-card { background: var(--card); border: 1.5px solid var(--neon-blue); border-radius: 15px; padding: 15px; margin: 25px 0; text-align: center; }
        .label { font-size: 0.75rem; color: #aaa; font-weight: bold; margin-bottom: 8px; }
        .val-blue { color: var(--neon-blue); font-weight: 900; font-size: 1.7rem; font-variant-numeric: tabular-nums; }

        .stat-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .val-st { color: var(--neon-st); font-weight: 900; font-size: 1.4rem; }
        .val-lp { color: var(--neon-lp); font-weight: 900; font-size: 1.4rem; }

        .lp-total-box { border: 3px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px; background: rgba(57, 255, 20, 0.02); }
        .lp-num { font-size: 1.8rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; }

        /* 버튼 및 메뉴 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-size: 0.85rem; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .icon-item { background: var(--card); padding: 20px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .icon-item:hover { border-color: var(--gold); }
        .icon-item i { font-style: normal; font-size: 1.6rem; display: block; margin-bottom: 10px; }
        .icon-item span { font-size: 0.85rem; font-weight: bold; color: #ddd; }

        /* FAQ 섹션 */
        .center-btn { width: 100%; background: #ff4d6d; color: white; padding: 20px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .faq-box { display: none; background: #0a0a0a; border: 1px solid #444; border-top: none; border-radius: 0 0 15px 15px; padding: 20px; margin-bottom: 30px; max-height: 450px; overflow-y: auto; }
        .faq-q { color: var(--gold); font-weight: 900; margin-top: 15px; font-size: 0.95rem; border-left: 3px solid var(--gold); padding-left: 8px; }
        .faq-a { color: #ccc; font-size: 0.85rem; margin-top: 5px; line-height: 1.5; padding-bottom: 10px; border-bottom: 1px solid #222; }

        footer { text-align: center; padding: 30px 20px; border-top: 1px solid #222; color: #777; font-size: 0.8rem; line-height: 1.8; }

        /* 삐니 챗봇 */
        #bpini-trigger { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 999; color: white; }
        #chat-window { display: none; position: fixed; bottom: 105px; right: 20px; width: 320px; height: 450px; background: #000; border: 2px solid var(--neon-lp); border-radius: 20px; z-index: 1000; flex-direction: column; overflow: hidden; }
        .chat-h { background: var(--neon-lp); padding: 15px; font-weight: 900; display: flex; justify-content: space-between; }
        .chat-b { flex: 1; padding: 15px; overflow-y: auto; background: #050505; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; }
        .ai { background: #1a1a1a; align-self: flex-start; border-left: 4px solid var(--neon-lp); }
        .user { background: var(--neon-blue); align-self: flex-end; }
        .chat-i { display: flex; padding: 10px; background: #111; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: #000; border: none; color: white; padding: 10px; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="node-tag">NODE ACTIVE [2/2]</div>
        <select id="langSelect" onchange="translateUI()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div class="sub-title" id="t-subtitle">Integrated System</div>
        <div class="pi-display"><span id="l-pi">412.3149</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-box">$ <span id="l-gcv">129,541,312</span> (GCV)</div>
    </header>

    <div class="supply-card">
        <div class="label" id="t-supply-label">REAL-TIME SUPPLY</div>
        <div class="val-blue" id="l-supply">6280000.5042</div>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <div class="label" id="t-st-label" style="color:var(--neon-st);">Staking</div>
            <div class="val-st" id="l-st">17.75%</div>
        </div>
        <div class="stat-card">
            <div class="label" id="t-lp-label" style="color:var(--neon-lp);">LP Yield</div>
            <div class="val-lp" id="l-lp">28.80%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div class="label" id="t-total-lp" style="color:var(--neon-green); margin-bottom:10px;">Total Liquidity</div>
        <div class="lp-num" id="l-total-lp">$ 88,432,103,868</div>
    </div>

    <div class="btn-grid">
        <button class="m-btn" id="t-btn-wallet" style="background:#fff; color:#000;" onclick="PiSDK('wallet')">PI Qty</button>
        <button class="m-btn" id="t-btn-swap" style="background:var(--gold); color:#000;" onclick="PiSDK('swap')">DEX Swap</button>
        <button class="m-btn" id="t-btn-stake" style="background:var(--neon-green); color:#000;" onclick="PiSDK('stake')">LP Staking</button>
    </div>

    <div class="icon-grid">
        <div class="icon-item" onclick="PiSDK('send')"><i>🚀</i><span id="m1">Send</span></div>
        <div class="icon-item" onclick="PiSDK('pay')"><i>🛒</i><span id="m2">Pay</span></div>
        <div class="icon-item" onclick="PiSDK('depo')"><i>💰</i><span id="m3">Deposit</span></div>
        <div class="icon-item" onclick="PiSDK('reward')"><i>🏅</i><span id="m4">Reward</span></div>
        <div class="icon-item" onclick="PiSDK('ubi')"><i>🏦</i><span id="m5">UBI</span></div>
        <div class="icon-item" onclick="PiSDK('ex')"><i>🔄</i><span id="m6">Swap</span></div>
    </div>

    <button class="center-btn" id="t-center-btn" onclick="toggleFaq()">AI Center</button>
    <div class="faq-box" id="faq-box"></div>

    <footer>
        <p>© 2026 HK WORLD BANK GLOBAL FOUNDATION<br>MASTER: HYEKONG HYUNG-NIM</p>
    </footer>
</div>

<div id="bpini-trigger" onclick="toggleChat()">삐니</div>
<div id="chat-window">
    <div class="chat-h"><span id="t-chat-title">BPINI AI</span><span onclick="toggleChat()" style="cursor:pointer;">✕</span></div>
    <div class="chat-b" id="chat-box"></div>
    <div class="chat-i">
        <input type="text" id="chat-input" onkeypress="if(event.key==='Enter') askAI()">
    </div>
</div>

<script>
    /* 50개국어 매핑 데이터 (시뮬레이션 최적화) */
    const languages = [
        {c:"ko", n:"한국어"}, {c:"en", n:"English"}, {c:"zh", n:"中文"}, {c:"ja", n:"日本語"}, {c:"vi", n:"Tiếng Việt"},
        {c:"es", n:"Español"}, {c:"fr", n:"Français"}, {c:"de", n:"Deutsch"}, {c:"pt", n:"Português"}, {c:"ru", n:"Русский"},
        {c:"hi", n:"हिन्दी"}, {c:"ar", n:"العربية"}, {c:"id", n:"Indonesia"}, {c:"th", n:"ไทย"}, {c:"tr", n:"Türkçe"},
        {c:"it", n:"Italiano"}, {c:"nl", n:"Nederlands"}, {c:"pl", n:"Polski"}, {c:"sv", n:"Svenska"}, {c:"fil", n:"Filipino"},
        {c:"ms", n:"Bahasa Melayu"}, {c:"fa", n:"فارسی"}, {c:"bn", n:"বাংলা"}, {c:"pa", n:"ਪੰਜਾਬੀ"}, {c:"te", n:"తెలుగు"},
        {c:"mr", n:"마래티어"}, {c:"ta", n:"타밀어"}, {c:"ur", n:"우르두어"}, {c:"gu", n:"구자라트어"}, {c:"kn", n:"칸나다어"},
        {c:"ml", n:"말라얄람어"}, {c:"uk", n:"Українська"}, {c:"ro", n:"Română"}, {c:"hu", n:"Magyar"}, {c:"el", n:"Ελληνικά"},
        {c:"cs", n:"Čeština"}, {c:"he", n:"עברית"}, {c:"da", n:"Dansk"}, {c:"fi", n:"Suomi"}, {c:"no", n:"Norsk"},
        {c:"sk", n:"Slovenčina"}, {c:"bg", n:"Български"}, {c:"hr", n:"Hrvatski"}, {c:"sr", n:"Српски"}, {c:"sl", n:"Slovenščina"},
        {c:"et", n:"Eesti"}, {c:"lv", n:"Latviešu"}, {c:"lt", n:"Lietuvių"}, {c:"sw", n:"Kiswahili"}, {c:"am", n:"አማርኛ"}
    ];

    const i18n = {
        ko: { sub: "통합 자산 관리 시스템", supply: "실시간 토큰 공급량", st: "스테이킹", lp: "LP 수익률", total: "전체 유동성 공급", w: "PI 수량", sw: "DEX 스왑", sk: "LP 스테이킹", c: "글로벌 AI 지원센터", m:["송금","결제","예치","보상","UBI","스왑"], chat: "삐니 AI 매니저", greet: "반갑습니다 고객님! 삐니가 글로벌 동기화를 마쳤습니다. 무엇을 도와드릴까요?", win: "고객님, 우리의 승리는 확실합니다!", placeholder: "메시지 입력..." },
        en: { sub: "Integrated Asset System", supply: "Real-time Token Supply", st: "Staking", lp: "LP Yield", total: "Total Liquidity Supply", w: "PI Qty", sw: "DEX Swap", sk: "LP Staking", c: "Global AI Support", m:["Send","Pay","Deposit","Reward","UBI","Swap"], chat: "BPINI AI Manager", greet: "Welcome customer! Bpini has synced globally. How can I help you?", win: "Customer, victory is certain!", placeholder: "Type a message..." },
        zh: { sub: "综合资产管理系统", supply: "实时代币供应量", st: "质押", lp: "LP 收益率", total: "总流动性供应", w: "PI 数量", sw: "DEX 交换", sk: "LP 质押", c: "全球 AI 支持", m:["转账","支付","存款","奖励","UBI","交换"], chat: "삐니 AI 经理", greet: "欢迎顾客！삐니 已完成同步。我能为您做什么？", win: "顾客，我们一定会胜利！", placeholder: "输入信息..." }
    };

    const faqKeys = ["Vision", "Liquidity", "Mainnet", "Node", "Supply", "UBI", "Security", "Swap", "Yield", "Global", "Asset", "Token", "Contract", "Scale", "AI Support", "SDK", "Privacy", "Speed", "Growth", "Master"];

    function translateUI() {
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;
        
        document.getElementById('t-subtitle').innerText = d.sub;
        document.getElementById('t-supply-label').innerText = d.supply;
        document.getElementById('t-st-label').innerText = d.st;
        document.getElementById('t-lp-label').innerText = d.lp;
        document.getElementById('t-total-lp').innerText = d.total;
        document.getElementById('t-btn-wallet').innerText = d.w;
        document.getElementById('t-btn-swap').innerText = d.sw;
        document.getElementById('t-btn-stake').innerText = d.sk;
        document.getElementById('t-center-btn').innerText = d.c;
        document.getElementById('t-chat-title').innerText = d.chat;
        document.getElementById('chat-input').placeholder = d.placeholder;
        for(let j=0; j<6; j++) document.getElementById('m'+(j+1)).innerText = d.m[j];

        const fBox = document.getElementById('faq-box');
        fBox.innerHTML = faqKeys.map((key, i) => `<div class="faq-q">${i+1}. [${l.toUpperCase()}] ${key}?</div><div class="faq-a">Verified protocol for ${key} is active.</div>`).join('');
        
        document.getElementById('chat-box').innerHTML = `<div class="msg ai">${d.greet}</div>`;
    }

    function askAI() {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        const b = document.getElementById('chat-box');
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;

        b.innerHTML += `<div class="msg user">${i.value}</div>`;
        const val = i.value; i.value = '';

        setTimeout(() => {
            let r = `[${l.toUpperCase()}] Data processed.`;
            if(val.includes("우승") || val.toLowerCase().includes("win")) r = d.win;
            b.innerHTML += `<div class="msg ai">${r}</div>`;
            b.scrollTop = b.scrollHeight;
        }, 500);
    }

    function startLiveEngine() {
        let pi = 412.3149; let supply = 6280000.5042;
        setInterval(() => {
            pi += (Math.random() * 0.0002 - 0.0001);
            supply += (Math.random() * 0.0001);
            document.getElementById('l-pi').innerText = pi.toFixed(4);
            document.getElementById('l-supply').innerText = supply.toFixed(4);
        }, 1500);
    }

    function toggleFaq() {
        const f = document.getElementById('faq-box');
        f.style.display = (f.style.display === 'block') ? 'none' : 'block';
    }

    function toggleChat() {
        const w = document.getElementById('chat-window');
        w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
    }

    function PiSDK(cmd) { alert(`[HKWB SDK] Running ${cmd}...`); }

    window.onload = () => {
        const s = document.getElementById('langSelect');
        languages.forEach(l => { const o = document.createElement('option'); o.value=l.c; o.innerText=l.n; s.appendChild(o); });
        translateUI();
        startLiveEngine();
    };
</script>
</body>
</html>
