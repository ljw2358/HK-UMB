<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --bg-black: #000; --hk-gold: #ffcc00; --hk-green: #00ff88;
            --hk-blue: #00ccff; --hk-pink: #ff4d6d; --card-bg: #151515;
        }
        body { margin: 0; padding: 0; background: var(--bg-black); color: #fff; font-family: sans-serif; }
        .wrapper { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 120px; }

        /* 헤더 & 로고 */
        .top-nav { display: flex; justify-content: flex-end; padding: 15px; }
        .lang-sel { background: #111; color: var(--hk-gold); border: 1px solid #333; padding: 5px 12px; border-radius: 8px; font-size: 13px; }
        .brand { text-align: center; padding: 25px 0; }
        .brand h1 { color: var(--hk-gold); font-size: 32px; font-weight: 900; margin: 0; letter-spacing: 2px; }

        /* 메인 자산 카드 */
        .asset-card {
            background: linear-gradient(145deg, #1c1c1c, #111); margin: 0 20px 20px;
            border-radius: 40px; padding: 40px 20px; text-align: center; border: 1px solid #2a2a2a;
        }
        .pi-val { font-size: 52px; font-weight: bold; margin: 10px 0; }
        .gcv-badge { color: var(--hk-green); border: 1.5px solid var(--hk-green); padding: 7px 20px; border-radius: 25px; font-size: 15px; font-weight: bold; }

        /* 수익률 섹션 (형님 최신 수치 반영) */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 20px; }
        .s-box { background: #121212; border: 1.5px solid #222; border-radius: 25px; padding: 20px; text-align: center; }
        .s-label { font-size: 13px; color: var(--hk-green); margin-bottom: 8px; }
        .s-val { font-size: 19px; font-weight: bold; }

        /* 버튼 및 메뉴 */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 0 20px 25px; }
        .btn { padding: 18px 0; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 0 20px 25px; }
        .menu-item { background: #181818; border-radius: 20px; padding: 22px 0; text-align: center; border: 1px solid #252525; }

        /* 보안 섹션 */
        .shield { background: #0a0a0a; margin: 0 20px 25px; border-radius: 25px; padding: 25px; border-left: 5px solid var(--hk-blue); }

        /* FAQ 챗봇 시스템 */
        .support-bar { background: var(--hk-pink); margin: 0 20px; border-radius: 35px; padding: 18px; text-align: center; font-weight: 900; cursor: pointer; }
        #chatbot {
            display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; height: 450px; background: #1a1a1a;
            border: 2px solid var(--hk-pink); border-radius: 25px; flex-direction: column; z-index: 10000;
        }
        .chat-h { background: var(--hk-pink); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 14px; }
        .m { padding: 10px 15px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .bot { background: #333; align-self: flex-start; }
        .user { background: var(--hk-gold); color: #000; align-self: flex-end; font-weight: bold; }
        .chat-f { display: flex; padding: 15px; background: #222; gap: 10px; }
        .chat-f input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; }

        /* 하단 바 */
        .sns-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #f00; display: flex; justify-content: space-around; padding: 15px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav"><div class="lang-sel">한국어 🇰🇷</div></div>
    <div class="brand"><h1>HK WORLD BANK</h1></div>

    <div class="asset-card">
        <div style="color:var(--hk-gold); font-weight:bold;">메인 자산 통합 원장</div>
        <div class="pi-val">400.0212 <span style="font-size:20px; color:var(--hk-gold)">Pi</span></div>
        <div class="gcv-badge">Value: $ 125,663,600 (GCV)</div>
    </div>

    <div class="stats">
        <div class="s-box">
            <div class="s-label">예치 이율</div>
            <div class="s-val">12% ~ 20%</div>
        </div>
        <div class="s-box">
            <div class="s-label">유동성 수익</div>
            <div class="s-val">12% ~ 45%</div>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn" style="background:#fff" onclick="goPay()">PI 수량</button>
        <button class="btn" style="background:var(--hk-gold)">DEX 스왑</button>
        <button class="btn" style="background:var(--hk-green)">LP 공급</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item">✈️<br><small>송금</small></div>
        <div class="menu-item">🛒<br><small>결제</small></div>
        <div class="menu-item">🏦<br><small>예치</small></div>
    </div>

    <div class="shield">
        <b style="color:var(--hk-blue)">🛡️ HK 양자 방패 가동 중</b>
        <div style="font-size:12px; color:#777; margin-top:10px;">| V23 보안 | 메인넷 연동 | AI 보호 |</div>
    </div>

    <div class="support-bar" onclick="openBot()">글로벌 AI 고객지원센터 가동</div>

    <div id="chatbot">
        <div class="chat-h">HK AI CENTER <span onclick="openBot()" style="cursor:pointer">X</span></div>
        <div id="chat-view">
            <div class="m bot">안녕하십니까, 혜공 형님. HK WORLD BANK 전담 AI입니다.</div>
        </div>
        <div class="chat-f">
            <input type="text" id="chat-in" placeholder="질문하세요...">
            <button onclick="ask()" style="background:var(--hk-pink); border:none; color:#fff; padding:10px; border-radius:10px;">전송</button>
        </div>
    </div>

    <div class="sns-bar"><b>▶ YouTube</b><b>♪ TikTok</b></div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    function openBot() {
        const c = document.getElementById('chatbot');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    function ask() {
        const i = document.getElementById('chat-in');
        const v = document.getElementById('chat-view');
        if(!i.value) return;
        v.innerHTML += `<div class="m user">${i.value}</div>`;
        let a = "전문 상담원에게 문의 내용을 전달하겠습니다.";
        const q = i.value;
        if(q.includes("예치") || q.includes("이율")) a = "예치 이율은 연 12%에서 최대 20%까지 적용됩니다.";
        if(q.includes("유동성") || q.includes("풀")) a = "유동성 풀 수익률은 연 12%에서 최대 45% 사이로 운용됩니다.";
        if(q.includes("보안") || q.includes("방패")) a = "HK 양자 방패 V23이 실시간으로 자산을 감시하고 있습니다.";
        
        setTimeout(() => {
            v.innerHTML += `<div class="m bot">${a}</div>`;
            v.scrollTop = v.scrollHeight;
        }, 500);
        i.value = "";
    }

    async function goPay() {
        try {
            await Pi.authenticate(['payments'], (p) => console.log(p));
            Pi.createPayment({ amount: 3.14, memo: "HK Deposit" }, {
                onReadyForServerApproval: (id) => alert("승인 대기: " + id),
                onReadyForServerCompletion: (id, tx) => alert("결제 완료! TXID: " + tx),
                onError: (e) => alert(e.message)
            });
        } catch(e) { alert("파이 브라우저에서 실행하세요."); }
    }
</script>
</body>
</html>
