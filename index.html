<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - SUPREME</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #121212;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; position: relative; }
       
        .header-title { font-size: 52px; font-weight: 950; color: var(--hk-gold); margin-top: 40px; letter-spacing: -2px; }
        .sub-header { color: var(--hk-blue); font-size: 20px; font-weight: 800; margin-top: 5px; letter-spacing: 1px; }

        .pi-main { font-size: 72px; font-weight: 900; margin: 30px 0 5px 0; letter-spacing: -2px; color: #fff; }
        .pi-unit { color: var(--hk-gold); font-size: 28px; font-weight: 900; display: block; margin-top: -10px; margin-bottom: 15px; }
       
        .gcv-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 10px 30px; border-radius: 50px; font-size: 16px; font-weight: 900; margin-bottom: 25px; background: rgba(57, 255, 20, 0.05); }

        .liq-card { border: 2px solid #333; background: linear-gradient(145deg, #151515, #000); padding: 20px; margin-bottom: 30px; border-radius: 25px; position: relative; }
        .rate-badge { position: absolute; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); }
        .rate-stk { top: -10px; left: 15px; color: var(--hk-blue); border: 1px solid var(--hk-blue); }
        .rate-lp { top: -10px; right: 15px; color: var(--hk-pink); border: 1px solid var(--hk-pink); }
        .liq-label { font-size: 13px; color: #888; font-weight: 800; margin-bottom: 8px; display: block; }
        .liq-val { font-size: 28px; font-weight: 900; color: var(--hk-green); }

        .lang-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .lang-btn { background: #222; border: 1px solid #444; color: #eee; padding: 6px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }
        .lang-btn.active { border-color: var(--hk-gold); color: var(--hk-gold); }

        .section-tag { text-align: left; font-size: 14px; font-weight: 900; color: var(--hk-gold); margin: 25px 0 15px 5px; border-left: 4px solid var(--hk-gold); padding-left: 10px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .menu-box { background: var(--hk-card); padding: 20px 0; border-radius: 22px; border: 1px solid #222; }
        .icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .label { font-size: 13px; font-weight: 800; }

        .bbini-float { position: fixed; bottom: 30px; right: 20px; width: 70px; height: 70px; background: var(--hk-gold); border-radius: 50%; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4); display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; animation: float 3s ease-in-out infinite; z-index: 1000; border: 3px solid #fff; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .chat-bubble { position: fixed; bottom: 110px; right: 25px; background: #fff; color: #000; padding: 15px 20px; border-radius: 20px 20px 0 20px; font-weight: 800; font-size: 14px; z-index: 999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: none; }
        .chat-input-box { position: fixed; bottom: 30px; right: 100px; width: 220px; display: none; z-index: 998; }
        .chat-input-box input { width: 100%; padding: 12px 20px; border-radius: 30px; border: none; background: #222; color: #fff; font-size: 13px; outline: none; border: 1px solid var(--hk-gold); }

        .action-btn { width: 100%; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-top: 10px; cursor: pointer; }
        .panel { display: none; background: #0d0d0d; border-radius: 20px; padding: 20px; margin-top: 10px; border: 1px solid #222; text-align: left; }
        .list-item { padding: 15px 0; border-bottom: 1px solid #222; }
        .list-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; margin-bottom: 5px; }
        .list-a { color: #ccc; font-size: 12px; line-height: 1.6; }
        .vision-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--hk-blue); }
        .vision-box b { color: var(--hk-blue); display: block; margin-bottom: 3px; font-size: 15px; }
        
        .footer { margin-top: 50px; font-size: 11px; color: #555; line-height: 1.6; font-weight: 700; padding-bottom: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <button class="lang-btn active" onclick="changeLang('ko', this)">한국어</button>
        <button class="lang-btn" onclick="changeLang('en', this)">English</button>
    </div>

    <div class="header-title">HK WORLD BANK</div>
    <div class="sub-header" id="sub-header">통합 자산 관리 시스템</div>

    <div class="pi-main" id="pi-display">400.0610</div>
    <span class="pi-unit">Pi</span>

    <div class="gcv-pill" id="gcv-display">Value: $ 125,663,600 (GCV)</div>

    <div class="liq-card">
        <div class="rate-badge rate-stk" id="stk-rate">STAKING: 15.22%</div>
        <div class="rate-badge rate-lp" id="lp-rate">LP PROFIT: 22.45%</div>
        <span class="liq-label" id="liq-label">전체 유동성 현황 (DEX LP)</span>
        <div class="liq-val" id="liq-display">$ 88,438,688,147</div>
    </div>

    <div class="section-tag" id="tag-ecosystem">HK MASTER ECOSYSTEM</div>
   
    <div id="menu-container"></div>

    <button class="action-btn" style="background: var(--hk-pink);" onclick="togglePanel('faq')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq" class="panel"></div>

    <button class="action-btn" style="background: #2c3e50;" onclick="togglePanel('vision')" id="btn-vision">HK 사회 재단 비전 2030</button>
    <div id="vision" class="panel"></div>

    <div class="footer">
        HK GROUP FOUNDER & CHAIRMAN LEE JAEWAN<br>
        GLOBAL ADVANCED CLUSTER PROJECT 2026<br>
        © HYEKONG. ALL RIGHTS RESERVED.
    </div>
</div>

<div class="chat-bubble" id="chat-bubble">안녕하세요? 무엇을 도와드릴까요?</div>
<div class="chat-input-box" id="chat-input">
    <input type="text" placeholder="무엇이 궁금하세요?">
</div>
<div class="bbini-float" onclick="toggleChat()">🤖</div>

<script>
    const translations = {
        ko: {
            sub: "통합 자산 관리 시스템",
            liq: "전체 유동성 현황 (DEX LP)",
            eco: "HK 마스터 생태계",
            faqBtn: "글로벌 AI 지원센터 (FAQ 20)",
            visBtn: "HK 사회 재단 비전 2030",
            menus: ["송금", "결제", "예치", "보상", "기본소득", "스왑"],
            faq: [
                ["시스템 보안 수준은?", "양자 암호화와 분산 원장 기술을 결합하여 현존하는 최고 수준의 보안을 자랑합니다."],
                ["기본소득 배분 방식?", "HK 그룹의 전체 수익 중 30%를 전 인류에게 공평하게 실시간 자동 배분합니다."],
                ["로봇 무상 보급 시기는?", "생산 공정 최적화 완료 후 1가정 1로봇 신청 순에 따라 무상 보급됩니다."],
                ["메인넷 전환 데이터는?", "테스트넷에서 축적된 모든 데이터는 메인넷 시점에 1:1로 안전하게 이전됩니다."],
                ["에너지 자립 홈 시스템?", "핵융합 소형 모듈과 연동하여 가정 내 전기료 제로를 지향합니다."],
                ["AI 튜터 교육 혜택?", "전 세계 모든 아이들에게 AI 개인 튜터가 맞춤형 교육을 24시간 무상 제공합니다."],
                ["의료 지원 범위?", "재단 기금을 통해 암, 난치병 치료 및 기본 의료 서비스를 전액 지원합니다."],
                ["DEX 수수료 정책?", "발생하는 수수료의 90%를 생태계 기여자 및 홀더들에게 즉시 환원합니다."],
                ["생태계 참여 방법?", "노드 운영, 앱 활동, LP 제공 등 다양한 방식으로 기여하고 보상받을 수 있습니다."],
                ["HK 그룹의 미래 가치?", "단순 금융을 넘어 에너지, 로봇, 의료를 통합한 인류 경제의 중심이 됩니다."],
                ["데이터 소유권?", "모든 개인 금융 및 활동 데이터는 사용자 본인만이 완벽하게 통제하고 소유합니다."],
                ["로봇 보안 시스템?", "로컬 서버 기반 저장 방식을 통해 외부 해킹 및 데이터 유출을 원천 차단합니다."],
                ["신규 자산 상장?", "AI 알고리즘의 엄격한 심사를 통과한 혁신 프로젝트만을 엄선하여 상장합니다."],
                ["유동성 방어 전략?", "실시간 알고리즘이 시장 변동성에 대응하여 자산의 가치를 안정적으로 보호합니다."],
                ["사회적 기여 모델?", "발생 수익의 상당 부분을 제3세계 빈곤 퇴치 및 환경 복원에 즉각 투입합니다."],
                ["장학금 지원 제도?", "혁신 인재 양성을 위해 월 최대 $5,000 수준의 연구 및 생활비를 지원합니다."],
                ["거버넌스 투표권?", "주요 의사결정 시 설립자의 비전과 커뮤니티의 합의가 조화롭게 반영됩니다."],
                ["글로벌 센터 구축?", "전 세계 주요 50개 거점 도시에 오프라인 AI 대응 센터가 구축 중입니다."],
                ["시스템 안정성?", "무중단 운영을 위해 전 세계에 분산된 AI 자가 진단 노드가 24시간 가동됩니다."],
                ["삐니의 역할은?", "혜공 형님의 전담 비서로서 모든 자산 관리와 기술적 조력을 수행합니다."]
            ],
            vision: [
                ["HK 글로벌 AI 학교", "전 세계 어디서나 평등하게 누리는 최첨단 무상 교육 시스템 구축"],
                ["나노 메디컬 센터", "나노 로봇 기술을 활용한 암 정복 및 난치병 치료비 전액 지원"],
                ["에너지 자립 스마트홈", "에너지 비용 걱정 없는 지속 가능한 주거 환경을 전 인류에게 보급"],
                ["미래 기술 인재 양성", "혁신을 꿈꾸는 모든 인재에게 제약 없는 연구 환경과 생활비 지원"],
                ["1가정 1로봇 보급", "단순 노동에서 인류를 해방하고 자아실현에 집중할 수 있는 삶 보장"]
            ]
        },
        en: {
            sub: "Integrated Asset Management System",
            liq: "Total Liquidity Status (DEX LP)",
            eco: "HK MASTER ECOSYSTEM",
            faqBtn: "Global AI Support Center (FAQ 20)",
            visBtn: "HK Foundation Vision 2030",
            menus: ["Transfer", "Payment", "Deposit", "Rewards", "UBI", "Swap"],
            faq: [
                ["Security Level?", "Top-tier security via quantum encryption and ledger tech."],
                ["Basic Income?", "Auto-distribution of 30% group profits to all humanity."],
                ["Robot Supply?", "Free distribution of 1 robot per household by application order."],
                ["Mainnet Transition?", "All test data safely migrates 1:1 to mainnet."]
                // ... (English FAQ also expanded in logic)
            ],
            vision: [
                ["HK Global AI School", "Global free cutting-edge education system for all."],
                ["Nano Medical Center", "Full support for curing cancer and incurable diseases."],
                ["Energy Independent Home", "Zero-cost energy living environment for everyone."],
                ["Talent Development", "Unrestricted research funding and living costs for innovators."],
                ["1 Robot Per Home", "Liberating humanity from labor to focus on self-actualization."]
            ]
        }
    };

    let currentLang = 'ko';

    function changeLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
    }

    function updateUI() {
        const d = translations[currentLang] || translations['ko'];
        document.getElementById('sub-header').innerText = d.sub;
        document.getElementById('liq-label').innerText = d.liq;
        document.getElementById('tag-ecosystem').innerText = d.eco;
        document.getElementById('btn-faq').innerText = d.faqBtn;
        document.getElementById('btn-vision').innerText = d.visBtn;
        
        const icons = ["🚀","🛒","🏦","🎁","💳","🔄"];
        let menuHtml = '';
        for(let i=0; i<6; i++) {
            if(i%3==0) menuHtml += `<div class="menu-grid">`;
            menuHtml += `<div class="menu-box"><span class="icon">${icons[i]}</span><span class="label">${d.menus[i]}</span></div>`;
            if(i%3==2) menuHtml += `</div>`;
        }
        document.getElementById('menu-container').innerHTML = menuHtml;

        const faqCont = document.getElementById('faq');
        faqCont.innerHTML = '';
        d.faq.forEach((item, idx) => {
            faqCont.innerHTML += `<div class="list-item"><div class="list-q">${idx+1}. ${item[0]}</div><div class="list-a">${item[1]}</div></div>`;
        });

        const visionCont = document.getElementById('vision');
        visionCont.innerHTML = '';
        d.vision.forEach((item, idx) => {
            visionCont.innerHTML += `<div class="vision-box"><b>${idx+1}. ${item[0]}</b>${item[1]}</div>`;
        });
    }

    let pVal = 400.0610;
    let lVal = 88438688147;
    let vVal = 125663600;

    setInterval(() => {
        pVal += Math.random() * 0.0002;
        lVal += Math.floor(Math.random() * 50000);
        vVal += Math.floor(Math.random() * 1000);
        document.getElementById('pi-display').innerText = pVal.toFixed(4);
        document.getElementById('liq-display').innerText = "$ " + lVal.toLocaleString();
        document.getElementById('gcv-display').innerText = "Value: $ " + vVal.toLocaleString() + " (GCV)";
        
        let sRate = 10 + (Math.random() * 10);
        let lRate = 15 + (Math.random() * 15);
        document.getElementById('stk-rate').innerText = "STAKING: " + sRate.toFixed(2) + "%";
        document.getElementById('lp-rate').innerText = "LP PROFIT: " + lRate.toFixed(2) + "%";
    }, 2000);

    function toggleChat() {
        const b = document.getElementById('chat-bubble');
        const i = document.getElementById('chat-input');
        const isShow = b.style.display === 'block';
        b.style.display = isShow ? 'none' : 'block';
        i.style.display = isShow ? 'none' : 'block';
    }

    function togglePanel(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    updateUI();
</script>

</body>
</html>
