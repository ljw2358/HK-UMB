
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SK World Bank & Windasan Integrated Ledger</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --safe-green: #10b981;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 네모나게, 기존보다 더 작게 디자인된 컨테이너 */
        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 4px; /* 더 각진 네모 형태 */
            padding: 12px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { border-color: var(--accent); }
        .label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
        .value { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        
        /* 상단 타이틀 섹션 */
        .header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .header h1 { margin: 0; font-size: 1.4rem; }

        /* 상태바: 양자방패 */
        .status-bar {
            width: 100%;
            max-width: 800px;
            background: #064e3b;
            color: var(--safe-green);
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 20px;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid var(--safe-green);
        }

        /* 챗봇 & FAQ 섹션 */
        .support-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 800px;
            margin-top: 15px;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        button {
            background: #334155;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 2px;
        }
        
        /* 알림 팝업 (중요 5건 전송용) */
        #alert-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ef4444;
            padding: 15px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>SK World Bank & Windasan</h1>
        <small>통합 관리 시스템</small>
    </div>
    <div id="clock" style="font-size: 0.8rem;"></div>
</div>

<div class="container">
    <div class="card">
        <div class="label">무성검 결제 총액</div>
        <div class="value" id="val-payment">0</div>
    </div>
    <div class="card">
        <div class="label">총 예치 잔액</div>
        <div class="value" id="val-deposit">0</div>
    </div>
    <div class="card">
        <div class="label">누적 보상액</div>
        <div class="value" id="val-reward">0</div>
    </div>
    <div class="card">
        <div class="label">기본소득 지급현황</div>
        <div class="value" id="val-ubi">0</div>
    </div>

    <div class="card">
        <div class="label">유동성 풀 (LP)</div>
        <div class="value" id="val-lp">0</div>
        <div class="btn-group">
            <button onclick="testLP()">Test 파일 실행</button>
        </div>
    </div>
    <div class="card">
        <div class="label">스테이킹 이율 (APR)</div>
        <div class="value">15% ~ 50%</div>
        <div class="btn-group">
            <button onclick="adjustRate()">이율 변동</button>
        </div>
    </div>
    <div class="card">
        <div class="label">파이(Pi) 수량</div>
        <div class="value" id="val-pi">0</div>
    </div>
    <div class="card">
        <div class="label">스왑 실시간 볼륨</div>
        <div class="value" id="val-swap">0</div>
    </div>
</div>

<div class="container" style="margin-top:10px;">
    <div class="card">
        <div class="label">Global Support</div>
        <div class="btn-group">
            <button>유튜브</button><button>틱톡</button>
        </div>
    </div>
    <div class="card" id="faq-section">
        <div class="label">FAQ / Chatbot</div>
        <div id="faq-count" style="font-size: 0.7rem;">처리중: 0건</div>
        <div class="btn-group">
            <button onclick="simulateFAQ()">문의 유입</button>
        </div>
    </div>
</div>

<div class="status-bar" id="quantum-shield">
    🛡️ 양자방패(Quantum Shield) 가동 중 - 시스템 보안 레벨 최고 단계
</div>

<div id="alert-box">
    <strong>⚠️ 형님, 중요 문의 5건 도달!</strong><br>
    즉시 확인이 필요합니다.
</div>

<script>
    /* 숫자 변환 로직: 만, 억 단위 자동 처리 */
    function formatNumber(num) {
        if (num >= 100000000) {
            return (num / 100000000).toFixed(2) + ' 억';
        } else if (num >= 10000) {
            return (num / 10000).toFixed(1) + ' 만';
        }
        return num.toLocaleString();
    }

    /* 초기 데이터 세팅 */
    let data = {
        payment: 55000000,
        deposit: 1200000000,
        reward: 8500000,
        ubi: 3200000,
        lp: 150000,
        pi: 990000,
        swap: 4500000
    };

    function updateDisplay() {
        document.getElementById('val-payment').innerText = formatNumber(data.payment);
        document.getElementById('val-deposit').innerText = formatNumber(data.deposit);
        document.getElementById('val-reward').innerText = formatNumber(data.reward);
        document.getElementById('val-ubi').innerText = formatNumber(data.ubi);
        document.getElementById('val-lp').innerText = formatNumber(data.lp);
        document.getElementById('val-pi').innerText = formatNumber(data.pi);
        document.getElementById('val-swap').innerText = formatNumber(data.swap);
    }

    /* LP 테스트 파일 시뮬레이션 */
    function testLP() {
        console.log("LP Test File Loading...");
        data.lp += 5000;
        updateDisplay();
        alert("LP 유동성 풀 테스트 완료: 수량 업데이트됨");
    }

    /* FAQ 및 챗봇 로직 (5개 쌓이면 형님께 알림) */
    let faqQueue = 0;
    function simulateFAQ() {
        faqQueue++;
        document.getElementById('faq-count').innerText = `처리중: ${faqQueue}건`;
        
        if (faqQueue >= 5) {
            const alertBox = document.getElementById('alert-box');
            alertBox.style.display = 'block';
            console.log("중요 문의 5건 - 형님께 리포트 전송됨");
            setTimeout(() => { alertBox.style.display = 'none'; faqQueue = 0; }, 5000);
        }
    }

    /* 시계 및 기초 세팅 */
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleString();
    }, 1000);

    // 초기 실행
    updateDisplay();
</script>

</body>
</html>
