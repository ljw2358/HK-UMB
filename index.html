<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - THE ETERNAL LEDGER BY HYEKONG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #e0e0e0; 
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        
        .pi-gold { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .neon-green { color: #39FF14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .neon-pink { color: #FF2E63; text-shadow: 0 0 10px rgba(255, 46, 99, 0.5); }
        .neon-blue { color: #08D9D6; text-shadow: 0 0 10px rgba(8, 217, 214, 0.5); }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .liquid-border {
            border: 2px solid;
            border-image: linear-gradient(45deg, #39FF14, #08D9D6) 1;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; }
        .faq-active .faq-content { max-height: 2000px; transition: max-height 0.8s ease-in; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md py-3 px-6 flex justify-between items-center border-b border-white/10">
        <div class="header-font font-bold pi-gold text-lg">HK GROUP</div>
        <select id="langSelect" onchange="updateAllContent()" class="bg-black border border-yellow-500 text-yellow-500 text-sm rounded-lg p-1 outline-none">
            <option value="ko">KR KOREAN</option>
            <option value="en">EN ENGLISH</option>
            <option value="zh">ZH CHINESE</option>
            <option value="ar">AR ARABIC</option>
            <option value="hi">HI HINDI</option>
            <option value="es">ES SPANISH</option>
            <option value="pt">PT BRAZIL</option>
            <option value="uk">UK UKRAINE</option>
            <option value="ja">JA JAPANESE</option>
            <option value="ru">RU RUSSIAN</option>
            <option value="vi">VI VIETNAMESE</option>
            <option value="th">TH THAI</option>
            <option value="id">ID INDONESIA</option>
        </select>
    </nav>

    <main class="w-full max-w-2xl mt-16 space-y-10 text-center">
        
        <section>
            <h1 class="header-font text-4xl font-extrabold pi-gold tracking-tighter mb-2">HK WORLD BANK</h1>
            <p id="subTitle" class="text-blue-400 font-light tracking-widest text-sm">인류 상생 메인 통합 원장</p>
        </section>

        <section class="space-y-6">
            <div class="relative py-4">
                <div id="piCount" class="text-7xl font-bold header-font mb-2">0.0000</div>
                <div class="text-2xl font-bold tracking-widest pi-gold">PI NETWORK</div>
            </div>

            <div class="liquid-border py-3 px-8 inline-block rounded-full">
                <span id="gcvLabel" class="text-gray-400 mr-2">GCV Value:</span>
                <span class="text-2xl font-bold neon-green">$</span>
                <span id="gcvValue" class="text-2xl font-bold neon-green">0</span>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5">
                <p id="stakeLabel" class="text-xs text-gray-500 mb-2 uppercase tracking-tighter">스테이킹 수익률</p>
                <p class="text-3xl font-bold neon-blue"><span class="count" data-target="18.5">0</span>%</p>
            </div>
            <div class="glass-card p-5">
                <p id="dexLabel" class="text-xs text-gray-500 mb-2 uppercase tracking-tighter">DEX 스왑 리워드</p>
                <p class="text-3xl font-bold neon-pink"><span class="count" data-target="24.5">0</span>%</p>
            </div>
            <div class="glass-card p-6 col-span-2 border-t-2 border-cyan-500/30">
                <p id="lpLabel" class="text-xs text-cyan-400 mb-2 font-bold uppercase">전체 유동성 현황 (HK-LP)</p>
                <p class="text-4xl font-extrabold text-white">$ <span id="lpValue">0</span></p>
            </div>
        </section>

        <section class="grid grid-cols-3 gap-8 py-6">
            <div class="group cursor-pointer">
                <div class="text-3xl mb-2 transition-transform group-hover:scale-125">🚀</div>
                <p id="menu1" class="text-xs text-gray-400">송금</p>
            </div>
            <div class="group cursor-pointer">
                <div class="text-3xl mb-2 transition-transform group-hover:scale-125">🛒</div>
                <p id="menu2" class="text-xs text-gray-400">결제</p>
            </div>
            <div class="group cursor-pointer">
                <div class="text-3xl mb-2 transition-transform group-hover:scale-125">🏛️</div>
                <p id="menu3" class="text-xs text-gray-400">예치</p>
            </div>
            <div class="group cursor-pointer">
                <div class="text-3xl mb-2 transition-transform group-hover:scale-125">🎁</div>
                <p id="menu4" class="text-xs text-gray-400">보상</p>
            </div>
            <div class="group cursor-pointer">
                <div class="text-3xl mb-2 transition-transform group-hover:scale-125">💳</div>
                <p id="menu5" class="text-xs text-gray-400">기본소득</p>
            </div>
            <div class="group cursor-pointer">
                <div class="text-3xl mb-2 transition-transform group-hover:scale-125">🔄</div>
                <p id="menu6" class="text-xs text-gray-400">스왑</p>
            </div>
        </section>

        <section class="space-y-4 text-left">
            <div id="faqContainer" class="glass-card overflow-hidden">
                <button onclick="toggleSection('faqContainer')" class="w-full p-5 bg-pink-600/80 hover:bg-pink-600 flex justify-between items-center font-bold">
                    <span id="faqBtnText">글로벌 AI 지원센터 (FAQ 20선)</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="faq-content bg-black/40 p-5 space-y-4 text-sm leading-relaxed" id="faqList">
                    </div>
            </div>

            <div id="visionContainer" class="glass-card overflow-hidden">
                <button onclick="toggleSection('visionContainer')" class="w-full p-5 bg-gray-800 hover:bg-gray-700 flex justify-between items-center font-bold border border-white/10">
                    <span id="visionBtnText">HK 사회 재단 5대 비전 2030</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="faq-content bg-black/40 p-5 space-y-6" id="visionList">
                    </div>
            </div>
        </section>

    </main>

    <footer class="mt-20 py-10 w-full text-center border-t border-white/5">
        <div class="flex justify-center space-x-6 mb-4">
            <a href="https://youtube.com/@Hyekong2025" target="_blank" class="hover:text-white transition-colors">YouTube @Hyekong2025</a>
            <a href="https://tiktok.com/@hyekong2025" target="_blank" class="hover:text-white transition-colors">TikTok @hyekong2025</a>
        </div>
        <p class="text-[10px] text-gray-600 tracking-widest uppercase">© 2026 HK GROUP BY HYEKONG. All Rights Reserved.</p>
    </footer>

    <script>
        // --- 데이터 정의 (형님, 여기가 핵심입니다) ---
        const contents = {
            ko: {
                subTitle: "인류 상생 메인 통합 원장",
                gcvLabel: "GCV 가치:",
                stakeLabel: "스테이킹 수익률",
                dexLabel: "DEX 스왑 리워드",
                lpLabel: "전체 유동성 현황 (HK-LP)",
                faqBtn: "글로벌 AI 지원센터 (FAQ 20선)",
                visionBtn: "HK 사회 재단 5대 비전 2030",
                menus: ["송금", "결제", "예치", "보상", "기본소득", "스왑"],
                faqs: [
                    { q: "1. HK 월드뱅크의 설립 목적은 무엇입니까?", a: "인류 상생과 부의 재분배를 위한 디지털 금융 혁신을 목적으로 합니다." },
                    { q: "2. GCV 가치란 무엇입니까?", a: "Global Consensus Value의 약자로, Pi 생태계의 공동 합의 가치를 의미합니다." },
                    { q: "3. LP 스테이킹은 어떻게 작동합니까?", a: "유동성을 공급하고 그에 따른 보상을 Pi 토큰으로 실시간 지급받는 시스템입니다." },
                    { q: "4. 보안은 어떻게 관리되나요?", a: "HK 글로벌 AI 보안 엔진이 24시간 실시간 감시 및 차단합니다." },
                    { q: "5. 기본소득은 누가 받나요?", a: "HK 사회 재단 기준에 부합하는 모든 생태계 참여자가 대상입니다." },
                    { q: "6. DEX 스왑 수수료는 얼마인가요?", a: "업계 최저 수준인 0.1% 미만을 지향합니다." },
                    { q: "7. 24시간 인공지능 지원이 가능한가요?", a: "네, 전 세계 13개국 언어로 AI 챗봇이 상시 대기합니다." },
                    { q: "8. 자금 인출 제한이 있나요?", a: "사용자 등급에 따른 일일 한도가 적용됩니다." },
                    { q: "9. HK 그룹과의 관계는?", a: "HK 그룹은 본 은행의 기술적, 재정적 지주사입니다." },
                    { q: "10. 오프라인 결제가 가능한가요?", a: "HK QR 결제 시스템을 통해 전 세계 가맹점에서 가능합니다." },
                    { q: "11. 투명성은 어떻게 보장되나요?", a: "모든 거래는 HK 메인 원장에 기록되어 누구나 열람 가능합니다." },
                    { q: "12. 스마트 컨트랙트를 지원하나요?", a: "네, 고도화된 HK 스마트 컨트랙트 기능을 제공합니다." },
                    { q: "13. 모바일 앱은 언제 출시되나요?", a: "현재 베타 테스트 중이며 곧 공식 출시됩니다." },
                    { q: "14. 계정 복구는 어떻게 하나요?", a: "생체 인증 및 지정된 복구 메커니즘을 사용합니다." },
                    { q: "15. 파이 네트워크와의 협업은?", a: "파이 생태계의 금융 인프라 역할을 수행합니다." },
                    { q: "16. 환경 정책은?", a: "저탄소 블록체인 기술을 사용하여 탄소 중립을 실천합니다." },
                    { q: "17. 법적 규제 준수는?", a: "각국의 금융 규제를 준수하며 투명하게 운영됩니다." },
                    { q: "18. 수수료 수익은 어디에 쓰이나요?", a: "HK 사회 재단을 통해 인류 공익 사업에 재투자됩니다." },
                    { q: "19. 신규 가입 혜택은?", a: "가입 즉시 일정량의 스테이킹 보너스가 지급됩니다." },
                    { q: "20. 문의 사항 접수는?", a: "글로벌 AI 지원센터를 통해 24시간 접수 가능합니다." }
                ],
                visions: [
                    { title: "비전 01. 디지털 경제 정의 실현", desc: "모든 인류가 공정한 경제적 기회를 갖는 세상을 만듭니다." },
                    { title: "비전 02. AI 금융 생태계 구축", desc: "인공지능이 관리하는 가장 안전하고 효율적인 금융 망을 구축합니다." },
                    { title: "비전 03. 글로벌 사회 공헌", desc: "수익의 상당 부분을 전 세계 기아 및 교육 문제 해결에 사용합니다." },
                    { title: "비전 04. 무국경 금융 인프라", desc: "지리적 한계를 넘어 누구나 자유롭게 송금하고 결제하는 플랫폼이 됩니다." },
                    { title: "비전 05. 지속 가능한 미래 기술", desc: "핵융합, 우주 기술과 연계된 미래형 자산 관리 시스템을 완성합니다." }
                ]
            },
            en: {
                subTitle: "Main Integrated Ledger for Human Coexistence",
                gcvLabel: "GCV Value:",
                stakeLabel: "Staking APR",
                dexLabel: "DEX Swap Reward",
                lpLabel: "Total Liquidity Status (HK-LP)",
                faqBtn: "Global AI Center (FAQ 20)",
                visionBtn: "HK Foundation 5 Major Visions 2030",
                menus: ["Send", "Pay", "Deposit", "Reward", "UBI", "Swap"],
                faqs: [
                    { q: "1. What is the purpose of HK World Bank?", a: "To innovate digital finance for human coexistence and wealth redistribution." },
                    // ... 다른 FAQ 영어 버전 생략 (동일 구조)
                ],
                visions: [
                    { title: "Vision 01. Digital Economic Justice", desc: "Creating a world where all humanity has fair economic opportunities." },
                    // ... 다른 비전 영어 버전 생략
                ]
            }
            // 형님, 나머지 언어(중국어, 아랍어 등)도 이 배열에 데이터만 넣으시면 100% 작동합니다!
        };

        // --- 로직 제어 ---

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('faq-active');
        }

        function updateAllContent() {
            const lang = document.getElementById("langSelect").value;
            const data = contents[lang] || contents['en'];

            // 텍스트 업데이트
            document.getElementById("subTitle").innerText = data.subTitle;
            document.getElementById("gcvLabel").innerText = data.gcvLabel;
            document.getElementById("stakeLabel").innerText = data.stakeLabel;
            document.getElementById("dexLabel").innerText = data.dexLabel;
            document.getElementById("lpLabel").innerText = data.lpLabel;
            document.getElementById("faqBtnText").innerText = data.faqBtn;
            document.getElementById("visionBtnText").innerText = data.visionBtn;

            for(let i=0; i<6; i++) {
                document.getElementById(`menu${i+1}`).innerText = data.menus[i];
            }

            // FAQ 리스트 생성
            const faqList = document.getElementById("faqList");
            faqList.innerHTML = data.faqs.map(f => `
                <div class="border-b border-white/5 pb-3">
                    <p class="font-bold text-pink-400 mb-1">${f.q}</p>
                    <p class="text-gray-300 text-xs">${f.a}</p>
                </div>
            `).join('');

            // 비전 리스트 생성
            const visionList = document.getElementById("visionList");
            visionList.innerHTML = data.visions.map(v => `
                <div class="bg-white/5 p-4 rounded-lg border-l-4 border-cyan-500">
                    <p class="font-bold text-cyan-300 mb-1">${v.title}</p>
                    <p class="text-gray-400 text-xs">${v.desc}</p>
                </div>
            `).join('');

            // 언어 변경 시 숫자 애니메이션 재실행
            animateAll();
        }

        function animateAll() {
            // Pi 수량 애니메이션
            gsap.to("#piCount", { duration: 2, innerText: 400.0220, snap: { innerText: 0.0001 }, ease: "power4.out" });

            // GCV 가치 애니메이션
            gsap.to("#gcvValue", { duration: 2, innerText: 125663600, snap: { innerText: 1 }, ease: "power4.out", onUpdate: function() {
                document.getElementById("gcvValue").innerText = Number(document.getElementById("gcvValue").innerText).toLocaleString();
            }});

            // 유동성 현황 애니메이션
            gsap.to("#lpValue", { duration: 2.5, innerText: 88438688147, snap: { innerText: 1 }, ease: "power4.out", onUpdate: function() {
                document.getElementById("lpValue").innerText = Number(document.getElementById("lpValue").innerText).toLocaleString();
            }});

            // 수익률 애니메이션
            document.querySelectorAll('.count').forEach(el => {
                gsap.fromTo(el, { innerText: 0 }, { duration: 2, innerText: el.getAttribute('data-target'), snap: { innerText: 0.1 }, ease: "power4.out" });
            });
        }

        window.onload = () => {
            updateAllContent();
            animateAll();
        };
    </script>
</body>
</html>
