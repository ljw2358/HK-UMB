<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL LEDGER v3.1</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* 헤더 & 언어 선택 */
        .lang-selector { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .lang-btn { background: #222; color: #888; border: 1px solid #444; padding: 5px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; font-weight: 800; }
        .lang-btn.active { color: var(--hk-gold); border-color: var(--hk-gold); }

        .header-section { margin: 30px 0 30px 0; }
        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; }
        .sub-header { color: var(--hk-blue); font-size: 16px; margin-top: 10px; font-weight: 800; letter-spacing: 2px; }

        /* 메인 자산 (테스트 파이 실시간 연동 연출) */
        .pi-main { font-size: 62px; font-weight: 900; margin: 20px 0 10px 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); transition: all 0.3s; }
        .pi-main span { color: var(--hk-gold); font-size: 28px; margin-left: 8px; }
        .gcv-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 10px 35px; border-radius: 50px; font-size: 18px; font-weight: 900; margin-bottom: 30px; background: rgba(57, 255, 20, 0.05); }

        /* 실시간 지표 그리드 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .info-card { background: var(--hk-card); border: 1px solid #222; padding: 20px 10px; border-radius: 20px; }
        .info-label { font-size: 13px; color: #888; font-weight: 800; margin-bottom: 10px; display: block; }
        .info-val { font-size: 24px; font-weight: 900; color: #fff; }

        /* 유동성 공급 섹션 */
        .supply-section { background: linear-gradient(145deg, #0a0a0a, #111); padding: 25px; border-radius: 25px; margin: 15px 0; border: 1px solid #222; position: relative; overflow: hidden; }
        .supply-section::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--hk-blue), transparent 30%); animation: rotate 4s linear infinite; opacity: 0.1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .liq-card { border: 2.5px solid; border-image: linear-gradient(45deg, var(--hk-green), var(--hk-gold)) 1; background: rgba(255,255,255,0.03); padding: 30px 20px; margin: 20px 0 40px 0; }
        .section-label { font-size: 14px; color: #fff; font-weight: 900; margin-bottom: 15px; display: block; letter-spacing: 1px; }
        .section-val { font-size: 34px; font-weight: 900; }

        /* 버튼 및 메뉴 */
        .btn-group-label { text-align: left; font-size: 15px; font-weight: 900; margin: 30px 0 15px 5px; color: var(--hk-gold); }
        .top-btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .top-btn { padding: 22px 0; border-radius: 18px; font-weight: 900; color: #000; font-size: 15px; border: none; cursor: pointer; transition: 0.3s; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 45px; }
        .menu-item { background: #111; padding: 25px 0; border-radius: 24px; border: 1px solid #222; cursor: pointer; }
        .menu-text { font-size: 14px; font-weight: 800; color: #fff; display: block; margin-top: 10px; }

        /* 패널 섹션 */
        .big-btn { width: 100%; padding: 25px; border-radius: 22px; font-size: 20px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 16px; margin-bottom: 8px; line-height: 1.4; }
        .faq-a { color: #bbb; font-size: 14px; line-height: 1.7; }

        /* 삐니 챗봇 캐릭터 (상호작용성 강화) */
        .bbini-container { position: fixed; bottom: 35px; right: 30px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; }
        .bbini-bubble { background: #fff; color: #000; padding: 12px 18px; border-radius: 20px; border-bottom-right-radius: 2px; font-size: 13px; font-weight: 800; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none; max-width: 200px; line-height: 1.4; }
        .bbini { width: 85px; height: 85px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 4px solid #fff; animation: bounce 2s infinite; cursor: pointer; box-shadow: 0 0 30px rgba(255,0,255,0.4); font-size: 18px; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .footer-info { margin: 50px 0 100px 0; color: #444; font-weight: 900; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <div class="lang-btn active" onclick="changeLang('ko', this)">KOR</div>
        <div class="lang-btn" onclick="changeLang('en', this)">ENG</div>
    </div>

    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div class="sub-header" id="sub-header">메인자산통합원장</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill" id="gcv-val">Value: $ 125,663,600 (GCV)</div>

    <div class="info-grid">
        <div class="info-card">
            <span class="info-label" id="lbl-apr">스테이킹 이율 (APR)</span>
            <div class="info-val" id="rate-1" style="color: var(--hk-blue);">15.48%</div>
        </div>
        <div class="info-card">
            <span class="info-label" id="lbl-lp">유동성 수익 (LP)</span>
            <div class="info-val" id="rate-2" style="color: var(--hk-pink);">23.26%</div>
        </div>
    </div>

    <div class="supply-section">
        <span class="section-label" id="lbl-supply" style="color: var(--hk-blue);">HKWB 실시간 유동성 공급량</span>
        <div class="section-val" id="supply-val">6,280,000.5074</div>
    </div>

    <div class="liq-card">
        <span class="section-label" id="lbl-total-liq">전체 유동성 LP 공급 현황 (DEX)</span>
        <div class="section-val" id="liq-val" style="color: var(--hk-green);">$ 88,438,688,147</div>
    </div>

    <div class="btn-group-label" id="lbl-assets">MAIN ASSETS</div>
    <div class="top-btn-grid">
        <button class="top-btn" id="btn-pi" style="background: #E0D7FF;">PI 수량</button>
        <button class="top-btn" id="btn-dex" style="background: #FFD700;">DEX 스왑</button>
        <button class="top-btn" id="btn-lp" style="background: #39FF14;">LP 공급</button>
    </div>

    <div class="menu-grid" id="menu-grid">
        </div>

    <button class="big-btn" id="btn-faq" style="background: var(--hk-pink);" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ)</button>
    <div id="faq-panel" class="panel">
        <div id="faq-list"></div>
    </div>

    <div class="footer-info">
        HK GROUP GLOBAL HEADQUARTERS<br>
        SUPPORT@HKWB.WORLD
    </div>
</div>

<div class="bbini-container">
    <div class="bbini-bubble" id="bbini-bubble">혜공 형님! 현재 시스템 보안 레벨 1등급, 모든 자산이 안전합니다!</div>
    <div class="bbini" onclick="talk()">삐니</div>
</div>

<script>
    // 1. 다국어 데이터 사전
    const i18n = {
        ko: {
            subHeader: "메인자산통합원장",
            apr: "스테이킹 이율 (APR)",
            lp: "유동성 수익 (LP)",
            supply: "HKWB 실시간 유동성 공급량",
            totalLiq: "전체 유동성 LP 공급 현황 (DEX)",
            assets: "MAIN ASSETS",
            btnFaq: "글로벌 AI 지원센터 (FAQ 20선)",
            menus: ["송금", "결제", "예치", "보상", "기본소득", "스왑"],
            bbiniTalk: ["혜공 형님! 자산이 실시간 증식 중입니다!", "형님, 보안 프로토콜 이상 무!", "DEX 유동성이 폭발적으로 증가하고 있습니다!"],
            faqTitle: "HKWB 보안 수준은?",
            faqAns: "양자 암호화 기술로 완벽 보호됩니다."
        },
        en: {
            subHeader: "Global Integrated Ledger",
            apr: "Staking APR",
            lp: "Liquidity Profit (LP)",
            supply: "HKWB Real-time Supply",
            totalLiq: "Total DEX Liquidity (LP)",
            assets: "MAIN ASSETS",
            btnFaq: "Global AI Support (FAQ)",
            menus: ["Transfer", "Payment", "Deposit", "Reward", "UBI", "Swap"],
            bbiniTalk: ["Boss! Assets are growing!", "Security Protocol: Perfect!", "DEX Liquidity is booming!"],
            faqTitle: "Security Level?",
            faqAns: "Protected by Quantum Encryption."
        }
    };

    let currentLang = 'ko';

    // 2. 테스트 파이 실시간 변동 엔진 (가장 핵심)
    let p=400.0212, g=125663600, l=88438688147, r1=15.48, r2=23.26, s=6280000.5074;
    setInterval(() => {
        p += Math.random()*0.0001; 
        g += Math.floor(Math.random()*200);
        l += Math.floor(Math.random()*12000);
        s += Math.random()*0.0015;
        r1 += (Math.random()-0.5)*0.02;
        r2 += (Math.random()-0.5)*0.02;
        
        document.getElementById('pi-val').innerHTML = p.toFixed(4) + " <span>Pi</span>";
        document.getElementById('gcv-val').innerText = "Value: $ " + g.toLocaleString() + " (GCV)";
        document.getElementById('liq-val').innerText = "$ " + l.toLocaleString();
        document.getElementById('supply-val').innerText = s.toLocaleString(undefined, {minimumFractionDigits:4});
        document.getElementById('rate-1').innerText = r1.toFixed(2) + "%";
        document.getElementById('rate-2').innerText = r2.toFixed(2) + "%";
    }, 1000);

    // 3. 언어 전환 기능 (i18n 엔진)
    function changeLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const d = i18n[lang];
        document.getElementById('sub-header').innerText = d.subHeader;
        document.getElementById('lbl-apr').innerText = d.apr;
        document.getElementById('lbl-lp').innerText = d.lp;
        document.getElementById('lbl-supply').innerText = d.supply;
        document.getElementById('lbl-total-liq').innerText = d.totalLiq;
        document.getElementById('lbl-assets').innerText = d.assets;
        document.getElementById('btn-faq').innerText = d.btnFaq;
        
        renderMenu();
        renderFAQ();
    }

    function renderMenu() {
        const icons = ["🚀", "🛒", "🏦", "🏆", "🏠", "🔄"];
        const menuGrid = document.getElementById('menu-grid');
        menuGrid.innerHTML = "";
        i18n[currentLang].menus.forEach((m, i) => {
            menuGrid.innerHTML += `<div class="menu-item"><span>${icons[i]}</span><span class="menu-text">${m}</span></div>`;
        });
    }

    // 4. 삐니 챗봇 상호작용 (확장된 토크 기능)
    function talk() {
        const bubble = document.getElementById('bbini-bubble');
        const msgs = i18n[currentLang].bbiniTalk;
        bubble.innerText = msgs[Math.floor(Math.random() * msgs.length)];
        bubble.style.display = 'block';
        setTimeout(() => { bubble.style.display = 'none'; }, 4000);
    }

    // 초기 렌더링
    function toggle(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function renderFAQ() {
        const faqList = document.getElementById('faq-list');
        faqList.innerHTML = `
            <div class="faq-item">
                <div class="faq-q">${i18n[currentLang].faqTitle}</div>
                <div class="faq-a">${i18n[currentLang].faqAns}</div>
            </div>`;
    }

    renderMenu();
    renderFAQ();
</script>

</body>
</html>
