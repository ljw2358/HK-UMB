    function toggleGlobal(show) { 
        document.getElementById('globalLayer').style.display = show ? 'block' : 'none'; 
        if(show) gsap.from(".nation-item", {duration: 0.6, y: 30, opacity: 0, stagger: 0.05, ease: "back.out(1.7)"});
    }

    function applyNation(idx) {
        const n = masterData[idx];
        document.getElementById('f-icon').innerText = n.f;
        document.getElementById('f-name').innerText = n.n;
        document.getElementById('l-txt').innerText = n.l;
        document.getElementById('lp-l').innerText = n.lp;
        document.getElementById('sh-h').innerHTML = `<i class="fas fa-shield-alt"></i> ${n.sh}`;
        document.getElementById('ai-l').innerText = n.ai;
        for(let i=0; i<3; i++) {
            document.getElementById(`b${i+1}`).innerText = n.b[i];
            document.getElementById(`s${i+1}`).innerText = n.s[i];
        }
        for(let i=0; i<6; i++) document.getElementById(`m${i+1}`).innerText = n.m[i];
        toggleGlobal(false);
        gsap.from(".container", {duration: 1, opacity: 0, y: 120, ease: "power4.out"});
    }

    const container = document.getElementById('nationContainer');
    masterData.forEach((n, idx) => {
        const item = document.createElement('div');
        item.className = 'nation-item';
        item.innerHTML = `<span style="font-size:36px;">${n.f}</span> ${n.n}`;
        item.onclick = () => applyNation(idx);
        container.appendChild(item);
    });

    window.onload = () => {
        gsap.from(".brand-h1", {duration: 1.8, y: -100, opacity: 0, ease: "elastic.out(1, 0.3)"});
        gsap.from("#ledger-box", {duration: 1.5, scale: 0.85, opacity: 0, delay: 0.8, ease: "expo.out"});
        gsap.from(".service-card", {duration: 0.8, y: 60, opacity: 0, stagger: 0.1, delay: 1.5, ease: "power3.out"});
    };
