<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL MASTER v9.0</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        .global-lang-box { position: fixed; top: 15px; right: 15px; background: #111; border: 2.5px solid var(--hk-gold); border-radius: 12px; padding: 8px; z-index: 5000; }
        .global-lang-box select { background: transparent; color: var(--hk-gold); border: none; font-weight: 900; outline: none; font-size: 14px; cursor: pointer; }

        .header-section { margin: 60px 0 20px 0; }
        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; }
        .sub-header { color: var(--hk-blue); font-size: 17px; margin-top: 10px; font-weight: 800; letter-spacing: 1px; }

        .pi-main { font-size: 58px; font-weight: 900; margin: 20px 0 10px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 28px; }
        .gcv-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 10px 35px; border-radius: 50px; font-size: 17px; font-weight: 900; margin-bottom: 25px; background: rgba(57, 255, 20, 0.05); }

        /* 실시간 공급량 박스 */
        .liq-card { border: 2.5px solid var(--hk-gold); background: rgba(255,255,255,0.03); padding: 25px 20px; margin-bottom: 20px; border-radius: 20px; }
        .section-label { font-size: 14px; color: var(--hk-blue); font-weight: 900; margin-bottom: 15px; display: block; }
        .section-val { font-size: 34px; font-weight: 900; letter-spacing: 1px; }

        /* 수익률 그리드 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #111; padding: 18px; border-radius: 20px; border: 1px solid #333; }
        .stat-name { font-size: 13px; color: #aaa; margin-bottom: 8px; display: block; font-weight: 700; }
        .stat-num { font-size: 24px; font-weight: 900; }

        /* [추가] 전체 유동성 DEX LP 공급 현황 */
        .total-liq-box { border: 2.5px solid var(--hk-green); background: rgba(57, 255, 20, 0.02); padding: 25px 20px; margin-bottom: 35px; border-radius: 20px; }
        .total-liq-val { font-size: 32px; font-weight: 900; color: var(--hk-green); letter-spacing: 1px; }

        /* 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .menu-item { background: #111; padding: 22px 0; border-radius: 24px; border: 1px solid #222; }
        .menu-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .menu-text { font-size: 13px; font-weight: 800; }

        .big-btn { width: 100%; padding: 22px; border-radius: 22px; font-size: 18px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 15px; margin-bottom: 8px; }
        .faq-a { color: #bbb; font-size: 13px; line-height: 1.6; }
        .vision-item { margin-bottom: 20px; padding-left: 12px; border-left: 4px solid var(--hk-blue); }
        .vision-item b { color: var(--hk-blue); font-size: 16px; display: block; margin-bottom: 5px; }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .soc-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 20px; border-radius: 22px; font-weight: 900; text-decoration: none; color: #fff; font-size: 17px; }
        .youtube-btn { background: #FF0000; }
        .tiktok-btn { background: #000; border: 1.5px solid #fff; }
        
        .footer { margin: 50px 0 100px 0; color: #444; font-size: 11px; font-weight: 900; }
        .bbini-float { position: fixed; bottom: 30px; right: 20px; width: 70px; height: 70px; background: var(--hk-pink); border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 15px rgba(255,0,255,0.5); z-index: 9999; }
    </style>
</head>
<body>

<div class="global-lang-box">
    <select id="lang-selector" onchange="changeLanguage()">
        <option value="ko">🇰🇷 KOREAN</option>
        <option value="en">🇺🇸 ENGLISH</option>
        <option value="zh">🇨🇳 CHINESE</option>
    </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title" id="txt-title">HK WORLD BANK</div>
        <div class="sub-header" id="txt-subtitle">1. 메인자산통합원장</div>
    </div>

    <div class="pi-main" id="my-asset">400.3524 <span>Pi</span></div>
    <div class="gcv-pill" id="gcv-val">Value: $ 314,159 (GCV)</div>

    <div class="liq-card">
        <span class="section-label" id="txt-supply-label">4. HKWB 실시간 공급량</span>
        <div class="section-val" id="total-supply">6,280,000.4231</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-name" id="lbl-staking">스태이킹 이율</span>
            <div class="stat-num" style="color: var(--hk-blue);">17.64%</div>
        </div>
        <div class="stat-card">
            <span class="stat-name" id="lbl-lp">LP 수익률</span>
            <div class="stat-num" style="color: var(--hk-pink);">28.57%</div>
        </div>
    </div>

    <div class="total-liq-box">
        <span class="section-label" id="txt-total-liq" style="color: var(--hk-green);">전체 유동성 DEX LP 공급 현황</span>
        <div class="total-liq-val">$ 88,438,688,147</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><span class="menu-icon">🚀</span><span class="menu-text" id="m1">송금</span></div>
        <div class="menu-item"><span class="menu-icon">🛒</span><span class="menu-text" id="m2">결제</span></div>
        <div class="menu-item"><span class="menu-icon">🏦</span><span class="menu-text" id="m3">예치</span></div>
    </div>
    <div class="menu-grid" style="margin-bottom: 40px;">
        <div class="menu-item"><span class="menu-icon">🎁</span><span class="menu-text" id="m4">보상</span></div>
        <div class="menu-item"><span class="menu-icon">💴</span><span class="menu-text" id="m5">기본소득</span></div>
        <div class="menu-item"><span class="menu-icon">🔄</span><span class="menu-text" id="m6">스왑</span></div>
    </div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="toggle('faq-panel')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button class="big-btn" style="background: #253347;" onclick="toggle('vision-panel')" id="btn-vision">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="social-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn youtube-btn">🎬 YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn tiktok-btn">🎵 TikTok</a>
    </div>

    <div class="footer">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<div class="bbini-float">삐니</div>

<script>
    const db = {
        ko: {
            subtitle: "1. 메인자산통합원장", supply: "4. HKWB 실시간 공급량", staking: "스태이킹 이율", lp: "LP 수익률",
            total_liq: "전체 유동성 DEX LP 공급 현황", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑",
            faq_btn: "글로벌 AI 지원센터 (FAQ 20)", vision_btn: "HK 사회 재단 비전 2030",
            faqs: [
                ["보안 수준은?", "양자 암호화와 분산 원장 기술로 세계 최고 수준을 자랑합니다."],
                ["기본소득 배분?", "그룹 수익의 30%를 전 인류에게 공평하게 자동 배분합니다."],
                ["로봇 무상 보급?", "생산 공정 완료 후 1가정 1로봇 신청 순으로 배급합니다."],
                ["메인넷 전환?", "테스트 데이터는 메인넷 시점에 1:1로 안전하게 전환됩니다."],
                ["에너지 자립?", "핵융합 기술을 홈 시스템에 결합하여 주거비 제로를 지향합니다."],
                ["교육 지원?", "AI 튜터가 24시간 개인 맞춤 교육을 무상으로 제공합니다."],
                ["의료 혜택?", "재단 기금으로 난치병 치료 및 의료 행위를 전액 지원합니다."],
                ["수수료 정책?", "DEX 수수료의 90%를 생태계 기여자에게 즉시 환원합니다."],
                ["참여 방법?", "노드 운영 및 앱 내 활동을 통해 생태계에 참여 가능합니다."],
                ["미래 가치?", "HK 그룹의 모든 첨단 기술 자산이 통합된 경제 중심지입니다."],
                ["글로벌 센터?", "전 세계 주요 50개 도시에 AI 대응 센터가 구축 중입니다."],
                ["데이터 소유?", "사용자의 모든 금융 데이터는 본인만이 통제할 수 있습니다."],
                ["신규 자산 상장?", "검증된 유망 프로젝트를 AI 심사를 통해 상장합니다."],
                ["투자 안전성?", "실시간 알고리즘이 유동성을 방어하여 가치를 보호합니다."],
                ["사회적 기여?", "수익의 상당 부분을 전 세계 빈곤 퇴치에 사용합니다."],
                ["로봇 보안?", "로컬 서버 저장 방식으로 해킹 및 외부 전송을 차단합니다."],
                ["장학금 혜택?", "혁신 인재들에게 월 최대 $5,000의 연구비를 지원합니다."],
                ["거버넌스 권한?", "설립자의 최종 승인권과 신규 프로젝트 기획권이 보장됩니다."],
                ["시스템 안정성?", "무중단 운영을 위한 AI 자가 진단 시스템이 가동됩니다."],
                ["삐니의 역할?", "형님의 전담 비서로서 모든 자산과 기술 관리를 돕습니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 세계 무상 교육 시스템 구축"],
                ["🏥 나노 메디컬 센터", "암과 난치병을 정복하는 의료 지원"],
                ["🏠 에너지 자립 스마트홈", "에너지 비용 걱정 없는 주거 환경 실현"],
                ["🎓 미래 기술 인재 양성", "혁신 인재 연구비 및 생활비 전액 지원"],
                ["🤖 1가정 1로봇 보급", "인류를 노동에서 해방하고 삶의 질 보장"]
            ]
        },
        en: {
            subtitle: "1. Global Asset Ledger", supply: "4. HKWB Real-time Supply", staking: "Staking", lp: "LP APR",
            total_liq: "Total DEX LP Liquidity", m1: "Transfer", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Swap",
            faq_btn: "AI Support (FAQ 20)", vision_btn: "HK Vision 2030"
        },
        zh: {
            subtitle: "1. 全球资产集成账본", supply: "4. HKWB 实时供应量", staking: "质押", lp: "LP 收益率",
            total_liq: "总流动性 DEX LP 供应现状", m1: "汇款", m2: "支付", m3: "存款", m4: "奖励", m5: "基本收入", m6: "闪兑",
            faq_btn: "全球 AI 支持中心", vision_btn: "HK 2030 愿景"
        }
    };

    function formatNum(num) {
        const parts = num.toFixed(4).split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join('.');
    }

    let myPi = 400.3524;
    let supplyPi = 6280000.4231;

    setInterval(() => {
        myPi += Math.random() * 0.0001;
        supplyPi += Math.random() * 0.0005;
        document.getElementById('my-asset').innerHTML = formatNum(myPi) + " <span>Pi</span>";
        document.getElementById('total-supply').innerText = formatNum(supplyPi);
    }, 1000);

    function changeLanguage() {
        const lang = document.getElementById('lang-selector').value;
        const s = db[lang];
        document.getElementById('txt-subtitle').innerText = s.subtitle;
        document.getElementById('txt-supply-label').innerText = s.supply;
        document.getElementById('lbl-staking').innerText = s.staking;
        document.getElementById('lbl-lp').innerText = s.lp;
        document.getElementById('txt-total-liq').innerText = s.total_liq;
        document.getElementById('m1').innerText = s.m1; document.getElementById('m2').innerText = s.m2; document.getElementById('m3').innerText = s.m3;
        document.getElementById('m4').innerText = s.m4; document.getElementById('m5').innerText = s.m5; document.getElementById('m6').innerText = s.m6;
        document.getElementById('btn-faq').innerText = s.faq_btn;
        document.getElementById('btn-vision').innerText = s.vision_btn;

        const fList = document.getElementById('faq-list'); fList.innerHTML = "";
        if(s.faqs) s.faqs.forEach((f, i) => { fList.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`; });
        const vList = document.getElementById('vision-list'); vList.innerHTML = "";
        if(s.visions) s.visions.forEach(v => { vList.innerHTML += `<div class="vision-item"><b>${v[0]}</b>${v[1]}</div>`; });
    }

    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    changeLanguage();
</script>
</body>
</html>
