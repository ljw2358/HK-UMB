    <style>
        :root { --gold: #f1c40f; --green: #00ff88; --bg: #000; --card: #121212; --border: #222; --blue: #00d4ff; --red: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }
        
        /* Navigation & Header */
        .header-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .auth-status { font-size: 10px; font-weight: 800; color: #888; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; }
        .dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
        #langSelect { background: #000; color: var(--gold); border: 1.5px solid var(--gold); padding: 5px; border-radius: 8px; font-size: 11px; outline: none; width: 100px; }

        .container { max-width: 480px; margin: 0 auto; padding: 80px 20px 40px; }
        header { text-align: center; padding: 20px 0; color: var(--gold); }
        header h1 { font-size: 26px; letter-spacing: 4px; }

        /* Dashboard */
        .main-card { background: linear-gradient(145deg, #1a1a1a, #000); border-radius: 30px; padding: 35px 20px; border: 1px solid #222; text-align: center; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        #ledger-title { font-size: 11px; color: var(--gold); margin-bottom: 12px; letter-spacing: 2px; font-weight: 800; }
        .balance-val { font-size: 38px; font-weight: 900; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        .gcv-badge { color: var(--green); border: 1px solid rgba(0,255,136,0.3); padding: 5px 15px; border-radius: 20px; font-size: 11px; display: inline-block; margin-bottom: 25px; }
       
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-box span { display: block; font-size: 9px; color: #888; margin-bottom: 5px; }
        .stat-box strong { font-size: 18px; color: #fff; }

        .tvl-box { background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 20px; padding: 20px; }
        .tvl-box p { font-size: 10px; color: var(--blue); margin-bottom: 5px; }
        .tvl-box h2 { font-size: 24px; font-variant-numeric: tabular-nums; }

        /* Grid System */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .btn-act { padding: 15px 5px; border-radius: 15px; font-weight: 900; font-size: 12px; border: none; cursor: pointer; }
        .gold { background: var(--gold); color: #000; }
        .white { background: #fff; color: #000; }
        .green { background: var(--green); color: #000; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .menu-item { background: var(--card); padding: 20px 5px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        .menu-item i { font-size: 24px; display: block; margin-bottom: 10px; color: var(--gold); }
        .menu-item span { font-size: 10px; font-weight: 700; color: #aaa; }

        /* Infrastructure */
        .infra-card { background: #080808; border-radius: 20px; padding: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        .infra-card h3 { font-size: 14px; color: var(--blue); margin-bottom: 15px; }
        .infra-card p { font-size: 11px; color: #555; margin-bottom: 8px; padding-left: 10px; border-left: 2px solid var(--blue); }

        .btn-cs { width: 100%; padding: 20px; border-radius: 20px; background: var(--red); color: #fff; border: none; font-weight: 900; font-size: 14px; margin-bottom: 30px; }
    </style>
</head>

    // --- 엔진 변수 ---
    let balance = 400.02120000;
    let tvl = 88428554367;

    // --- 실시간 로직 (초당 변화) ---
    function startEngines() {
        setInterval(() => {
            balance += 0.0000000314;
            document.getElementById('pi-val').innerHTML = `${balance.toFixed(8)} <span style="font-size:18px; color:var(--gold);">Pi</span>`;
        }, 100);

        setInterval(() => {
            tvl += Math.floor(Math.random() * 200) + 50;
            document.getElementById('val_tvl').innerText = `$ ${tvl.toLocaleString()}`;
        }, 1000);
    }

    // --- 언어 업데이트 함수 ---
    function updateLang() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang];
        
        document.getElementById('ledger').innerText = d.ledger;
        document.getElementById('lbl_apr').innerText = d.apr;
        document.getElementById('lbl_node').innerText = d.node;
        document.getElementById('lbl_tvl').innerText = d.tvl;
        document.getElementById('b1').innerText = d.b1;
        document.getElementById('b2').innerText = d.b2;
        document.getElementById('b3').innerText = d.b3;
        document.getElementById('m1').innerText = d.m1;
        document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3;
        document.getElementById('m4').innerText = d.m4;
        document.getElementById('m5').innerText = d.m5;
        document.getElementById('m6').innerText = d.m6;
        document.getElementById('lbl_infra').innerText = d.infra;
        document.getElementById('s1').innerText = d.s1;
        document.getElementById('s2').innerText = d.s2;
        document.getElementById('s3').innerText = d.s3;
        document.getElementById('btn_cs').innerText = d.cs;
    }

    // --- 초기화 ---
    window.onload = async () => {
        const sel = document.getElementById('langSelect');
        Object.keys(i18n).forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.innerText = i18n[k].name;
            sel.appendChild(opt);
        });

        startEngines();
        updateLang();

        try {
            await Pi.init({ version: "2.0", sandbox: true });
            const auth = await Pi.authenticate(['username', 'payments'], (p) => console.log(p));
            document.getElementById('user-id').innerText = `ID: ${auth.user.username.toUpperCase()}`;
            document.getElementById('dot').classList.add('active');
        } catch (e) {
            document.getElementById('user-id').innerText = "PI BROWSER READY";
        }
    };
</script>
