<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | LIVE TEST-PI</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --bg-black: #000000;
            --card-gray: #111111;
            --neon-blue: #00E5FF;
            --success: #00FF41;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-black); color: #fff;
            font-family: -apple-system, sans-serif; overflow-x: hidden;
        }

        #app { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }

        /* 헤더 디자인 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .logo { font-size: 20px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
        #auth-status { font-size: 11px; color: #888; background: #222; padding: 5px 10px; border-radius: 50px; }

        /* 메인 대시보드 */
        .dashboard {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid var(--gold); border-radius: 30px;
            padding: 40px 20px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }
        .total-label { color: #888; font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; }
        .total-amount { font-size: 32px; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* 미디어 섹션 */
        .media-box { background: var(--card-gray); border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid #222; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* 실제 테스트 결제 버튼 */
        .test-pi-btn {
            background: linear-gradient(90deg, var(--gold), #FFA500);
            color: #000; border: none; width: 100%; padding: 22px;
            border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 165, 0, 0.3); transition: 0.3s;
            margin-bottom: 30px;
        }
        .test-pi-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* 로딩/결과 모달 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; display: none;
            flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center;
        }
        .spinner { width: 50px; height: 50px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        footer { margin-top: auto; text-align: center; color: #444; font-size: 11px; padding: 20px 0; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">HK WORLD BANK</div>
        <div id="auth-status">지갑 연결 중...</div>
    </header>

    <div class="dashboard">
        <div class="total-label">GLOBAL QUANTUM LEDGER</div>
        <div class="total-amount">$ 88,429,913,502</div>
        <div style="color: var(--success); font-size: 12px; margin-top: 10px;">● 블록체인 노드 동기화 완료</div>
    </div>

    <div class="media-box">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
        <div style="padding: 15px; font-size: 13px; color: #ccc;">PHK PROJECT 홍보 및 LP 운용 안내</div>
    </div>

    <button class="test-pi-btn" onclick="payTestPi()">
        💎 1 TEST-PI 공급 테스트 실행
    </button>

    <footer>
        <div style="color: var(--neon-blue); margin-bottom: 5px;">HK QUANTUM SHIELD V2.5 ACTIVE</div>
        © 2026 HK GROUP FOUNDATION ALL RIGHTS RESERVED
    </footer>
</div>

<div id="modal-overlay">
    <div id="modal-content">
        <div class="spinner" id="modal-spinner"></div>
        <h2 id="modal-title" style="color: var(--gold);">지갑 연동 중</h2>
        <p id="modal-msg" style="color: #888;">Pi 지갑이 열리면 결제 승인을 진행해주세요.</p>
        <div id="success-icon" style="display:none; font-size: 60px; margin-bottom: 20px;">✅</div>
        <button id="close-btn" onclick="location.reload()" style="display:none; margin-top:30px; padding:15px 40px; border-radius:15px; background:var(--gold); border:none; font-weight:bold; color:#000;">대시보드 복귀</button>
    </div>
</div>

<script>
    // 1. Pi SDK 초기화 (테스트를 위해 sandbox 모드 켬)
    const Pi = window.Pi;
    Pi.init({ version: "1.5", sandbox: true });

    // 2. 사용자 인증 및 지갑 연결
    async function auth() {
        try {
            const scopes = ['username', 'payments'];
            const authResponse = await Pi.authenticate(scopes, onIncompletePaymentFound);
            document.getElementById('auth-status').innerText = authResponse.user.username + " 님 연결됨";
        } catch (e) {
            document.getElementById('auth-status').innerText = "Guest Mode";
        }
    }

    function onIncompletePaymentFound(payment) { /* 미완료 결제 처리 로직 */ }

    // 3. 실제 TEST-PI 결제 요청 (핵심 기능)
    async function payTestPi() {
        const modal = document.getElementById('modal-overlay');
        modal.style.display = 'flex';

        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "HK World Bank LP 공급 테스트",
                metadata: { type: "lp_test" },
            }, {
                onReadyForServerApproval: (id) => {
                    updateModal("승인 대기", "블록체인 네트워크에서 트랜잭션을 승인 중입니다...");
                },
                onReadyForServerCompletion: (id, txid) => {
                    showSuccess();
                },
                onCancel: (id) => { modal.style.display = 'none'; },
                onError: (err) => { modal.style.display = 'none'; alert("오류: " + err.message); }
            });
        } catch (e) {
            modal.style.display = 'none';
            console.error(e);
        }
    }

    function updateModal(title, msg) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
    }

    function showSuccess() {
        document.getElementById('modal-spinner').style.display = 'none';
        document.getElementById('success-icon').style.display = 'block';
        document.getElementById('modal-title').innerText = "테스트 완료!";
        document.getElementById('modal-msg').innerText = "1 Test-Pi가 성공적으로 전송되었습니다.";
        document.getElementById('close-btn').style.display = 'block';
    }

    // 초기 실행
    auth();
</script>

</body>
</html>
