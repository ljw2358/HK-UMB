<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL MASTER v5.0</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        .header-section { margin: 50px 0 30px 0; }
        .header-title { font-size: 42px; font-weight: 900; color: var(--hk-gold); letter-spacing: -2px; italic; }
        .sub-header { color: var(--hk-blue); font-size: 14px; margin-top: 10px; font-weight: 800; letter-spacing: 3px; }
       
        .global-lang-box { position: fixed; top: 15px; right: 15px; background: #111; border: 2px solid var(--hk-gold); border-radius: 12px; padding: 5px; z-index: 5000; }
        .global-lang-box select { background: transparent; color: var(--hk-gold); border: none; font-weight: 900; outline: none; font-size: 12px; cursor: pointer; }

        .pi-main { font-size: 58px; font-weight: 900; margin: 20px 0 5px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 24px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 30px; border-radius: 50px; font-size: 15px; font-weight: 900; margin-bottom: 25px; background: rgba(57, 255, 20, 0.05); }

        /* [상단 배치] 핵심 자산 카드 */
        .asset-card { border: 2px solid #222; background: rgba(255,255,255,0.02); padding: 20px; margin: 10px 0 20px 0; border-radius: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .asset-item { display: flex; flex-direction: column; gap: 5px; }
        .asset-label { font-size: 10px; color: #666; font-weight: 900; }
        .asset-val { font-size: 14px; font-weight: 900; color: var(--hk-blue); }

        .liq-card { border: 2px solid var(--hk-gold); background: rgba(255,255,255,0.03); padding: 25px 20px; margin-bottom: 35px; border-radius: 24px; }
        .section-label { font-size: 13px; color: var(--hk-blue); font-weight: 900; margin-bottom: 12px; display: block; }
        .section-val { font-size: 28px; font-weight: 900; }

        .btn-group-label { text-align: left; font-size: 14px; font-weight: 900; margin: 20px 0 15px 5px; color: var(--hk-gold); border-left: 4px solid var(--hk-gold); padding-left: 10px; }
        
        /* [메뉴 그리드] 송금 위/아래 배치 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; }
        .menu-item { background: #111; padding: 22px 0; border-radius: 24px; border: 1px solid #222; transition: 0.3s; }
        .menu-item:active { background: #222; transform: scale(0.95); }
        .menu-icon { font-size: 26px; margin-bottom: 8px; display: block; }
        .menu-text { font-size: 12px; font-weight: 800; }

        .big-btn { width: 100%; padding: 20px; border-radius: 22px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; margin-bottom: 8px; }
        .faq-a { color: #bbb; font-size: 12px; line-height: 1.6; }
        .vision-item { margin-bottom: 20px; padding: 15px; background: #111; border-radius: 15px; border-left: 4px solid var(--hk-blue); }
        .vision-item b { color: var(--hk-blue); font-size: 15px; display: block; margin-bottom: 5px; }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .soc-btn { padding: 16px; border-radius: 20px; font-weight: 900; text-decoration: none; color: #fff; text-align: center; font-size: 14px; }
        .footer { margin: 60px 0 100px 0; color: #444; font-size: 10px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="global-lang-box">
    <select id="lang-selector" onchange="changeLanguage()">
        <option value="ko">🇰🇷 KOREAN</option>
        <option value="en">🇺🇸 ENGLISH</option>
    </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title" id="txt-title">HKWB</div>
        <div class="sub-header" id="txt-subtitle">GLOBAL ADVANCED CENTER</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill" id="gcv-val">Value: $ 125,663,600 (GCV)</div>

    <div class="asset-card">
        <div class="asset-item">
            <span class="asset-label">PI 수량</span>
            <span class="asset-val" style="color:#fff">SECURED</span>
        </div>
        <div class="asset-item" style="border-left: 1px solid #222; border-right: 1px solid #222;">
            <span class="asset-label">DEX 스왑</span>
            <span class="asset-val">ACTIVE</span>
        </div>
        <div class="asset-item">
            <span class="asset-label">LP 스테이킹</span>
            <span class="asset-val" style="color:var(--hk-green)">28.57%</span>
        </div>
    </div>

    <div class="btn-group-label" id="txt-eco">MAIN BANKING</div>
    <div class="menu-grid">
        <div class="menu-item"><span class="menu-icon">🚀</span><span class="menu-text" id="m1">송금</span></div>
        <div class="menu-item"><span class="menu-icon">🛒</span><span class="menu-text" id="m2">결제</span></div>
        <div class="menu-item"><span class="menu-icon">🏦</span><span class="menu-text" id="m3">예치</span></div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" style="border-color: var(--hk-gold);"><span class="menu-icon">🎁</span><span class="menu-text" id="m4">보상</span></div>
        <div class="menu-item" style="border-color: var(--hk-gold);"><span class="menu-icon">💳</span><span class="menu-text" id="m5">기본소득</span></div>
        <div class="menu-item" style="border-color: var(--hk-gold);"><span class="menu-icon">🔄</span><span class="menu-text" id="m6">스왑</span></div>
    </div>

    <div class="liq-card" style="margin-top:40px;">
        <span class="section-label" id="txt-liq-label">전체 유동성 LP 공급 현황 (DEX)</span>
        <div class="section-val" style="color: var(--hk-green); font-size: 24px;">$ 88,438,688,147</div>
    </div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="toggle('faq-panel')" id="btn-faq">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button class="big-btn" style="background: #253347;" onclick="toggle('vision-panel')" id="btn-vision">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="social-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background: #FF0000;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background: #111; border: 1px solid #333;">TikTok</a>
    </div>

    <div class="footer">HK GROUP FOUNDER & CHAIRMAN LEE JAEWAN</div>
</div>

<script>
    const db = {
        ko: {
            title: "HKWB", subtitle: "GLOBAL ADVANCED CENTER", liq: "전체 유동성 현황 (DEX)", eco: "MAIN BANKING", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑", faq_btn: "글로벌 AI 지원센터 (FAQ 20)", vision_btn: "HK 사회 재단 비전 2030",
            faqs: [
                ["보안 수준은?", "양자 암호화와 분산 원장 기술로 세계 최고 수준을 자랑합니다."],
                ["기본소득 배분?", "그룹 수익의 30%를 전 인류에게 공평하게 자동 배분합니다."],
                ["로봇 무상 보급?", "생산 공정 완료 후 1가정 1로봇 신청 순으로 배급합니다."],
                ["삐니의 역할?", "형님의 전담 비서로서 모든 자산과 기술 관리를 돕습니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 세계 무상 교육 시스템 구축"],
                ["🏥 나노 메디컬 센터", "암과 난치병을 정복하는 의료 지원"],
                ["🤖 1가정 1로봇 보급", "인류를 노동에서 해방하고 삶의 질 보장"]
            ]
        },
        en: {
            title: "HKWB", subtitle: "GLOBAL ADVANCED CENTER", liq: "Total Liquidity (DEX)", eco: "MAIN BANKING", m1: "Transfer", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Swap", faq_btn: "AI Support (FAQ 20)", vision_btn: "HK Vision 2030",
            faqs: [
                ["Security?", "Quantum encryption security."],
                ["UBI?", "30% profit shared globally."],
                ["BBINI's Role?", "Assistant for asset management."]
            ],
            visions: [
                ["🏫 AI School", "Global free education."],
                ["🏥 Medical Center", "Curing intractable diseases."]
            ]
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('lang-selector').value;
        const s = db[lang];
        document.getElementById('txt-title').innerText = s.title;
        document.getElementById('txt-subtitle').innerText = s.subtitle;
        document.getElementById('txt-liq-label').innerText = s.liq;
        document.getElementById('txt-eco').innerText = s.eco;
        document.getElementById('m1').innerText = s.m1;
        document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3;
        document.getElementById('m4').innerText = s.m4;
        document.getElementById('m5').innerText = s.m5;
        document.getElementById('m6').innerText = s.m6;
        document.getElementById('btn-faq').innerText = s.faq_btn;
        document.getElementById('btn-vision').innerText = s.vision_btn;

        const fList = document.getElementById('faq-list'); fList.innerHTML = "";
        s.faqs.forEach((f, i) => {
            fList.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`;
        });

        const vList = document.getElementById('vision-list'); vList.innerHTML = "";
        s.visions.forEach(v => {
            vList.innerHTML += `<div class="vision-item"><b>${v[0]}</b>${v[1]}</div>`;
        });
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const isV = el.style.display === 'block';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        el.style.display = isV ? 'none' : 'block';
        if(!isV) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    let p=400.0212;
    setInterval(() => {
        p += Math.random()*0.0001;
        document.getElementById('pi-val').innerHTML = p.toFixed(4) + " <span>Pi</span>";
    }, 1000);

    changeLanguage();
</script>
</body>
</html>
