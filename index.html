        .pi-unit { font-size: 30px; color: var(--hk-gold); margin-left: 10px; }
        .usd-val { color: var(--hk-green); font-weight: 900; font-size: 26px; margin-top: 20px; }

        /* 통계 그리드 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { background: var(--hk-card); border: 1.5px solid #1a1a1a; padding: 25px 15px; border-radius: 28px; }
        .stat-label { font-size: 12px; color: #888; font-weight: 800; margin-bottom: 12px; display: block; }

        document.getElementById('btn-vision').innerText = d.vision_btn;

        const menuArea = document.getElementById('menu-area');
        menuArea.innerHTML = d.menus.map((m, i) => `<div class="menu-item"><span class="menu-icon">${['🚀','🛒','🏦'][i]}</span><span class="menu-text">${m}</span></div>`).join('');

        const faqPanel = document.getElementById('faq-panel');
        faqPanel.innerHTML = d.faq.map(f => `<div class="faq-group"><div class="faq-q">${f.q}</div><div class="faq-a">${f.a}</div></div>`).join('');

        const visionPanel = document.getElementById('vision-panel');
        visionPanel.innerHTML = d.vision.map(v => `<div class="vision-group"><span class="vision-t">${v.t}</span><p class="vision-d">${v.d}</p></div>`).join('');
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const showing = el.style.display === 'block';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        el.style.display = showing ? 'none' : 'block';
        if (!showing) el.scrollIntoView({ behavior: 'smooth' });
    }

    let pi = 412.3171, liq = 88432293038;
    setInterval(() => {
        pi += Math.random() * 0.0001;
        liq += Math.floor(Math.random() * 10000);
        document.getElementById('v-pi').innerText = pi.toFixed(4);
        document.getElementById('v-liq').innerText = "$ " + liq.toLocaleString();
    }, 2000);

    updateUI();
</script>

</body>
</html>
