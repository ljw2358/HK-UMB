<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL V23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --gold: #ffc40f; --green: #00ff88; --bg: #000; --card: #121212; --border: #222; --pink: #ff2d55; --cyan: #00d4ff; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .gold-text { color: var(--gold); }
        .green-text { color: var(--green); }
        .cyan-text { color: var(--cyan); }
        .hk-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; transition: all 0.3s; }
        .gcv-badge { border: 1px solid var(--green); border-radius: 15px; padding: 4px 12px; font-size: 11px; color: var(--green); font-weight: bold; }
        .btn-grid i { font-size: 24px; color: var(--gold); margin-bottom: 8px; }
        .quantum-shield p { border-left: 2px solid var(--cyan); padding-left: 10px; margin-bottom: 8px; color: var(--cyan); font-size: 13px; font-weight: bold; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .updating-num { animation: flash 1.5s infinite; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-20">

    <header class="p-4 flex justify-end sticky top-0 z-50 bg-black/90">
        <select id="langSelect" onchange="changeLang()" class="bg-black border border-gray-700 text-[10px] px-2 py-1 rounded text-white outline-none">
            </select>
    </header>

    <section class="px-6 text-center">
        <h1 id="main-title" class="text-2xl font-black gold-text mb-8 tracking-tighter uppercase">HK WORLD BANK</h1>

            <h2 class="text-4xl font-bold mb-4"><span id="pi-balance" class="updating-num">400.0212</span> <span class="text-2xl">Pi</span></h2>
            <div class="flex justify-center mb-6"><span class="gcv-badge">Value: $ 314,159 (GCV)</span></div>
            <div class="grid grid-cols-2 gap-4 text-[10px]">
                <div><p id="staking-label" class="green-text mb-1">스테이킹 이율</p><p id="rate-1" class="text-xl font-bold updating-num">15.48%</p></div>
                <div><p id="liquidity-label" class="green-text mb-1">유동성 수익</p><p id="rate-2" class="text-xl font-bold updating-num">23.26%</p></div>
            </div>
        </div>

        <div class="hk-card p-4 mb-8">
            <p id="lp-label" class="text-[10px] text-gray-400 mb-2">전체 유동성 LP 공급</p>
            <p class="text-2xl font-bold green-text">$ <span id="lp-supply">88,428,554,367</span></p>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-10 font-bold text-[11px]">
            <button id="btn-qty" class="bg-white text-black py-4 rounded-xl">PI 수량</button>
            <button id="btn-dex" class="bg-[#ffc40f] text-black py-4 rounded-xl">DEX 스왑</button>
            <button id="btn-lp" class="bg-[#00c853] text-white py-4 rounded-xl">LP 공급</button>
        </div>

        <div class="grid grid-cols-3 gap-y-8 mb-12 btn-grid text-[11px]">
            <div class="flex flex-col items-center"><i class="fas fa-paper-plane"></i><span id="m-send">송금</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-shopping-cart"></i><span id="m-pay">결제</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-vault"></i><span id="m-deposit">예치</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-medal"></i><span id="m-reward">보상</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-coins"></i><span id="m-ubi">기본소득</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-random"></i><span id="m-swap">스왑</span></div>
        </div>

        <div class="text-left px-2 mb-10">
            <h3 id="shield-title" class="flex items-center cyan-text font-bold mb-4 text-sm">
                <i class="fas fa-shield-halved mr-2"></i> HK 양자 방패 가동 중
            </h3>
            <div class="quantum-shield">
                <p id="s-1">보안 기술 V23 적용</p>
                <p id="s-2">메인넷 자산 자동 연동</p>
                <p id="s-3">AI 실시간 자산 보호</p>
            </div>
        </div>

        <div class="hk-card p-6 mb-6 text-left border-t-2 border-pink-500 bg-gradient-to-b from-[#1a1a1a] to-black">

            <div id="faq-container" class="text-[12px] space-y-4 text-gray-300 overflow-y-auto max-h-[350px] pr-2"></div>
            <div class="mt-6 pt-4 border-t border-gray-800 text-[11px]">
                <p class="text-cyan-400 font-mono">Email: support@hkwb.ai.kr</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <a href="#" class="bg-[#ff0000] py-3 rounded-xl flex items-center justify-center font-bold text-xs"><i class="fab fa-youtube mr-2"></i> YouTube</a>
            <a href="#" class="bg-[#222] py-3 rounded-xl flex items-center justify-center font-bold text-xs"><i class="fab fa-tiktok mr-2"></i> TikTok</a>
        </div>
    </section>

        function initLangOptions() {
            const select = document.getElementById('langSelect');
            for (let code in translations) {
                const opt = document.createElement('option');
                opt.value = code;
                opt.innerText = translations[code].n;
                select.appendChild(opt);
            }
        }

        function changeLang() {
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            document.getElementById('main-title').innerText = t.m;
            document.getElementById('asset-label').innerText = t.a;
            document.getElementById('btn-qty').innerText = t.q;
            document.getElementById('m-ubi').innerText = t.u;
            initFAQ(t.f11);
        }

        const baseFaqs = [
            "1. HK WorldBank는 파워풀한 파이 생태계 금융 플랫폼입니다.",
            "2. V23 양자 방패 시스템이 귀하의 자산을 실시간 보호합니다.",
            "3. 스테이킹 수익은 매일 3:14 AM(KST)에 정산됩니다.",
            "4. GCV $314,159 합의 가치를 전적으로 지지합니다.",
            "5. 오픈 메인넷 이후 모든 자산은 즉시 스왑 가능합니다.",
            "6. 최소 수수료 정책으로 사용자 수익을 극대화합니다.",
            "7. 전 세계 HK 가맹점에서 QR 결제를 지원합니다.",
            "8. 현재 40개국 이상의 다국어를 완벽 지원합니다.",
            "9. AI 고객센터는 24시간 휴무 없이 가동됩니다.",
            "10. 모든 구동은 안전한 테스트 파이(Sandbox) 환경입니다."
        ];

        function initFAQ(f11Text) {
            const container = document.getElementById('faq-container');
            container.innerHTML = "";
            baseFaqs.forEach(f => {
                const p = document.createElement('p');
                p.className = "border-b border-gray-800 pb-2";
                p.innerText = f;
                container.appendChild(p);
            });
            const p11 = document.createElement('p');
            p11.className = "text-cyan-400 font-bold mt-2";
            p11.innerText = f11Text || translations.ko.f11;
            container.appendChild(p11);
        }

        function startUpdates() {
            setInterval(() => {
                const pi = document.getElementById('pi-balance');
                pi.innerText = (parseFloat(pi.innerText) + (Math.random() - 0.5) * 0.0003).toFixed(4);
                const lp = document.getElementById('lp-supply');
                lp.innerText = (parseInt(lp.innerText.replace(/,/g, '')) + Math.floor(Math.random() * 8000)).toLocaleString();
            }, 3000);
        }

        window.onload = () => {
            Pi.init({ version: "2.0", sandbox: true });
            initLangOptions();
            initFAQ();
            startUpdates();
        };
    </script>
</body>
</html>
